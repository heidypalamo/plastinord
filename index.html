}

// ── Maquinarias Panel ─────────────────────────────────────────────────────────
function MaquinariasPanel({regs,setRegs,sup,gastos,setGastos}){
  const [seccion,setSeccion]=useState("estado"); // "estado" | "gastos" | "paradas"
  const [showForm,setShowForm]=useState(false);
  const hoy=new Date().toISOString().split("T")[0];

  // ── Manual machine status (persisted in localStorage) ──
  const SK_MAQ_STATUS="plastinord_maq_status";
  const [manualEstados,setManualEstados]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK_MAQ_STATUS)||"{}");}catch(e){return{};}});
  const persistEstados=(next)=>{setManualEstados(next);localStorage.setItem(SK_MAQ_STATUS,JSON.stringify(next));};
  // Modal: stop / apagar
  const [modal,setModal]=useState(null); // {tipo:"parar"|"apagar", maquina}
  const [modalMotivo,setModalMotivo]=useState(MOTIVOS_PARADA[0]);
  const [modalDuracion,setModalDuracion]=useState("");
  const [modalNotas,setModalNotas]=useState("");

  const activarMaquina=(maq)=>{
    const next=Object.assign({},manualEstados);
    next[maq]={status:"activa",since:new Date().toISOString(),supervisor:sup.nombre};
    persistEstados(next);
  };
  const openModal=(tipo,maquina)=>{
    setModal({tipo,maquina});
    setModalMotivo(tipo==="apagar"?"Sin operación":MOTIVOS_PARADA[0]);
    setModalDuracion("");setModalNotas("");
  };
  const confirmModal=()=>{
    if(!modal)return;
    const {tipo,maquina}=modal;
    const next=Object.assign({},manualEstados);
    next[maquina]={status:tipo==="apagar"?"apagada":"parada",motivo:modalMotivo,notas:modalNotas,since:new Date().toISOString(),supervisor:sup.nombre};
    persistEstados(next);
    // Also create a parada record if "parar"
    if(tipo==="parar"){
      const rec={id:Date.now(),fecha:hoy,etapa:"maquina",maquina,motivoParada:modalMotivo,duracionParada:Number(modalDuracion)||0,notas:modalNotas||null,supervisorCodigo:sup.codigo,supervisorNombre:sup.nombre,empleado:sup.nombre,turno:"",pelicula:0};
      setRegs(p=>[rec,...p]);qSave(rec);
    }
    setModal(null);
  };

  // Gastos form
  const [gMaquina,setGMaquina]=useState(MAQUINA_TODAS[0]);
  const [gDesc,setGDesc]=useState("");
  const [gCosto,setGCosto]=useState("");
  const [gFecha,setGFecha]=useState(hoy);

  // Paradas form
  const [pMaquina,setPMaquina]=useState(MAQUINA_TODAS[0]);
  const [pMotivo,setPMotivo]=useState(MOTIVOS_PARADA[0]);
  const [pDuracion,setPDuracion]=useState("");
  const [pPiezasNec,setPPiezasNec]=useState("");
  const [pPiezasCam,setPPiezasCam]=useState("");
  const [pNotas,setPNotas]=useState("");
  const [pFecha,setPFecha]=useState(hoy);

  const [saved,setSaved]=useState(false);
  const [filtroMaq,setFiltroMaq]=useState("todas");

  // Filter regs for maquinaria entries
  const maqRegs=regs.filter(r=>r.etapa==="maquina");
  const maqGastos=maqRegs.filter(r=>!r.motivoParada);
  const paradas=maqRegs.filter(r=>r.motivoParada);

  const filtrar=list=>filtroMaq==="todas"?list:list.filter(r=>r.maquina===filtroMaq);

  const saveGasto=()=>{
    if(!gDesc||!gCosto)return;
    const rec={id:Date.now(),fecha:gFecha,etapa:"maquina",maquina:gMaquina,notas:gDesc,pelicula:Number(gCosto),supervisorCodigo:sup.codigo,supervisorNombre:sup.nombre,empleado:sup.nombre,turno:""};
    setRegs(p=>[rec,...p]);qSave(rec);
    // Also send to Contabilidad Gastos
    if(setGastos){
      const g={id:String(Date.now())+"maq",fecha:gFecha,categoria:"mantenimiento",monto:Number(gCosto),moneda:"HTG",descripcion:"[Máquinas] "+gMaquina+" — "+gDesc,proveedor:"",creado_por:sup.nombre,created_at:new Date().toISOString()};
      setGastos(prev=>[g,...prev]);
      dbSaveGasto(g);
    }
    setGDesc("");setGCosto("");setShowForm(false);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const saveParada=()=>{
    if(!pDuracion)return;
    const rec={id:Date.now(),fecha:pFecha,etapa:"maquina",maquina:pMaquina,motivoParada:pMotivo,duracionParada:Number(pDuracion),piezasNecesarias:pPiezasNec||null,piezasCambiadas:pPiezasCam||null,notas:pNotas||null,supervisorCodigo:sup.codigo,supervisorNombre:sup.nombre,empleado:sup.nombre,turno:"",pelicula:0};
    setRegs(p=>[rec,...p]);qSave(rec);
    setPDuracion("");setPPiezasNec("");setPPiezasCam("");setPNotas("");setShowForm(false);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const tabBtn=(id,label)=>({flex:1,background:seccion===id?"#fff":"transparent",border:"none",borderRadius:10,padding:"10px 4px",color:seccion===id?B.textDark:B.textLight,fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:seccion===id?"0 1px 4px rgba(0,0,0,.1)":"none"});
  const iS={background:B.bg,border:"1.5px solid "+B.border,borderRadius:10,padding:"10px 12px",color:B.textDark,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"};

  // Stats
  const totalGastos=filtrar(maqGastos).reduce((s,r)=>s+(Number(r.pelicula)||0),0);
  const totalParadas=filtrar(paradas).reduce((s,r)=>s+(Number(r.duracionParada)||0),0);
  const motivoCounts={};filtrar(paradas).forEach(r=>{const m=r.motivoParada||"Otro";motivoCounts[m]=(motivoCounts[m]||0)+1;});
  const topMotivo=Object.entries(motivoCounts).sort((a,b)=>b[1]-a[1])[0];

  // Per-machine summary
  const maqSummary={};
  maqRegs.forEach(r=>{
    if(!maqSummary[r.maquina])maqSummary[r.maquina]={gastos:0,paradas:0,horasParada:0};
    if(r.motivoParada){maqSummary[r.maquina].paradas++;maqSummary[r.maquina].horasParada+=Number(r.duracionParada)||0;}
    else maqSummary[r.maquina].gastos+=Number(r.pelicula)||0;
  });

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>🔧 Maquinarias</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Gastos y paradas de máquinas</p></div>

    <div style={{display:"flex",background:B.bg,borderRadius:12,padding:4,gap:3}}>
      <button onClick={()=>{setSeccion("estado");setShowForm(false);}} style={tabBtn("estado")}>📊 Estado</button>
      <button onClick={()=>{setSeccion("gastos");setShowForm(false);}} style={tabBtn("gastos")}>💰 Gastos</button>
      <button onClick={()=>{setSeccion("paradas");setShowForm(false);}} style={tabBtn("paradas")}>⏱️ Paradas</button>
    </div>

    {/* ── Estado Tab ── */}
    {seccion==="estado"&&(()=>{
      const prodRegsHoy=regs.filter(r=>r.etapa!=="maquina"&&r.fecha===hoy);
      const paradasHoy=paradas.filter(r=>r.fecha===hoy);
      const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
      const paradasWeek=paradas.filter(r=>new Date(r.fecha)>=weekAgo);
      const hrsWeek=paradasWeek.reduce((s,r)=>s+(Number(r.duracionParada)||0),0);
      const lastWeekStart=new Date();lastWeekStart.setDate(lastWeekStart.getDate()-14);
      const paradasLastWeek=paradas.filter(r=>{const d=new Date(r.fecha);return d>=lastWeekStart&&d<weekAgo;});
      const hrsLastWeek=paradasLastWeek.reduce((s,r)=>s+(Number(r.duracionParada)||0),0);
      const totalHrsParadas=paradas.reduce((s,r)=>s+(Number(r.duracionParada)||0),0);

      // Machine status — manual override wins; otherwise auto-detect from registros
      const maqStatus=MAQUINA_TODAS.map(m=>{
        const hasProd=prodRegsHoy.some(r=>r.maquina===m);
        const hasParada=paradasHoy.some(r=>r.maquina===m);
        const lastParada=paradas.filter(r=>r.maquina===m).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))[0];
        const totalHrs=paradas.filter(r=>r.maquina===m).reduce((s,r)=>s+(Number(r.duracionParada)||0),0);
        const totalParCount=paradas.filter(r=>r.maquina===m).length;
        const manual=manualEstados[m];
        const status=manual?manual.status:(hasParada?"parada":hasProd?"activa":"inactiva");
        return{maquina:m,status,hasProd,hasParada,lastParada,totalHrs,totalParCount,manual};
      });
      const activas=maqStatus.filter(m=>m.status==="activa").length;
      const paradasCount=maqStatus.filter(m=>m.status==="parada").length;
      const apagadas=maqStatus.filter(m=>m.status==="apagada").length;
      const inactivas=maqStatus.filter(m=>m.status==="inactiva").length;
      const statusColor={activa:B.green,parada:B.red,apagada:"#475569",inactiva:B.textLight};
      const statusLabel={activa:"Activa",parada:"Parada",apagada:"Apagada",inactiva:"Inactiva"};

      // Worst machine
      const worstMaq=maqStatus.filter(m=>m.totalHrs>0).sort((a,b)=>b.totalHrs-a.totalHrs)[0];

      return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
        {/* KPI cards */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
          <div style={{background:B.green+"12",borderRadius:12,padding:"12px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,color:B.green}}>{activas}</div>
            <div style={{fontSize:9,fontWeight:700,color:B.textLight}}>ACTIVAS</div>
          </div>
          <div style={{background:B.red+"12",borderRadius:12,padding:"12px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,color:B.red}}>{paradasCount}</div>
            <div style={{fontSize:9,fontWeight:700,color:B.textLight}}>PARADAS</div>
          </div>
          <div style={{background:"#47556912",borderRadius:12,padding:"12px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#475569"}}>{apagadas}</div>
            <div style={{fontSize:9,fontWeight:700,color:B.textLight}}>APAGADAS</div>
          </div>
          <div style={{background:B.bg,borderRadius:12,padding:"12px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,color:B.textLight}}>{inactivas}</div>
            <div style={{fontSize:9,fontWeight:700,color:B.textLight}}>INACTIVAS</div>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Stat label="Horas paradas (semana)" value={hrsWeek} unit="hrs" color={B.amber} sub={hrsLastWeek>0?(hrsWeek>hrsLastWeek?"↑":"↓")+" sem. anterior: "+hrsLastWeek+"h":"Sin datos previos"}/>
          <Stat label="Total paradas" value={totalHrsParadas} unit="hrs" color={B.red} sub={paradas.length+" incidentes"}/>
        </div>

        {worstMaq&&<div style={{background:B.red+"08",border:"1.5px solid "+B.red+"33",borderRadius:12,padding:"10px 14px"}}>
          <div style={{fontSize:11,color:B.textLight,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Máquina con más tiempo parada</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:B.textDark,fontSize:15,fontWeight:800}}>{worstMaq.maquina}</span>
            <span style={{color:B.red,fontSize:15,fontWeight:800}}>{worstMaq.totalHrs}h · {worstMaq.totalParCount} paradas</span>
          </div>
        </div>}

        {topMotivo&&<div style={{background:B.bg,borderRadius:10,padding:"8px 12px",fontSize:12,color:B.textMid}}>Causa más frecuente: <b>{topMotivo[0]}</b> ({topMotivo[1]}x)</div>}

        {/* All machines status */}
        <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginTop:4}}>Estado de Máquinas — Hoy</div>
        {maqStatus.map(m=>(<div key={m.maquina} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid "+B.border,flexWrap:"wrap"}}>
          <div style={{width:10,height:10,borderRadius:5,background:statusColor[m.status],flexShrink:0,boxShadow:m.status==="activa"?"0 0 0 4px "+B.green+"33":"none"}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:B.textDark,fontSize:13,fontWeight:700}}>{m.maquina}</div>
            {m.manual&&m.manual.motivo&&<div style={{color:B.textLight,fontSize:11}}>{m.manual.motivo}{m.manual.notas?" — "+m.manual.notas:""}</div>}
            {!m.manual&&m.lastParada&&<div style={{color:B.textLight,fontSize:11}}>Última parada: {m.lastParada.fecha} — {m.lastParada.motivoParada}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <Badge label={statusLabel[m.status]} color={statusColor[m.status]}/>
            {m.totalHrs>0&&<span style={{color:B.amber,fontSize:11,fontWeight:700}}>{m.totalHrs}h</span>}
          </div>
          <div style={{display:"flex",gap:6,width:"100%",marginTop:4}}>
            <button onClick={()=>activarMaquina(m.maquina)} disabled={m.status==="activa"} style={{flex:1,background:m.status==="activa"?B.green:"#fff",border:"1.5px solid "+B.green,borderRadius:8,padding:"7px 8px",color:m.status==="activa"?"#fff":B.green,fontSize:11,fontWeight:800,cursor:m.status==="activa"?"default":"pointer",opacity:m.status==="activa"?1:.95}}>● Activa</button>
            <button onClick={()=>openModal("parar",m.maquina)} style={{flex:1,background:m.status==="parada"?B.red:"#fff",border:"1.5px solid "+B.red,borderRadius:8,padding:"7px 8px",color:m.status==="parada"?"#fff":B.red,fontSize:11,fontWeight:800,cursor:"pointer"}}>■ Parar</button>
            <button onClick={()=>openModal("apagar",m.maquina)} style={{flex:1,background:m.status==="apagada"?"#475569":"#fff",border:"1.5px solid #475569",borderRadius:8,padding:"7px 8px",color:m.status==="apagada"?"#fff":"#475569",fontSize:11,fontWeight:800,cursor:"pointer"}}>⏻ Apagar</button>
          </div>
        </div>))}
      </div>);
    })()}

    {/* ── Confirmation modal for parar / apagar ── */}
    {modal&&<div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,maxWidth:420,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style={{width:44,height:44,borderRadius:12,background:(modal.tipo==="apagar"?"#47556918":B.red+"18"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{modal.tipo==="apagar"?"⏻":"■"}</div>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:B.textDark}}>{modal.tipo==="apagar"?"Apagar máquina":"Parar máquina"}</div>
            <div style={{fontSize:12,color:B.textLight,fontWeight:700}}>{modal.maquina}</div>
          </div>
        </div>
        <div style={{background:(modal.tipo==="apagar"?"#47556910":B.red+"10"),borderRadius:10,padding:"10px 12px",fontSize:12,color:B.textMid,marginBottom:14}}>
          {modal.tipo==="apagar"?"Marca esta máquina como apagada (sin operación / fábrica cerrada). No genera registro de parada.":"Confirma que la máquina se ha detenido. Se creará un registro de parada con la causa y duración."}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:.5}}>Motivo</label>
            <select value={modalMotivo} onChange={e=>setModalMotivo(e.target.value)} style={{width:"100%",background:B.bg,border:"1.5px solid "+B.border,borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}>
              {modal.tipo==="apagar"
                ?["Sin operación","Fábrica cerrada","Capacidad reducida","Cambio de turno","Mantenimiento programado","Otro"].map(m=><option key={m} value={m}>{m}</option>)
                :MOTIVOS_PARADA.map(m=><option key={m} value={m}>{m}</option>)
              }
            </select>
          </div>
          {modal.tipo==="parar"&&<div>
            <label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:.5}}>Duración estimada (horas)</label>
            <input type="number" value={modalDuracion} onChange={e=>setModalDuracion(e.target.value)} placeholder="0" style={{width:"100%",background:B.bg,border:"1.5px solid "+B.border,borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>}
          <div>
            <label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:.5}}>Notas (opcional)</label>
            <input value={modalNotas} onChange={e=>setModalNotas(e.target.value)} placeholder="Detalles adicionales..." style={{width:"100%",background:B.bg,border:"1.5px solid "+B.border,borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={()=>setModal(null)} style={{flex:1,background:B.bg,border:"1.5px solid "+B.border,borderRadius:10,padding:"12px",color:B.textMid,fontSize:14,fontWeight:700,cursor:"pointer"}}>Cancelar</button>
          <button onClick={confirmModal} style={{flex:1,background:modal.tipo==="apagar"?"#475569":B.red,border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer"}}>{modal.tipo==="apagar"?"⏻ Confirmar apagar":"■ Confirmar parada"}</button>
        </div>
      </div>
    </div>}

    {/* Summary cards — for gastos/paradas tabs */}
    {seccion!=="estado"&&<React.Fragment>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Gastos totales" value={"$"+totalGastos.toLocaleString()} color={B.red}/>
      <Stat label={"Paradas ("+filtrar(paradas).length+")"} value={totalParadas+" hrs"} color={B.amber}/>
    </div>
    {topMotivo&&<div style={{background:B.bg,borderRadius:10,padding:"8px 12px",fontSize:12,color:B.textMid}}>Causa más frecuente: <b>{topMotivo[0]}</b> ({topMotivo[1]}x)</div>}

    {/* Machine filter */}
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <span style={{color:B.textLight,fontSize:12,fontWeight:700}}>Máquina:</span>
      <select value={filtroMaq} onChange={e=>setFiltroMaq(e.target.value)} style={Object.assign({},iS,{width:"auto",flex:1,padding:"8px 10px"})}>
        <option value="todas">Todas</option>
        {MAQUINA_TODAS.map(m=><option key={m} value={m}>{m}</option>)}
      </select>
    </div>

    {/* Per-machine summary (when showing all) */}
    {filtroMaq==="todas"&&Object.keys(maqSummary).length>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
      <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:"uppercase"}}>Resumen por máquina</div>
      {Object.entries(maqSummary).sort((a,b)=>(b[1].gastos+b[1].horasParada)-(a[1].gastos+a[1].horasParada)).map(([m,s])=>(
        <div key={m} style={{background:"#fff",borderRadius:10,padding:"10px 12px",border:"1px solid "+B.border,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:B.textDark,fontSize:13,fontWeight:700}}>{m}</span>
          <div style={{display:"flex",gap:12}}>
            {s.gastos>0&&<span style={{color:B.red,fontSize:12,fontWeight:700}}>${s.gastos.toLocaleString()}</span>}
            {s.paradas>0&&<span style={{color:B.amber,fontSize:12,fontWeight:700}}>{s.paradas} paradas · {s.horasParada}h</span>}
          </div>
        </div>
      ))}
    </div>}

    {saved&&<div style={{background:B.green+"15",border:"1.5px solid "+B.green,borderRadius:10,padding:"10px 14px",color:B.green,fontSize:13,fontWeight:700,textAlign:"center"}}>✓ Guardado</div>}

    {/* Add button */}
    {!showForm&&<button onClick={()=>setShowForm(true)} style={{background:"linear-gradient(135deg,"+B.teal+","+B.tealDark+")",border:"none",borderRadius:14,padding:"14px",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 16px rgba(91,173,168,.3)"}}>
      {seccion==="gastos"?"+ Registrar Gasto":"+ Registrar Parada"}
    </button>}

    {/* Gastos form */}
    {showForm&&seccion==="gastos"&&<div style={{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid "+B.border,display:"flex",flexDirection:"column",gap:12}}>
      <div style={{color:B.textDark,fontSize:14,fontWeight:800}}>💰 Nuevo Gasto</div>
      <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Máquina</label>
        <select value={gMaquina} onChange={e=>setGMaquina(e.target.value)} style={iS}>{MAQUINA_TODAS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Descripción</label>
        <input value={gDesc} onChange={e=>setGDesc(e.target.value)} placeholder="Ej: Cambio de resistencia" style={iS}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Costo ($)</label>
          <input type="number" value={gCosto} onChange={e=>setGCosto(e.target.value)} placeholder="0" style={iS}/></div>
        <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Fecha</label>
          <input type="date" value={gFecha} onChange={e=>setGFecha(e.target.value)} style={iS}/></div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={saveGasto} style={{flex:1,background:"linear-gradient(135deg,"+B.teal+","+B.tealDark+")",border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>Guardar</button>
        <button onClick={()=>setShowForm(false)} style={{background:B.bg,border:"1px solid "+B.border,borderRadius:10,padding:"12px 16px",color:B.textMid,fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
      </div>
    </div>}

    {/* Paradas form */}
    {showForm&&seccion==="paradas"&&<div style={{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid "+B.border,display:"flex",flexDirection:"column",gap:12}}>
      <div style={{color:B.textDark,fontSize:14,fontWeight:800}}>⏱️ Nueva Parada</div>
      <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Máquina</label>
        <select value={pMaquina} onChange={e=>setPMaquina(e.target.value)} style={iS}>{MAQUINA_TODAS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Motivo</label>
        <select value={pMotivo} onChange={e=>setPMotivo(e.target.value)} style={iS}>{MOTIVOS_PARADA.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Duración (horas)</label>
          <input type="number" value={pDuracion} onChange={e=>setPDuracion(e.target.value)} placeholder="0" style={iS}/></div>
        <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Fecha</label>
          <input type="date" value={pFecha} onChange={e=>setPFecha(e.target.value)} style={iS}/></div>
      </div>
      <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Piezas necesarias</label>
        <input value={pPiezasNec} onChange={e=>setPPiezasNec(e.target.value)} placeholder="Ej: Rodamiento, correa" style={iS}/></div>
      <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Piezas cambiadas</label>
        <input value={pPiezasCam} onChange={e=>setPPiezasCam(e.target.value)} placeholder="Ej: Rodamiento reemplazado" style={iS}/></div>
      <div><label style={{color:B.textLight,fontSize:11,fontWeight:700,marginBottom:4,display:"block"}}>Notas</label>
        <input value={pNotas} onChange={e=>setPNotas(e.target.value)} placeholder="Detalles adicionales" style={iS}/></div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={saveParada} style={{flex:1,background:"linear-gradient(135deg,"+B.amber+","+B.red+")",border:"none",borderRadius:10,padding:"12px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>Guardar</button>
        <button onClick={()=>setShowForm(false)} style={{background:B.bg,border:"1px solid "+B.border,borderRadius:10,padding:"12px 16px",color:B.textMid,fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
      </div>
    </div>}

    {/* Log list */}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>

// ── Caja Chica ──────────────────────────────────────────────────────────────
function CajaChica({sup,gastos,setGastos}){
  const SK="plastinord_caja_chica";
  const SK_HIST="plastinord_caja_chica_hist";
  const [movimientos,setMovimientos]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK)||"[]");}catch(e){return[];}});
  const [historial,setHistorial]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK_HIST)||"[]");}catch(e){return[];}});
  const [modo,setModo]=useState(false);
  const [verHist,setVerHist]=useState(false);
  const [form,setForm]=useState({fecha:new Date().toISOString().split("T")[0],tipo:"salida",concepto:"",monto:"",responsable:sup?sup.nombre:""});
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  const persist=(list)=>{localStorage.setItem(SK,JSON.stringify(list));};
  const persistHist=(list)=>{localStorage.setItem(SK_HIST,JSON.stringify(list));};

  const save=()=>{
    if(!form.monto||!form.concepto)return;
    const m={id:String(Date.now()),fecha:form.fecha,tipo:form.tipo,concepto:form.concepto,monto:Number(form.monto),responsable:form.responsable,created_at:new Date().toISOString()};
    const next=[m,...movimientos];
    setMovimientos(next);persist(next);
    setForm({fecha:new Date().toISOString().split("T")[0],tipo:"salida",concepto:"",monto:"",responsable:sup?sup.nombre:""});
    setModo(false);
  };

  const del=(id)=>{
    const next=movimientos.filter(m=>m.id!==id);
    setMovimientos(next);persist(next);
  };

  const cerrarCaja=async()=>{
    const salidasList=movimientos.filter(m=>m.tipo==="salida");
    if(salidasList.length===0)return;
    if(!confirm("¿Cerrar caja? Se enviarán "+salidasList.length+" salidas a Gastos y se limpiará la caja."))return;
    const hoy=new Date().toISOString().split("T")[0];
    for(const m of salidasList){
      const g={id:String(Date.now())+Math.random(),fecha:m.fecha,categoria:"caja_chica",monto:m.monto,moneda:"HTG",descripcion:"[Caja Chica] "+m.concepto+(m.responsable?" — "+m.responsable:""),proveedor:"",creado_por:sup.nombre,created_at:new Date().toISOString()};
      setGastos(prev=>[g,...prev]);
      await dbSaveGasto(g);
    }
    const cierre={id:String(Date.now()),fecha:hoy,cerrado_por:sup.nombre,entradas:movimientos.filter(m=>m.tipo==="entrada").reduce((s,m)=>s+m.monto,0),salidas:salidasList.reduce((s,m)=>s+m.monto,0),items:salidasList.length,movimientos:[...movimientos]};
    const nextHist=[cierre,...historial];
    setHistorial(nextHist);persistHist(nextHist);
    setMovimientos([]);persist([]);
  };

  const entradas=movimientos.filter(m=>m.tipo==="entrada").reduce((s,m)=>s+m.monto,0);
  const salidas=movimientos.filter(m=>m.tipo==="salida").reduce((s,m)=>s+m.monto,0);
  const saldo=entradas-salidas;
  const salidasCount=movimientos.filter(m=>m.tipo==="salida").length;

  const [filtro,setFiltro]=useState("todos");
  const filtered=filtro==="todos"?movimientos:movimientos.filter(m=>m.tipo===filtro);

  if(verHist){
    return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <button onClick={()=>setVerHist(false)} style={{alignSelf:"flex-start",background:"none",border:"none",color:B.teal,fontSize:14,fontWeight:700,cursor:"pointer",padding:0}}>← Volver</button>
      <div style={{fontSize:16,fontWeight:800,color:B.navy}}>Historial de Cierres</div>
      {historial.length===0&&<Card style={{textAlign:"center",padding:30}} ch={<div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin cierres anteriores</div>}/>}
      {historial.map(h=><Card key={h.id} ch={<div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:14,fontWeight:800,color:B.textDark}}>Cierre {h.fecha}</span>
          <span style={{fontSize:13,fontWeight:700,color:B.textLight}}>{h.items} salidas</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div style={{background:B.bg,borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>ENTRADAS</div>
            <div style={{fontSize:14,fontWeight:800,color:B.green}}>HTG {h.entradas.toLocaleString()}</div>
          </div>
          <div style={{background:B.bg,borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>SALIDAS</div>
            <div style={{fontSize:14,fontWeight:800,color:B.red}}>HTG {h.salidas.toLocaleString()}</div>
          </div>
        </div>
        <div style={{fontSize:11,color:B.textLight}}>Cerrado por: {h.cerrado_por}</div>
        {h.movimientos&&<details style={{marginTop:8}}><summary style={{fontSize:12,color:B.teal,fontWeight:700,cursor:"pointer"}}>Ver detalle</summary>
          <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:4}}>
            {h.movimientos.map(m=><div key={m.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid "+B.border}}>
              <span style={{color:m.tipo==="entrada"?B.green:B.red}}>{m.tipo==="entrada"?"+":"−"} HTG {m.monto.toLocaleString()}</span>
              <span style={{color:B.textLight}}>{m.concepto}</span>
            </div>)}
          </div>
        </details>}
      </div>}/>)}
    </div>);
  }

  return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
      <Stat label="Entradas" value={"HTG "+entradas.toLocaleString()} color={B.green}/>
      <Stat label="Salidas" value={"HTG "+salidas.toLocaleString()} color={B.red}/>
      <Stat label="Saldo" value={"HTG "+saldo.toLocaleString()} color={saldo>=0?B.teal:B.red}/>
    </div>
    <div style={{display:"flex",gap:6}}>
      {[["todos","Todos"],["entrada","Entradas"],["salida","Salidas"]].map(([v,l])=>
        <button key={v} onClick={()=>setFiltro(v)} style={{background:filtro===v?B.navy:"transparent",border:"1.5px solid "+(filtro===v?B.navy:B.border),borderRadius:20,padding:"6px 14px",color:filtro===v?"#fff":B.textMid,fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>
      )}
      <button onClick={()=>setVerHist(true)} style={{marginLeft:"auto",background:"transparent",border:"1.5px solid "+B.border,borderRadius:20,padding:"6px 14px",color:B.textMid,fontSize:12,fontWeight:700,cursor:"pointer"}}>Historial</button>
    </div>
    <div style={{display:"flex",gap:8}}>
      {!modo&&<Btn ch="+ Nuevo Movimiento" fn={()=>setModo(true)} full/>}
      {salidasCount>0&&!modo&&<Btn ch={"Cerrar Caja ("+salidasCount+")"} fn={cerrarCaja} color={B.red} full/>}
    </div>
    {modo&&<Card ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{color:B.navy,fontSize:16,fontWeight:800}}>Nuevo Movimiento</div>
      <F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/>
      <S label="Tipo" value={form.tipo} onChange={set("tipo")} options={[{v:"entrada",l:"Entrada (Reposición)"},{v:"salida",l:"Salida (Gasto)"}]}/>
      <F label="Concepto" value={form.concepto} onChange={set("concepto")} placeholder="Descripción del movimiento"/>
      <F label="Monto (HTG)" value={form.monto} onChange={set("monto")} type="number" placeholder="0.00"/>
      <F label="Responsable" value={form.responsable} onChange={set("responsable")} placeholder="Nombre"/>
      <div style={{display:"flex",gap:8}}>
        <Btn ch="Guardar" fn={save} full/><Btn ch="Cancelar" fn={()=>setModo(false)} outline small/>
      </div>
    </div>}/>}
    {filtered.length===0&&<Card style={{textAlign:"center",padding:30}} ch={<div><div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin movimientos</div></div>}/>}
    {filtered.map(m=><Card key={m.id} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
          <Badge label={m.tipo==="entrada"?"Entrada":"Salida"} color={m.tipo==="entrada"?B.green:B.red}/>
          <span style={{color:B.textLight,fontSize:12}}>{m.fecha}</span>
        </div>
        <div style={{color:B.textDark,fontSize:15,fontWeight:800}}>{m.tipo==="entrada"?"+":"−"} HTG {m.monto.toLocaleString()}</div>
        <div style={{color:B.textMid,fontSize:13}}>{m.concepto}</div>
        {m.responsable&&<div style={{color:B.textLight,fontSize:11,marginTop:2}}>{m.responsable}</div>}
      </div>
      {isSartori(sup)&&<Btn ch="✕" fn={()=>{if(confirm("¿Eliminar este movimiento?"))del(m.id);}} color={B.red} outline small/>}
    </div>}/>)}
  </div>);
}

const DIAS_QUINCENA=12;
// Haitian payroll deduction rates (employee share). Verify with ONA/OFATMA.
const AFP_RATE=0.03, ARS_RATE=0.03;
const MESES_LABEL=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function getQuincenaKey(y,m,q){return y+"-"+String(m).padStart(2,"0")+"-"+(q===1?"15":"30");}
function getQuincenaLabel(key){const[y,m,d]=key.split("-");return(d==="15"?"1ra":"2da")+" Quincena "+MESES_LABEL[Number(m)-1]+" "+y;}
function calcISR(salarioMensual){const anual=salarioMensual*12;if(anual<=ISR_EXENTO_ANUAL)return 0;return((anual-ISR_EXENTO_ANUAL)*0.15)/24;}

// Module-scope helpers so React preserves <input> DOM (and focus) across re-renders.
// They read the latest draft state via a ref, so users can keep typing without losing focus.
function NominaInputRow({label,nombre,campo,unit,placeholder,step,stateRef}){
  const [,force]=React.useReducer(x=>x+1,0);
  const s=stateRef.current;
  const val=s.getVal(nombre,campo);
  const hasVal=val!==""&&Number(val)>0;
  return(
    <div style={{padding:"4px 0"}}>
      <div style={{fontSize:11,color:B.textMid,fontWeight:600,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.3px"}}>{label}{unit?<span style={{color:B.textLight,fontWeight:400}}> · {unit}</span>:""}</div>
      <input type="number" inputMode="decimal" step={step||"0.001"} value={val} placeholder={placeholder||"0"}
        onChange={ev=>{stateRef.current.setField(nombre,campo,ev.target.value);force();}}
        disabled={s.isProcesada}
        style={{width:"100%",padding:"12px 14px",border:"2px solid "+(hasVal?B.teal:B.border),borderRadius:10,fontSize:20,fontWeight:700,textAlign:"right",background:s.isProcesada?B.bg:(hasVal?"#F0FDFC":"#fff"),color:hasVal?B.tealDark:B.textDark,boxSizing:"border-box",outline:"none"}}/>
    </div>
  );
}
function NominaTextRow({label,nombre,campo,placeholder,stateRef}){
  const [,force]=React.useReducer(x=>x+1,0);
  const s=stateRef.current;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:4,padding:"5px 0"}}>
      <span style={{fontSize:12,color:B.textMid}}>{label}</span>

        style={{width:"100%",padding:"8px 10px",border:"1.5px solid "+B.border,borderRadius:8,fontSize:13,background:s.isProcesada?B.bg:"#fff",boxSizing:"border-box"}}/>
    </div>
  );
}

function Nomina({sup,gastos,setGastos}){
  const SK_DRAFT="plastinord_nomina_draft";
  const SK_HIST="plastinord_nominas_hist";

  // Current period
  const hoy=new Date();
  const qActual=hoy.getDate()<=15?1:2;
  const [anio,setAnio]=useState(hoy.getFullYear());
  const [mes,setMes]=useState(hoy.getMonth()+1);
  const [quincena,setQuincena]=useState(qActual);
  const periodoKey=getQuincenaKey(anio,mes,quincena);

  // Draft data per period
  const [drafts,setDrafts]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK_DRAFT)||"{}");}catch(e){return{};}});
  const [historial,setHistorial]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK_HIST)||"[]");}catch(e){return[];}});

  // On mount: pull historial from Supabase AND backfill any localStorage entries
  // that aren't yet in DB (e.g. nóminas processed before the nominas table existed,
  // or while another device was offline). DB version wins per-id collisions.
  useEffect(()=>{
    dbLoadNominas().then(dbList=>{
      const dbArr=dbList||[];
      const dbIds=new Set(dbArr.map(h=>String(h.id)));
      setHistorial(prev=>{
        // Push localStorage-only entries up to DB so all users can see them
        prev.filter(h=>!dbIds.has(String(h.id))).forEach(h=>{
          dbSaveNomina(h).catch(err=>console.error("backfill dbSaveNomina",err));
        });
        const byId=new Map();
        prev.forEach(h=>byId.set(String(h.id),h));
        dbArr.forEach(h=>byId.set(String(h.id),h)); // DB wins on conflict
        const merged=Array.from(byId.values()).sort((a,b)=>new Date(b.fecha||0)-new Date(a.fecha||0));
        try{localStorage.setItem(SK_HIST,JSON.stringify(merged));}catch(e){}
        return merged;
      });
    });
  },[]);

  const [vista,setVista]=useState("procesar"); // procesar | historial
  const [detalle,setDetalle]=useState(null);
  const [grupo,setGrupo]=useState("nomina"); // nomina | adicional | otros
  const [tasaCambio,setTasaCambio]=useState(()=>{try{return Number(localStorage.getItem("plastinord_tasa_htg_usd"))||132;}catch(e){return 132;}});
  const [confirmando,setConfirmando]=useState(false);

  const draft=drafts[periodoKey]||{};
  const isProcesada=historial.some(h=>h.periodo===periodoKey);

  const setField=(nombre,campo,val)=>{
    setDrafts(prev=>{
      const pd={...(prev[periodoKey]||{})};
      pd[nombre]={...(pd[nombre]||{}),[campo]:val};
      const next={...prev,[periodoKey]:pd};
      try{localStorage.setItem(SK_DRAFT,JSON.stringify(next));}catch(e){console.error("setField persist",e);}
      return next;
    });
  };
  const setText=(nombre,campo,val)=>{
    setDrafts(prev=>{
      const pd={...(prev[periodoKey]||{})};
      pd[nombre]={...(pd[nombre]||{}),[campo]:val};
      const next={...prev,[periodoKey]:pd};
      try{localStorage.setItem(SK_DRAFT,JSON.stringify(next));}catch(e){console.error("setText persist",e);}
      return next;
    });
  };
  const getVal=(nombre,campo)=>{const d=draft[nombre];return d&&d[campo]!=null&&d[campo]!==""?d[campo]:""};
  const getNum=(nombre,campo,def)=>{const v=getVal(nombre,campo);return v===""?def:Number(v)||0;};
  const [savedToast,setSavedToast]=useState(false);
  const showSavedToast=()=>{setSavedToast(true);setTimeout(()=>setSavedToast(false),1800);};

  const empNomina=EMPLEADOS.filter(e=>e.tipo==="nomina"&&e.salario);
  const empAdicional=EMPLEADOS.filter(e=>e.tipo==="adicional"&&e.salario);

  const calcRow=(e)=>{
    const quincenal=e.salario/2;
    const customSalario=getVal(e.nombre,"salarioGanado");
    const salarioGanado=customSalario!==""?Number(customSalario):quincenal;
    const afp=salarioGanado*AFP_RATE;
    const ars=salarioGanado*ARS_RATE;
    const isr=customSalario!==""?calcISR(salarioGanado*2)*(salarioGanado/(e.salario/2)):calcISR(e.salario);
    // salario diario = salario mensual / 23.83
    const salarioDiario=e.salario/23.83;
    const horaBase=salarioDiario/8;
    const hExtra=getNum(e.nombre,"horasExtra",0);
    const hNoct=getNum(e.nombre,"horasNocturnas",0);
    const hFer=getNum(e.nombre,"horasFeriadas",0);
    const nCargas=getNum(e.nombre,"cargaCamion",0);
    const precioCarga=getNum(e.nombre,"precioCarga",750);
    const nComida=getNum(e.nombre,"comida",0);
    const nComidaSab=getNum(e.nombre,"comidaSabado",0);
    const incMonto=getNum(e.nombre,"incentivo",0);
    const desc=getNum(e.nombre,"descuento",0);
    const otrasDed=getNum(e.nombre,"otrasDeducciones",0);
    const montoHExtra=hExtra*horaBase*1.35;
    const montoHNoct=hNoct*horaBase*0.15;
    const montoHFer=hFer*horaBase*2;
    const montoCarga=nCargas*precioCarga;
    const montoComida=nComida*25+nComidaSab*150; // comida se descuenta del salario
    const totalInc=montoHExtra+montoHNoct+montoHFer+montoCarga+incMonto;
    const totalDed=afp+ars+isr+otrasDed+montoComida;
    const neto=salarioGanado+totalInc-totalDed-desc;
    return{nombre:e.nombre,cargo:e.cargo,ci:e.ci,ingreso:e.ingreso,salario:e.salario,salarioDiario,quincenal,salarioGanado,afp,ars,isr,otrasDed,totalDed,hExtra,hNoct,hFer,montoHExtra,montoHNoct,montoHFer,nCargas,montoCarga,nComida,montoComida,incMonto,totalInc,desc,neto,tipo:"nomina"};
  };

  const calcAdicional=(e)=>{
    const quincenal=e.salario/2;
    const customSalario=getVal(e.nombre,"salarioGanado");
    const salarioGanado=customSalario!==""?Number(customSalario):quincenal;
    const salarioDiario=e.salario/23.83;
    const nCargas=getNum(e.nombre,"cargaCamion",0);
    const precioCarga=getNum(e.nombre,"precioCarga",750);
    const nComida=getNum(e.nombre,"comida",0);
    const nComidaSab=getNum(e.nombre,"comidaSabado",0);
    const incMonto=getNum(e.nombre,"incentivo",0);
    const adicional=getNum(e.nombre,"adicional",0);
    const desc=getNum(e.nombre,"descuento",0);
    const montoCarga=nCargas*precioCarga;
    const montoComida=nComida*25+nComidaSab*150; // comida se descuenta del salario
    const totalInc=montoCarga+incMonto+adicional;
    const totalDed=montoComida;
    const neto=salarioGanado+totalInc-totalDed-desc;
    return{nombre:e.nombre,cargo:e.cargo,ingreso:e.ingreso,salario:e.salario,salarioDiario,quincenal,salarioGanado,nCargas,montoCarga,nComida,montoComida,incMonto,adicional,totalInc,totalDed,desc,neto,tipo:"adicional"};
  };

  const rowsNomina=empNomina.map(calcRow);
  const rowsAdicional=empAdicional.map(calcAdicional);
  const rowsOtros=OTROS_PAGOS.map(o=>{const quin=o.mensual/2;const netoRD=o.moneda==="US$"?quin*tasaCambio:quin;return{nombre:o.nombre,cargo:o.cargo,moneda:o.moneda,quincenal:quin,netoUSD:o.moneda==="US$"?quin:null,neto:netoRD,tipo:"otros"};});

  const totalNomina=rowsNomina.reduce((s,r)=>s+r.neto,0);
  const totalAdicional=rowsAdicional.reduce((s,r)=>s+r.neto,0);
  const totalOtros=rowsOtros.reduce((s,r)=>s+r.neto,0);
  const totalDedAll=rowsNomina.reduce((s,r)=>s+r.totalDed,0)+rowsAdicional.reduce((s,r)=>s+r.totalDed,0);
  const totalIncAll=rowsNomina.reduce((s,r)=>s+r.totalInc,0)+rowsAdicional.reduce((s,r)=>s+r.totalInc,0);
  const grandTotal=totalNomina+totalAdicional+totalOtros;

  const fmt=(n)=>"HTG "+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3});
  const fmtD=(n)=>Number(n||0).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3});

  const procesarNomina=async()=>{
    if(isProcesada){alert("Esta quincena ya fue procesada.");return;}
    setConfirmando(true);
  };
  const confirmarProcesar=async()=>{
    setConfirmando(false);
    try{
      const label=getQuincenaLabel(periodoKey);
      const getNotas=(nombre)=>getVal(nombre,"descuentoNotas")||"";
      // Save the FULL calcRow output per employee so the historial supports auditing
      // and drilldown later (afp, ars, isr, hours breakdown, montos, comida, etc.)
      const record={id:String(Date.now()),periodo:periodoKey,label,fecha:new Date().toISOString(),procesado_por:sup.nombre,
        nomina:rowsNomina.map(r=>Object.assign({},r,{notas:getNotas(r.nombre)})),
        adicional:rowsAdicional.map(r=>Object.assign({},r,{notas:getNotas(r.nombre)})),
        otros:rowsOtros.map(r=>Object.assign({},r,{tasaCambio:r.moneda==="US$"?tasaCambio:null})),
        totalNomina,totalAdicional,totalOtros,grandTotal,totalDedAll,totalIncAll};
      const next=[record,...historial];
      setHistorial(next);
      try{
        localStorage.setItem(SK_HIST,JSON.stringify(next));
      }catch(persistErr){
        console.error("localStorage SK_HIST",persistErr);
        alert("⚠ Atención: la nómina se procesó pero no se pudo guardar el historial local (cuota llena o navegador en privado). Exporte un backup desde el menú principal.");
      }
      // Persist full record to Supabase nominas table (requires table to exist)
      try{await dbSaveNomina(record);}catch(dbErr){console.error("dbSaveNomina",dbErr);}
      // Send to Gastos
      const gastoEntries=[];
      if(totalNomina>0)gastoEntries.push({id:String(Date.now())+"n",fecha:periodoKey,categoria:"nomina",monto:totalNomina,moneda:"HTG",descripcion:"[Nómina] "+label+" — Principal ("+rowsNomina.length+" empleados)",proveedor:"",creado_por:sup.nombre,created_at:new Date().toISOString()});
      if(totalAdicional>0)gastoEntries.push({id:String(Date.now())+"a",fecha:periodoKey,categoria:"nomina",monto:totalAdicional,moneda:"HTG",descripcion:"[Nómina] "+label+" — Adicional ("+rowsAdicional.length+" empleados)",proveedor:"",creado_por:sup.nombre,created_at:new Date().toISOString()});
      if(totalOtros>0)gastoEntries.push({id:String(Date.now())+"o",fecha:periodoKey,categoria:"nomina",monto:totalOtros,moneda:"HTG",descripcion:"[Nómina] "+label+" — Otros Pagos",proveedor:"",creado_por:sup.nombre,created_at:new Date().toISOString()});
      for(const g of gastoEntries){
        setGastos(prev=>[g,...prev]);
        try{await dbSaveGasto(g);}catch(err){console.error("dbSaveGasto",err);}
      }
      showSavedToast();
      setVista("historial");
      alert("✓ Nómina procesada — "+fmt(grandTotal)+" enviado a Contabilidad / Gastos.");
    }catch(err){
      console.error("procesarNomina",err);
      alert("Error al procesar nómina: "+(err.message||err));
    }
  };

  // Stable refs to NominaInputRow / NominaTextRow so the underlying <input> nodes
  // are NOT remounted on every keystroke (which would drop focus and force the user
  // to click back into the field).
  const stateRef=React.useRef({});
  stateRef.current={getVal,setField,setText,isProcesada};
  const InputRow=React.useCallback((props)=><NominaInputRow {...props} stateRef={stateRef}/>,[]);
  const TextRow=React.useCallback((props)=><NominaTextRow {...props} stateRef={stateRef}/>,[]);

  // Detail view
  if(detalle){
    const r=detalle;
    const isAd=r.tipo==="adicional";
    const isOtros=r.tipo==="otros";
    if(isOtros)return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <button onClick={()=>setDetalle(null)} style={{alignSelf:"flex-start",background:"none",border:"none",color:B.teal,fontSize:14,fontWeight:700,cursor:"pointer",padding:0}}>← Volver</button>
      <Card ch={<div>
        <div style={{fontSize:18,fontWeight:800,color:B.textDark}}>{r.nombre}</div>
        <div style={{fontSize:13,color:B.textMid,marginBottom:8}}>{r.cargo}{r.moneda?" · "+r.moneda:""}</div>
        {r.moneda==="US$"&&<div style={{background:B.bg,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700,textTransform:"uppercase"}}>Quincenal USD</div>
          <div style={{fontSize:20,fontWeight:800,color:B.amber}}>US$ {r.quincenal.toLocaleString()}</div>
        </div>}
        <div style={{background:B.bg,borderRadius:10,padding:"10px 12px"}}>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700,textTransform:"uppercase"}}>{r.moneda==="US$"?"Convertido a HTG (tasa: "+tasaCambio+")":"Quincenal"}</div>
          <div style={{fontSize:20,fontWeight:800,color:B.teal}}>HTG {Number(r.neto||0).toLocaleString(undefined,{minimumFractionDigits:3,maximumFractionDigits:3})}</div>
        </div>
      </div>}/>
    </div>);

    return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
      <button onClick={()=>setDetalle(null)} style={{alignSelf:"flex-start",background:"none",border:"none",color:B.teal,fontSize:14,fontWeight:700,cursor:"pointer",padding:0}}>← Volver</button>
      <Card ch={<div>
        <div style={{fontSize:17,fontWeight:800,color:B.textDark}}>{r.nombre}</div>
        <div style={{fontSize:12,color:B.textMid,marginBottom:8}}>{r.cargo}{r.ingreso?" · Desde "+r.ingreso:""}</div>
        {r.ci&&<div style={{fontSize:11,color:B.textLight,marginBottom:8}}>C.I.: {r.ci}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{background:B.bg,borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>MENSUAL</div>
            <div style={{fontSize:16,fontWeight:800,color:B.navy}}>{fmt(r.salario)}</div>
          </div>
          <div style={{background:B.bg,borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>DIARIO (÷23.83)</div>
            <div style={{fontSize:16,fontWeight:800,color:B.textMid}}>HTG {fmtD(r.salarioDiario||(r.salario/23.83))}</div>
          </div>
        </div>
      </div>}/>

      <Card ch={<div>
        <div style={{fontSize:13,fontWeight:800,color:B.navy,marginBottom:8}}>Salario Quincena</div>
        <InputRow label={"Salario ganado (quincenal: "+fmt(r.quincenal)+")"} nombre={r.nombre} campo="salarioGanado" unit="HTG" placeholder={String(Math.round(r.quincenal))}/>
        <TextRow label="Notas (descuento / ajuste)" nombre={r.nombre} campo="descuentoNotas" placeholder="Motivo del descuento o ajuste..."/>
        <div style={{padding:"6px 0",display:"flex",justifyContent:"space-between",borderTop:"1px solid "+B.border,marginTop:4}}>
          <span style={{fontSize:12,fontWeight:700,color:B.textDark}}>Salario ganado{!isAd?" bruto":""}</span>
          <span style={{fontSize:13,fontWeight:800,color:B.navy}}>{fmt(r.salarioGanado)}</span>
        </div>
        {!isAd&&<React.Fragment>
          <div style={{padding:"4px 0",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:11,color:B.textMid}}>(−) ONA (3%)</span>
            <span style={{fontSize:12,fontWeight:600,color:B.red}}>−{fmtD(r.afp)}</span>
          </div>
          <div style={{padding:"4px 0",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:11,color:B.textMid}}>(−) OFATMA (3%)</span>
            <span style={{fontSize:12,fontWeight:600,color:B.red}}>−{fmtD(r.ars)}</span>
          </div>
          <div style={{padding:"6px 0",display:"flex",justifyContent:"space-between",borderTop:"1px solid "+B.border,marginTop:4}}>
            <span style={{fontSize:12,fontWeight:800,color:B.textDark}}>Salario ganado neto</span>
            <span style={{fontSize:14,fontWeight:800,color:B.teal}}>{fmt(r.salarioGanado-r.afp-r.ars)}</span>
          </div>
        </React.Fragment>}
      </div>}/>

      <Card ch={<div style={{display:"flex",flexDirection:"column",gap:6}}>
        <div style={{fontSize:13,fontWeight:800,color:B.navy,marginBottom:4}}>Deducciones</div>
        {!isAd&&[["IRPP",r.isr]].map(([l,v])=>
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:B.bg,borderRadius:8,padding:"10px 12px"}}>
            <span style={{fontSize:13,color:B.textMid,fontWeight:600}}>{l}</span>
            <span style={{fontSize:15,fontWeight:800,color:v>0?B.red:B.textLight}}>{fmtD(v)}</span>
          </div>)}
        <InputRow label="Comidas (L-V)" nombre={r.nombre} campo="comida" unit="uds"/>
        <InputRow label="Comidas sábado" nombre={r.nombre} campo="comidaSabado" unit="uds"/>
        {(getNum(r.nombre,"comida",0)*25+getNum(r.nombre,"comidaSabado",0)*150)>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}>
          <span style={{fontSize:11,color:B.textLight,fontStyle:"italic"}}>Total comida descontada</span>
          <span style={{fontSize:12,fontWeight:700,color:B.red}}>-{fmtD(getNum(r.nombre,"comida",0)*25+getNum(r.nombre,"comidaSabado",0)*150)}</span>
        </div>}
        {!isAd&&<InputRow label="Otras deducciones" nombre={r.nombre} campo="otrasDeducciones" unit="HTG"/>}
        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:"1px solid "+B.border,marginTop:4}}>
          <span style={{fontSize:12,fontWeight:700,color:B.textDark}}>Total Deducciones</span>
          <span style={{fontSize:13,fontWeight:800,color:B.red}}>{fmtD((()=>{
            const _com=getNum(r.nombre,"comida",0)*25+getNum(r.nombre,"comidaSabado",0)*150;
            const _otras=getNum(r.nombre,"otrasDeducciones",0);
            return isAd?_com:(r.isr+_otras+_com);
          })())}</span>
        </div>
      </div>}/>

      <Card ch={<div style={{display:"flex",flexDirection:"column",gap:6}}>
        <div style={{fontSize:13,fontWeight:800,color:B.navy,marginBottom:4}}>Incentivos / Extras</div>
        {!isAd&&<React.Fragment>
          <InputRow label="Horas extra" nombre={r.nombre} campo="horasExtra" unit="hrs" step="0.25" placeholder="0.25 / 0.5 / 1"/>
          <InputRow label="Horas nocturnas" nombre={r.nombre} campo="horasNocturnas" unit="hrs" step="0.25"/>
          <InputRow label="Horas feriadas" nombre={r.nombre} campo="horasFeriadas" unit="hrs" step="0.25"/>
        </React.Fragment>}
        <InputRow label="Cargas de camión" nombre={r.nombre} campo="cargaCamion" unit="cargas"/>
        <InputRow label="  Precio por carga" nombre={r.nombre} campo="precioCarga" unit="HTG" placeholder="750"/>
        <InputRow label="Incentivo" nombre={r.nombre} campo="incentivo" unit="HTG" wide/>
        {isAd&&<InputRow label="Adicional" nombre={r.nombre} campo="adicional" unit="HTG" wide/>}
        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:"1px solid "+B.border,marginTop:4}}>
          <span style={{fontSize:12,fontWeight:700,color:B.textDark}}>Total Incentivos</span>
          <span style={{fontSize:13,fontWeight:800,color:B.green}}>{fmt(
            (()=>{
              const _hb=r.salarioDiario/8;
              const _hE=getNum(r.nombre,"horasExtra",0);
              const _hN=getNum(r.nombre,"horasNocturnas",0);
              const _hF=getNum(r.nombre,"horasFeriadas",0);
              const _nC=getNum(r.nombre,"cargaCamion",0);
              const _pC=getNum(r.nombre,"precioCarga",750);
              const _inc=getNum(r.nombre,"incentivo",0);
              const _adic=isAd?getNum(r.nombre,"adicional",0):0;
              return _hE*_hb*1.35+_hN*_hb*0.15+_hF*_hb*2+_nC*_pC+_inc+_adic;
            })()
          )}</span>
        </div>
      </div>}/>

      <Card ch={<div>
        <div style={{fontSize:13,fontWeight:800,color:B.red,marginBottom:6}}>Descuento</div>
        <InputRow label="Monto descuento" nombre={r.nombre} campo="descuento" unit="HTG"/>
      </div>}/>

      <Card accent={B.teal} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700,textTransform:"uppercase"}}>Neto a Pagar</div>
          <div style={{fontSize:22,fontWeight:800,color:B.teal}}>{fmt((()=>{
            const _hb=r.salarioDiario/8;
            const _hE=getNum(r.nombre,"horasExtra",0);
            const _hN=getNum(r.nombre,"horasNocturnas",0);
            const _hF=getNum(r.nombre,"horasFeriadas",0);
            const _nC=getNum(r.nombre,"cargaCamion",0);
            const _pC=getNum(r.nombre,"precioCarga",750);
            const _inc=getNum(r.nombre,"incentivo",0);
            const _adic=isAd?getNum(r.nombre,"adicional",0):0;
            const _totalInc=_hE*_hb*1.35+_hN*_hb*0.15+_hF*_hb*2+_nC*_pC+_inc+_adic;
            const _cSal=getVal(r.nombre,"salarioGanado");
            const _sgBruto=_cSal!==""?Number(_cSal):r.quincenal;
            const _sg=isAd?_sgBruto:(_sgBruto-_sgBruto*AFP_RATE-_sgBruto*ARS_RATE);
            const _com=getNum(r.nombre,"comida",0)*25+getNum(r.nombre,"comidaSabado",0)*150;
            const _ded=isAd?_com:(r.isr+getNum(r.nombre,"otrasDeducciones",0)+_com);
            const _desc=getNum(r.nombre,"descuento",0);
            return _sg+_totalInc-_ded-_desc;
          })())}</div>
        </div>
      </div>}/>

      {/* Save & back */}
      {!isProcesada&&<button onClick={()=>{showSavedToast();setTimeout(()=>setDetalle(null),400);}} style={{background:"linear-gradient(135deg,"+B.teal+","+B.tealDark+")",border:"none",borderRadius:12,padding:"13px",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 16px rgba(91,173,168,.3)"}}>✓ Guardar cambios</button>}
      {savedToast&&<div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",background:B.green,color:"#fff",padding:"10px 20px",borderRadius:20,fontSize:13,fontWeight:800,boxShadow:"0 4px 16px rgba(0,0,0,.2)",zIndex:1000}}>✓ Cambios guardados</div>}
    </div>);
  }

  // Historial view
  if(vista==="historial"){
    return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <button onClick={()=>setVista("procesar")} style={{alignSelf:"flex-start",background:"none",border:"none",color:B.teal,fontSize:14,fontWeight:700,cursor:"pointer",padding:0}}>← Volver</button>
      <div style={{fontSize:16,fontWeight:800,color:B.navy}}>Nóminas Procesadas</div>
      {historial.length===0&&<Card style={{textAlign:"center",padding:30}} ch={<div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin nóminas procesadas</div>}/>}
      {historial.map(h=><Card key={h.id} ch={<div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:B.textDark}}>{h.label}</div>
            <div style={{fontSize:11,color:B.textLight}}>Procesada: {new Date(h.fecha).toLocaleDateString()} por {h.procesado_por}</div>
          </div>
          <div style={{fontSize:16,fontWeight:800,color:B.teal}}>{fmt(h.grandTotal)}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:8}}>
          <div style={{background:B.bg,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:9,color:B.textLight,fontWeight:700}}>NÓMINA</div>
            <div style={{fontSize:12,fontWeight:800,color:B.navy}}>{fmt(h.totalNomina)}</div>
          </div>
          <div style={{background:B.bg,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:9,color:B.textLight,fontWeight:700}}>ADICIONAL</div>
            <div style={{fontSize:12,fontWeight:800,color:B.purple}}>{fmt(h.totalAdicional)}</div>
          </div>
          <div style={{background:B.bg,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:9,color:B.textLight,fontWeight:700}}>OTROS</div>
            <div style={{fontSize:12,fontWeight:800,color:B.amber}}>{fmt(h.totalOtros)}</div>
          </div>
        </div>
        <details style={{marginTop:8}}><summary style={{fontSize:12,color:B.teal,fontWeight:700,cursor:"pointer"}}>Ver detalle</summary>
          <div style={{marginTop:6}}>
            {h.nomina&&h.nomina.map(r=><div key={r.nombre} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderBottom:"1px solid "+B.border}}>
              <span style={{color:B.textMid}}>{r.nombre}</span>
              <span style={{fontWeight:700,color:B.teal}}>{fmt(r.neto)}</span>
            </div>)}
            {h.adicional&&h.adicional.map(r=><div key={r.nombre} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderBottom:"1px solid "+B.border}}>
              <span style={{color:B.textMid}}>{r.nombre}</span>
              <span style={{fontWeight:700,color:B.purple}}>{fmt(r.neto)}</span>
            </div>)}
            {h.otros&&h.otros.map(r=><div key={r.nombre} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderBottom:"1px solid "+B.border}}>
              <span style={{color:B.textMid}}>{r.nombre}{r.moneda==="US$"?" (US$ "+Math.round(r.neto/(r.tasaCambio||132)).toLocaleString()+")":""}</span>
              <span style={{fontWeight:700,color:B.amber}}>{fmt(r.neto)}</span>

        </details>
      </div>}/>)}
    </div>);
  }

  // Main: Procesar view
  const activeRows=grupo==="nomina"?rowsNomina:grupo==="adicional"?rowsAdicional:rowsOtros;
  const groupTotal=grupo==="nomina"?totalNomina:grupo==="adicional"?totalAdicional:totalOtros;
  const groupColor=grupo==="nomina"?B.teal:grupo==="adicional"?B.purple:B.amber;

  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    {/* Period selector */}
    <Card ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:14,fontWeight:800,color:B.navy}}>Período</div>
        <button onClick={()=>setVista("historial")} style={{background:"transparent",border:"1.5px solid "+B.border,borderRadius:20,padding:"5px 12px",color:B.textMid,fontSize:11,fontWeight:700,cursor:"pointer"}}>Historial</button>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <select value={mes} onChange={e=>setMes(Number(e.target.value))} style={{flex:1,padding:"8px 10px",border:"1.5px solid "+B.border,borderRadius:10,fontSize:13,fontWeight:600,background:"#fff"}}>

    {/* Confirm dialog */}
    {confirmando&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:480}}>
        <div style={{fontSize:17,fontWeight:800,color:B.textDark,marginBottom:6}}>¿Procesar nómina?</div>
        <div style={{fontSize:14,color:B.textMid,marginBottom:4}}>{getQuincenaLabel(periodoKey)}</div>

        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setConfirmando(false)} style={{flex:1,padding:"14px",background:"#fff",border:"2px solid "+B.border,borderRadius:12,fontSize:15,fontWeight:700,color:B.textMid,cursor:"pointer"}}>Cancelar</button>
          <button onClick={confirmarProcesar} style={{flex:2,padding:"14px",background:"linear-gradient(135deg,"+B.teal+","+B.tealDark+")",border:"none",borderRadius:12,fontSize:15,fontWeight:800,color:"#fff",cursor:"pointer"}}>✓ Confirmar</button>
        </div>

    </div>}

    {/* Process + Export buttons */}
    <div style={{display:"flex",gap:8}}>
      {!isProcesada&&<Btn ch={"Procesar Nómina — "+fmt(grandTotal)} fn={procesarNomina} full/>}

        rowsAdicional.forEach(r=>{rows.push({"Período":label,"Tipo":"Adicional","Nombre":r.nombre,"Cargo":r.cargo,"Salario Mensual":r.salario,"Salario Quincenal":r3(r.salarioGanado),"Hrs Extra":0,"Monto Hrs Extra":0,"Hrs Nocturnas":0,"Monto Hrs Noct":0,"Hrs Feriadas":0,"Monto Hrs Fer":0,"Cargas":r.nCargas,"Monto Cargas":r3(r.montoCarga),"Incentivo":r3(r.incMonto),"Total Incentivos":r3(r.totalInc),"ONA":0,"OFATMA":0,"IRPP":0,"Comidas":r3(r.montoComida),"Otras Ded":0,"Total Deducciones":r3(r.totalDed),"Descuento":r3(r.desc),"Neto a Pagar":r3(r.neto)});});
        rowsOtros.forEach(r=>{rows.push({"Período":label,"Tipo":"Otros","Nombre":r.nombre,"Cargo":r.cargo,"Salario Mensual":"","Salario Quincenal":r3(r.neto),"Hrs Extra":0,"Monto Hrs Extra":0,"Hrs Nocturnas":0,"Monto Hrs Noct":0,"Hrs Feriadas":0,"Monto Hrs Fer":0,"Cargas":0,"Monto Cargas":0,"Incentivo":0,"Total Incentivos":0,"ONA":0,"OFATMA":0,"IRPP":0,"Comidas":0,"Otras Ded":0,"Total Deducciones":0,"Descuento":0,"Neto a Pagar":r3(r.neto)});});
        rows.push({"Período":"","Tipo":"","Nombre":"TOTAL","Cargo":"","Salario Mensual":"","Salario Quincenal":"","Hrs Extra":"","Monto Hrs Extra":"","Hrs Nocturnas":"","Monto Hrs Noct":"","Hrs Feriadas":"","Monto Hrs Fer":"","Cargas":"","Monto Cargas":"","Incentivo":"","Total Incentivos":r3(totalIncAll),"ONA":"","OFATMA":"","IRPP":"","Comidas":"","Otras Ded":"","Total Deducciones":r3(totalDedAll),"Descuento":"","Neto a Pagar":r3(grandTotal)});
        exportToExcel(rows,"nomina_"+periodoKey,"Nómina "+label);
      }} style={{background:"#fff",border:"1.5px solid "+B.border,borderRadius:12,padding:"13px 16px",color:B.navy,fontSize:13,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap"}}>📥 Excel</button>
    </div>
  </div>);
}

      <F label="Contacto de Emergencia" value={form.contactoEmergencia} onChange={sf("contactoEmergencia")} placeholder="Nombre — Teléfono"/>

        <F label="Zapatos" value={form.tallaZapatos} onChange={sf("tallaZapatos")} placeholder="42"/>
        <F label="Pantalón" value={form.tallaPantalon} onChange={sf("tallaPantalon")} placeholder="32"/>

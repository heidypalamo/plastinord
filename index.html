// ── Pull to Refresh Hook ─────────────────────────────────────────────────────
function usePullToRefresh(onRefresh){
  const [pulling,setPulling]=useState(false);
  const [pullY,setPullY]=useState(0);
  const startY=React.useRef(0);
  const refreshing=React.useRef(false);
  const pullYRef=React.useRef(0);
  pullYRef.current=pullY;
  const onRefreshRef=React.useRef(onRefresh);
  onRefreshRef.current=onRefresh;
  const handlers=useMemo(()=>({
    onTouchStart(e){if(window.scrollY===0)startY.current=e.touches[0].clientY;},
    onTouchMove(e){
      if(refreshing.current)return;
      const dy=e.touches[0].clientY-startY.current;
      if(dy>0&&window.scrollY===0){setPulling(true);setPullY(Math.min(dy*.4,80));}
    },
    onTouchEnd(){
      if(pullYRef.current>50&&!refreshing.current){
        refreshing.current=true;
        setPullY(50);
        Promise.resolve(onRefreshRef.current()).finally(()=>{refreshing.current=false;setPulling(false);setPullY(0);});
      }else{setPulling(false);setPullY(0);}
    }
  }),[]);
  return{pulling,pullY,handlers};
}

    })});

function _unpackNotas(raw){
  try{const p=JSON.parse(raw);if(p&&p._envios!==undefined)return{notas:p._notas||"",envios:p._envios||[]};}catch(e){}
  return{notas:raw||"",envios:[]};
}

async function dbLoadOrders(){
  try{
    const r=await fetch(SUPA_URL+"/rest/v1/ordenes?order=created_at.desc&limit=200",{headers:SH});
    const rows=await r.json();
    return Array.isArray(rows)?rows.map(x=>{
      const un=_unpackNotas(x.notas);
      return{
        id:x.id,cliente:x.cliente,fechaEnvio:x.fecha_envio,puerto:x.puerto,notas:un.notas,
        items:typeof x.items==="string"?JSON.parse(x.items):x.items,
        etapa:x.etapa,creadoPor:x.creado_por,creadoEn:x.creado_en,
        envios:un.envios
      };
    }):[];
  }catch(e){return[];}
}

async function dbUpdateOrder(id,patch,fullOrder){
  try{
    const dbPatch=Object.assign({},patch);
    // If envios is in patch, pack it into notas
    if(dbPatch.envios!==undefined&&fullOrder){
      dbPatch.notas=JSON.stringify({_notas:fullOrder.notas||"",_envios:typeof dbPatch.envios==="string"?JSON.parse(dbPatch.envios):dbPatch.envios});
      delete dbPatch.envios;
    } else if(dbPatch.envios!==undefined){
      delete dbPatch.envios;
    }
    await fetch(SUPA_URL+"/rest/v1/ordenes?id=eq."+id,{method:"PATCH",headers:Object.assign({},SH,{"Prefer":"return=minimal"}),body:JSON.stringify(dbPatch)});
  }catch(e){console.error("dbUpdateOrder",e);}
}

// ── Production Flow Helpers ──────────────────────────────────────────────────
function nextLoteNumero(lotes){
  const max=lotes.reduce((m,l)=>{const n=parseInt(l.numero,10);return n>m?n:m;},0);
  return String(max+1).padStart(3,"0");
}
function isStageUnlocked(lote,etapa){
  const prev=PREV_STAGE[etapa];
  if(!prev)return true;
  return stgTotalOut(lote.etapas[prev])>0;
}
function disponibleLbs(lotes,loteIdx,etapa){
  const prevEtapa=PREV_STAGE[etapa];
  if(!prevEtapa)return null;
  let produced=0,consumed=0;
  for(let i=0;i<=loteIdx;i++){
    produced+=stgTotalOut(lotes[i].etapas[prevEtapa]);
    if(i<loteIdx)consumed+=stgTotalIn(lotes[i].etapas[etapa]);
  }
  return Math.max(0,produced-consumed);
}
function carryOverLbs(lotes,loteIdx,etapa){
  const prevEtapa=PREV_STAGE[etapa];
  if(!prevEtapa||loteIdx===0)return 0;
  let surplus=0;
  for(let i=0;i<loteIdx;i++){
    surplus+=stgTotalOut(lotes[i].etapas[prevEtapa])-stgTotalIn(lotes[i].etapas[etapa]);
  }
  return Math.max(0,surplus);
}
function eficiencia(stg){
  const tin=stgTotalIn(stg),tout=stgTotalOut(stg);
  if(!tin||!tout)return null;
  return(tout/tin)*100;
}
function efColor(pct){
  if(pct>=95)return B.green;
  if(pct>=85)return B.amber;
  return B.red;
}

// ── Offline Queue ────────────────────────────────────────────────────────────
const offlineQueue=[];
let isOnline=navigator.onLine;
window.addEventListener("online",()=>{isOnline=true;flushOfflineQueue();});
window.addEventListener("offline",()=>{isOnline=false;});

function queueOrExec(fn,args){
  if(isOnline)return fn(...args);
  offlineQueue.push({fn,args,ts:Date.now()});
  return Promise.resolve();
}

async function flushOfflineQueue(){
  while(offlineQueue.length>0){
    const item=offlineQueue.shift();
    try{await item.fn(...item.args);}catch(e){console.error("Flush failed",e);}
  }
}

// ── Toast + Undo System ──────────────────────────────────────────────────────
const ToastCtx=React.createContext({show:()=>{},showUndo:()=>{}});
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type)=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type:type||"info"}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3000);
  },[]);
  const showUndo=useCallback((msg,onUndo,onConfirm)=>{
    const id=Date.now()+Math.random();
    let undone=false;
    setToasts(p=>[...p,{id,msg,type:"undo",onUndo:()=>{undone=true;setToasts(p=>p.filter(t=>t.id!==id));if(onUndo)onUndo();}}]);
    setTimeout(()=>{setToasts(p=>p.filter(t=>t.id!==id));if(!undone&&onConfirm)onConfirm();},5000);
  },[]);
  return React.createElement(ToastCtx.Provider,{value:{show,showUndo}},
    children,
    toasts.length>0&&React.createElement("div",{style:{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:8,alignItems:"center",width:"90%",maxWidth:400}},
      toasts.map(t=>React.createElement("div",{key:t.id,style:{background:t.type==="error"?"#DC2626":t.type==="success"?B.green:t.type==="undo"?"#1C2540":B.navy,color:"#fff",borderRadius:14,padding:"12px 18px",fontSize:13,fontWeight:700,boxShadow:"0 4px 20px rgba(0,0,0,.25)",display:"flex",alignItems:"center",gap:12,width:"100%",animation:"slideUp .3s ease"}},
        React.createElement("span",{style:{flex:1}},t.msg),
        t.type==="undo"&&React.createElement("button",{onClick:t.onUndo,style:{background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"6px 14px",color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}},"Deshacer")
      ))
    )
  );
}
const useToast=()=>React.useContext(ToastCtx);

// ── LogRow ────────────────────────────────────────────────────────────────────
function LogRow({log,onDel,sup}){
  const [exp,setExp]=useState(false);
  const c=CE[log.etapa||"extrusion"]||B.textLight;
  return(<Card style={{padding:0,overflow:"hidden"}} ch={
    <div>
      <div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:12}} onClick={()=>setExp(!exp)}>
        <div style={{width:36,height:36,borderRadius:10,background:c+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ICONOS[log.etapa]||"📝"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
            <Badge label={ETIQUETAS[log.etapa]||log.etapa} color={c}/>
            <span style={{color:B.textLight,fontSize:12}}>{log.maquina}</span>
            {log.turno&&<TurnoBadge turno={log.turno}/>}
          </div>
          <div style={{color:B.textMid,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {log.empleado?log.empleado+" · ":""}{log.etapa==="maquina"?(log.motivoParada||"Reporte"):log.producto||log.cliente||"—"} · {log.fecha}
          </div>
        </div>
        <span style={{color:B.textLight,fontSize:14,flexShrink:0}}>{exp?"▲":"▼"}</span>
      </div>
      {exp&&(<div style={{borderTop:"1px solid "+B.border,padding:"12px 14px",background:B.bg}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          {log.empleado&&<Pair k="Operador" v={log.empleado}/>}
          {log.supervisorNombre&&<Pair k="Supervisor" v={log.supervisorNombre.split(" ")[0]}/>}
          {log.turno&&<Pair k="Turno" v={log.turno}/>}
          {log.pelicula&&<Pair k="Película" v={log.pelicula+" lbs"} color={B.green}/>}
          {log.desperdicio&&<Pair k="Desperdicio" v={log.desperdicio+" lbs"} color={B.red}/>}
          {log.rollosProducidos&&<Pair k="Rollos" v={log.rollosProducidos}/>}
          {log.lbsImpresion&&<Pair k="Entrada imp." v={log.lbsImpresion+" lbs"}/>}
          {log.lbsSlitter&&<Pair k="Entrada slitter" v={log.lbsSlitter+" lbs"}/>}
          {log.anchoRollo&&<Pair k="Ancho" v={log.anchoRollo+" mm"}/>}
          {log.bolsasProducidas&&<Pair k="Fundas" v={Number(log.bolsasProducidas).toLocaleString()} color={B.teal}/>}
          {log.desperdicioReciclado&&<Pair k="Entrada rec." v={log.desperdicioReciclado+" lbs"}/>}
          {log.materialRecuperado&&<Pair k="Recuperado" v={log.materialRecuperado+" lbs"} color={B.green}/>}
          {log.motivoParada&&<Pair k="Motivo" v={log.motivoParada}/>}
          {log.duracionParada&&<Pair k="Duración" v={log.duracionParada+" hrs"} color={B.red}/>}
          {log.piezasNecesarias&&<Pair k="Piezas necesarias" v={log.piezasNecesarias}/>}
          {log.piezasCambiadas&&<Pair k="Piezas cambiadas" v={log.piezasCambiadas}/>}
          {log.notas&&<Pair k="Notas" v={log.notas}/>}
        </div>
        {isSartori(sup)&&<Btn ch="Eliminar" fn={()=>{if(confirmDelete(sup,"¿Seguro que desea eliminar este registro?"))onDel(log.id);}} color={B.red} outline small/>}
      </div>)}
    </div>
  }/>);
}

// ── Resina (new dedicated tab) ────────────────────────────────────────────────
function Resina({resinaLogs,setResinaLogs,mat,setMat,movs,setMovs,sup}){
  const [modo,setModo]=useState(false);
  const [saved,setSaved]=useState(false);
  const [form,setForm]=useState({fecha:new Date().toISOString().split("T")[0],ldpe:"",mlldpe:"",lote:"",empleado:"",turno:"☀️ Turno Día",notas:""});
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  const total=()=>{const l=Number(form.ldpe||0),m=Number(form.mlldpe||0);return l+m;};
  const pct=()=>{const t=total();if(!t)return null;const l=Number(form.ldpe||0);return((l/t)*100).toFixed(1);};

  const save=()=>{
    if(!form.ldpe&&!form.mlldpe)return;
    const b={id:Date.now(),fecha:form.fecha,ldpe:Number(form.ldpe)||0,mlldpe:Number(form.mlldpe)||0,total:total(),lote:form.lote,empleado:form.empleado,turno:form.turno,notas:form.notas,supervisorNombre:sup.nombre};
    // Discount from inventory
    [["ldpe",b.ldpe],["mlldpe",b.mlldpe]].forEach(([id,val])=>{
      if(!val)return;
      const m=mat.find(x=>x.id===id);
      if(!m)return;
      setMat(p=>p.map(x=>x.id===id?Object.assign({},x,{stockActual:Math.max(0,x.stockActual-val)}):x));
      const dmv={id:Date.now()+Math.random(),tipo:"descuento",materialId:id,materialNombre:m.nombre,cantidad:val,unidad:m.unidad,maquina:"Mezcla",fecha:b.fecha,supervisor:sup.nombre,notas:"Lote: "+(b.lote||"—")};setMovs(p=>[dmv,...p]);qSaveMovimiento(dmv);
    });
    setResinaLogs(p=>[b,...p]);
    qSaveResina(b);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
    setForm({fecha:new Date().toISOString().split("T")[0],ldpe:"",mlldpe:"",lote:"",empleado:"",turno:"☀️ Turno Día",notas:""});
    setModo(false);
  };

  const ldpeStock=(mat.find(m=>m.id==="ldpe")||{stockActual:0}).stockActual;
  const mlldpeStock=(mat.find(m=>m.id==="mlldpe")||{stockActual:0}).stockActual;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Inyección de Resina</h2>
        <p style={{color:B.textLight,fontSize:13,margin:0}}>Mezcla LDPE + MLLDPE por lote</p>
      </div>
      <Btn ch={modo?"✕ Cancelar":"+ Nuevo Lote"} fn={()=>setModo(!modo)} color={modo?B.textMid:("linear-gradient(135deg,"+B.purple+","+B.navy+")")} small/>
    </div>

    {/* Stock quick view */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+B.border}}>
        <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Stock LDPE</div>
        <div style={{color:B.teal,fontSize:20,fontWeight:800}}>{ldpeStock.toLocaleString()}<span style={{fontSize:12,marginLeft:3}}>lbs</span></div>
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+B.border}}>
        <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Stock MLLDPE</div>
        <div style={{color:B.navy,fontSize:20,fontWeight:800}}>{mlldpeStock.toLocaleString()}<span style={{fontSize:12,marginLeft:3}}>lbs</span></div>
      </div>
    </div>

    {modo&&<Card accent={B.purple} ch={<div>
      <div style={{color:B.purple,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:16}}>Nuevo Lote de Mezcla</div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/>
          <F label="# Lote (opcional)" value={form.lote} onChange={set("lote")} placeholder="Ej: L-2025-01"/>
        </div>
        <div style={{background:"#F8FAFC",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+B.border}}>
          <div style={{fontSize:11,fontWeight:700,color:B.textLight,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Operador & Turno</div>
          <S label="Operador" value={form.empleado} onChange={set("empleado")} options={[{v:"",l:"— Seleccionar —"},...NOMBRES_EMPLEADOS.map(n=>({v:n,l:n}))]}/>
          <div style={{marginTop:10}}>
            <div style={{fontSize:12,fontWeight:600,color:B.textMid,marginBottom:7}}>Turno</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {TURNOS.map(t=>{const isSelected=form.turno===t;const isNoche=t.includes("Noche");return(<button key={t} onClick={()=>set("turno")(t)} style={{background:isSelected?(isNoche?"#1C2540":"#FFFBEB"):B.card,border:"2px solid "+(isSelected?(isNoche?"#5BADA8":B.amber):B.border),borderRadius:10,padding:"11px 8px",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:3}}>{isNoche?"🌙":"☀️"}</div>
                <div style={{fontSize:12,fontWeight:800,color:isSelected?(isNoche?"#7EC8C4":B.amber):B.textMid}}>{isNoche?"Noche":"Día"}</div>
              </button>);})}
            </div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="LDPE (lbs)" value={form.ldpe} onChange={set("ldpe")} type="number" placeholder="0"/>
          <F label="MLLDPE (lbs)" value={form.mlldpe} onChange={set("mlldpe")} type="number" placeholder="0"/>
        </div>
        {total()>0&&<div style={{background:"linear-gradient(135deg,"+B.purple+"12,"+B.teal+"12)",border:"1px solid "+B.purple+"33",borderRadius:12,padding:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:B.textMid,fontSize:13,fontWeight:600}}>Total mezcla</span>
            <span style={{color:B.textDark,fontWeight:800,fontSize:16}}>{total().toLocaleString()} lbs</span>
          </div>
          {pct()&&<div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
              <span style={{color:B.teal,fontWeight:700}}>LDPE {pct()}%</span>
              <span style={{color:B.navy,fontWeight:700}}>MLLDPE {(100-Number(pct())).toFixed(1)}%</span>
            </div>
            <div style={{height:8,background:B.border,borderRadius:4,overflow:"hidden"}}>
              <div style={{width:pct()+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.tealLight+")",borderRadius:4}}/>
            </div>
          </div>}
          <div style={{color:B.amber,fontSize:12,fontWeight:600,marginTop:8}}>⚡ Se descontará del inventario al confirmar</div>
        </div>}
        <F label="Notas" value={form.notas} onChange={set("notas")} placeholder="Observaciones del lote..."/>
        <Btn ch="✓ Confirmar Lote" fn={save} color={"linear-gradient(135deg,"+B.purple+","+B.navy+")"} full/>
      </div>
    </div>}/>}

    {saved&&<div style={{background:B.green+"18",border:"1px solid "+B.green+"44",borderRadius:12,padding:"12px 16px",color:B.green,fontWeight:700,textAlign:"center"}}>✓ Lote registrado y descontado del inventario</div>}

    <div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Historial de Lotes ({resinaLogs.length})</div>
      {resinaLogs.length===0?<Card style={{textAlign:"center",padding:32,border:"1.5px dashed "+B.border}} ch={<div><div style={{fontSize:32,marginBottom:8}}>🧪</div><div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin lotes registrados</div></div>}/>:
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {resinaLogs.map(b=>(<Card key={b.id} style={{padding:0,overflow:"hidden"}} ch={<div>
          <div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:10,background:B.purple+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🧪</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                <Badge label={b.lote||"Lote"} color={B.purple}/>
                {b.turno&&<TurnoBadge turno={b.turno}/>}
                <span style={{color:B.textLight,fontSize:12}}>{b.fecha}</span>
              </div>
              <div style={{color:B.textMid,fontSize:13,fontWeight:500}}>
                {b.empleado&&b.empleado+" · "}
                <span style={{color:B.teal,fontWeight:700}}>LDPE {b.ldpe} lbs</span> + <span style={{color:B.navy,fontWeight:700}}>MLLDPE {b.mlldpe} lbs</span> = <span style={{color:B.textDark,fontWeight:800}}>{b.total} lbs</span>
              </div>
            </div>
            {isSartori(sup)&&<button onClick={()=>{if(confirmDelete(sup,"¿Eliminar esta mezcla de resina?")){dbLogAudit("delete","resina_batches",b.id,sup.nombre);setResinaLogs(p=>p.filter(x=>x.id!==b.id));dbDeleteResina(b.id);}}} style={{background:"none",border:"none",color:B.textLight,cursor:"pointer",fontSize:16,padding:4}}>✕</button>}
          </div>
          {b.notas&&<div style={{borderTop:"1px solid "+B.border,padding:"8px 14px",background:B.bg,color:B.textMid,fontSize:12}}>📝 {b.notas}</div>}
        </div>}/>))}
      </div>}
    </div>
  </div>);
}

// ── Inventario ────────────────────────────────────────────────────────────────
function Inventario({mat,setMat,movs,setMovs,sup}){
  const [modo,setModo]=useState(false);
  const [sel,setSel]=useState(mat[0].id);
  const [cant,setCant]=useState(""); const [prov,setProv]=useState(""); const [nota,setNota]=useState("");
  const [eMin,setEMin]=useState(null); const [mVal,setMVal]=useState("");
  const [histOpen,setHistOpen]=useState(false);
  const save=()=>{
    if(!cant||Number(cant)<=0)return;
    const n=Number(cant),m=mat.find(x=>x.id===sel);
    const mv={id:Date.now(),tipo:"entrada",materialId:sel,materialNombre:m.nombre,cantidad:n,unidad:m.unidad,proveedor:prov,notas:nota,fecha:new Date().toISOString().split("T")[0],supervisor:sup.nombre};
    setMovs(p=>[mv,...p]);
    setMat(p=>p.map(x=>x.id===sel?Object.assign({},x,{stockActual:x.stockActual+n}):x));
    qSaveMovimiento(mv);
    setCant("");setProv("");setNota("");setModo(false);
  };
  const delMov=(mv)=>{
    if(!confirmDelete(sup,"¿Eliminar este movimiento de inventario? Se revertirá el stock."))return;
    dbLogAudit("delete","movimientos_inventario",mv.id,sup.nombre);
    setMovs(p=>p.filter(x=>x.id!==mv.id));
    if(mv.tipo==="entrada")setMat(p=>p.map(x=>x.id===mv.materialId?Object.assign({},x,{stockActual:Math.max(0,x.stockActual-mv.cantidad)}):x));
    else setMat(p=>p.map(x=>x.id===mv.materialId?Object.assign({},x,{stockActual:x.stockActual+mv.cantidad}):x));
    dbDeleteMovimiento(mv.id);
  };
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Inventario</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Materia prima en stock</p></div>
      <div style={{display:"flex",gap:6}}>
        <Btn ch="📥 Excel" fn={()=>exportToExcel(mat.map(m=>({Material:m.nombre,Stock_Actual:m.stockActual,Stock_Mínimo:m.stockMinimo,Unidad:m.unidad})),"inventario_materia_prima","Materia Prima")} color={B.navy} outline small/>
        <Btn ch={modo?"✕ Cancelar":"+ Entrada"} fn={()=>setModo(!modo)} color={modo?B.textMid:("linear-gradient(135deg,"+B.green+","+B.tealDark+")")} small/>
      </div>
    </div>
    {modo&&<Card accent={B.teal} ch={<div>
      <div style={{color:B.teal,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>Nueva Entrada de Inventario</div>
      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:16}}>
        <S label="Material" value={sel} onChange={setSel} options={mat.map(m=>({v:m.id,l:m.nombre}))}/>
        <F label={"Cantidad ("+(mat.find(m=>m.id===sel)||{unidad:""}).unidad+")"} value={cant} onChange={setCant} type="number" placeholder="0"/>
        <F label="Proveedor" value={prov} onChange={setProv} placeholder="Nombre del proveedor"/>
        <F label="Notas" value={nota} onChange={setNota} placeholder="Opcional"/>
      </div>
      <Btn ch="✓ Confirmar Entrada" fn={save} color={"linear-gradient(135deg,"+B.green+","+B.tealDark+")"} full/>
    </div>}/>}
    {mat.map(m=>{
      const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green;
      const pct=Math.min(100,m.stockMinimo>0?(m.stockActual/(m.stockMinimo*3))*100:100);
      return(<Card key={m.id} style={{border:"1.5px solid "+(cr?B.red+"44":bj?B.amber+"44":B.border)}} ch={<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div><div style={{color:B.textDark,fontSize:16,fontWeight:700}}>{m.nombre}</div><div style={{color:B.textLight,fontSize:12,marginTop:2}}>{m.unidad}</div></div>
          {(bj||cr)&&<span style={{background:cr?B.red+"15":B.amber+"15",color:cr?B.red:B.amber,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:800}}>{cr?"CRÍTICO":"BAJO"}</span>}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:B.textLight,fontSize:12,fontWeight:600}}>Stock actual</span><span style={{color:bc,fontWeight:800,fontSize:18}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div>
        <div style={{height:8,background:B.bg,borderRadius:4,overflow:"hidden",marginBottom:12}}><div style={{width:pct+"%",height:"100%",background:bc,borderRadius:4}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:B.bg,borderRadius:8,padding:"10px 12px"}}>
          <span style={{color:B.textLight,fontSize:12,fontWeight:600}}>Mínimo de alerta</span>
          {eMin===m.id?(<div style={{display:"flex",gap:6,alignItems:"center"}}><input type="number" value={mVal} onChange={e=>setMVal(e.target.value)} autoFocus style={Object.assign({},iS,{width:80,padding:"7px 10px",fontSize:15})}/><button onClick={()=>{const v=Number(mVal);if(!isNaN(v)&&v>=0)setMat(p=>p.map(x=>x.id===m.id?Object.assign({},x,{stockMinimo:v}):x));setEMin(null);}} style={{background:B.green,border:"none",borderRadius:8,color:"#fff",padding:"8px 12px",cursor:"pointer",fontWeight:700,fontSize:14}}>✓</button></div>)
          :(<div style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:B.textDark,fontWeight:700,fontSize:14}}>{m.stockMinimo} {m.unidad}</span><button onClick={()=>{setEMin(m.id);setMVal(String(m.stockMinimo));}} style={{background:"none",border:"1px solid "+B.border,borderRadius:7,color:B.textLight,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>Editar</button></div>)}
        </div>
        {movs.filter(x=>x.materialId===m.id).slice(0,2).map(mv=>(<div key={mv.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderTop:"1px solid "+B.border,marginTop:6}}><span style={{color:B.textLight,fontSize:12}}>{mv.fecha}</span>{mv.proveedor&&<span style={{color:B.textMid,fontSize:12}}>{mv.proveedor}</span>}<span style={{color:B.green,fontWeight:700,fontSize:13}}>+{mv.cantidad} {mv.unidad}</span></div>))}
      </div>}/>);
    })}
    {movs.length>0&&<div>
      <button onClick={()=>setHistOpen(!histOpen)} style={{width:"100%",background:"#fff",border:"1.5px solid "+B.border,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
        <span style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Historial ({movs.length})</span>
        <span style={{color:B.textMid,fontSize:14,fontWeight:700}}>{histOpen?"▲":"▼"}</span>
      </button>
      {histOpen&&<div style={{display:"flex",flexDirection:"column",gap:8,marginTop:10}}>
        {movs.map(mv=>{const id=mv.tipo==="descuento";return(<Card key={mv.id} style={{padding:"12px 14px"}} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{flex:1}}><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}><Badge label={id?"Descuento":"Entrada"} color={id?B.red:B.green}/><span style={{color:B.textLight,fontSize:12}}>{mv.fecha}</span></div><div style={{color:B.textDark,fontSize:14,fontWeight:600}}>{mv.materialNombre}</div>{(mv.proveedor||mv.maquina)&&<div style={{color:B.textLight,fontSize:12}}>{mv.proveedor||mv.maquina}</div>}</div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:id?B.red:B.green,fontWeight:800,fontSize:18}}>{id?"-":"+"}{mv.cantidad} {mv.unidad}</span>{isSartori(sup)&&<button onClick={()=>delMov(mv)} style={{background:"none",border:"none",color:B.red+"88",fontSize:14,cursor:"pointer",padding:4}}>🗑️</button>}</div></div>}/>);})}
      </div>}
    </div>}
  </div>);
}

// ── Registro (now includes Mezcla as first stage + auto-stock) ───────────────
function Registro({sup,regs,setRegs,resinaLogs,setResinaLogs,mat,setMat,movs,setMovs,productoLogs,setProductoLogs,ordenes,setOrdenes}){
  const [form,setForm]=useState(F0);
  const [saved,setSaved]=useState(false);
  const [filt,setFilt]=useState("all");
  const [buscar,setBuscar]=useState("");
  const set=k=>v=>setForm(f=>{const n=Object.assign({},f,{[k]:v});if(k==="etapa")n.maquina=(MAQUINAS[v]||[""])[0];return n;});

  const pelNeta=()=>{
    if(form.etapa!=="extrusion")return null;
    const p=Number(form.pelicula),n=Number(form.pesoNucleo||PESO_NUCLEO_DEFAULT),r=Number(form.rollosProducidos||0);
    if(!p)return null;
    return Math.max(0,r>0?p-(r*n):p).toFixed(2);
  };

  // Mezcla helpers
  const ldpeStock=(mat.find(m=>m.id==="ldpe")||{stockActual:0}).stockActual;
  const mlldpeStock=(mat.find(m=>m.id==="mlldpe")||{stockActual:0}).stockActual;
  const mezTotal=()=>{const l=Number(form.ldpeMezcla||0),m=Number(form.mlldpeMezcla||0);return l+m;};
  const mezPct=()=>{const t=mezTotal();if(!t)return null;return((Number(form.ldpeMezcla||0)/t)*100).toFixed(1);};

  const save=()=>{
    // Mezcla save logic
    if(form.etapa==="mezcla"){
      if(!form.ldpeMezcla&&!form.mlldpeMezcla)return;
      const b={id:Date.now(),fecha:form.fecha,ldpe:Number(form.ldpeMezcla)||0,mlldpe:Number(form.mlldpeMezcla)||0,total:mezTotal(),lote:form.lote,empleado:form.empleado,turno:form.turno,notas:form.notas,supervisorNombre:sup.nombre};
      [["ldpe",b.ldpe],["mlldpe",b.mlldpe]].forEach(([id,val])=>{
        if(!val)return;
        const m=mat.find(x=>x.id===id);
        if(!m)return;
        setMat(p=>p.map(x=>x.id===id?Object.assign({},x,{stockActual:Math.max(0,x.stockActual-val)}):x));
        const dmv={id:Date.now()+Math.random(),tipo:"descuento",materialId:id,materialNombre:m.nombre,cantidad:val,unidad:m.unidad,maquina:"Mezcla",fecha:b.fecha,supervisor:sup.nombre,notas:"Lote: "+(b.lote||"—")};setMovs(p=>[dmv,...p]);qSaveMovimiento(dmv);
      });
      setResinaLogs(p=>[b,...p]);
      qSaveResina(b);
      setSaved(true);setTimeout(()=>setSaved(false),2000);
      setForm(Object.assign({},F0,{etapa:"mezcla",maquina:"MEZ-1",empleado:form.empleado,turno:form.turno}));
      return;
    }

    // Regular production save
    const r=Object.assign({},form,{id:Date.now(),supervisorNombre:sup.nombre,supervisorCodigo:sup.codigo});
    setRegs(p=>[r,...p]);
    qSave(r);

    // Auto-stock: only slitter → rolls and cortadora → bags go to producto terminado
    if(form.etapa==="cortadora"&&Number(form.bolsasProducidas)>0){
      const entry={id:Date.now()+1,fecha:form.fecha,producto:form.producto||"Producto",cantidad:Number(form.bolsasProducidas),unidad:"uds",tipo:"entrada",destino:"",ordenId:"",notas:"Auto: Cortadora "+form.maquina,supervisor:sup.nombre,registroRef:r.id};
      setProductoLogs(p=>[entry,...p]);
      qSaveProducto(entry);
    }
    if(form.etapa==="slitter"&&Number(form.rollosProducidos)>0){
      const entry={id:Date.now()+2,fecha:form.fecha,producto:form.producto||"Rollo Transparente",cantidad:Number(form.rollosProducidos),unidad:"rollos",tipo:"entrada",destino:"",ordenId:"",notas:"Auto: Slitter "+form.maquina,supervisor:sup.nombre,registroRef:r.id};
      setProductoLogs(p=>[entry,...p]);
      qSaveProducto(entry);
    }
    // Peletizadora: output goes to materia prima as material peletizado
    if(form.etapa==="peletizadora"&&Number(form.peletSalida)>0){
      const lbs=Number(form.peletSalida);
      setMat(p=>p.map(x=>x.id==="peletizado"?Object.assign({},x,{stockActual:x.stockActual+lbs}):x));
      const mv={id:Date.now()+3,tipo:"entrada",materialId:"peletizado",materialNombre:"Material Peletizado",cantidad:lbs,unidad:"lbs",maquina:form.maquina,fecha:form.fecha,supervisor:sup.nombre,notas:"Auto: Peletizadora — "+lbs+" lbs producidas"};
      setMovs(p=>[mv,...p]);qSaveMovimiento(mv);
    }

    // Auto-advance orders based on production stage completion
    if(["impresion","slitter"].includes(form.etapa)&&form.producto){
      const allRegs=[...regs,r]; // include the just-saved registro
      const stageMap={impresion:"impresion",slitter:"listo"}; // impresion done → advance to slitter; slitter done → advance to listo
      const nextStage=stageMap[form.etapa];
      const targetEtapa=form.etapa==="impresion"?"impresion":"slitter"; // order must be at this stage or earlier
      (ordenes||[]).forEach(o=>{
        // Only advance orders that are at the stage before the target
        const oIdx=ETAPAS_ORDEN.indexOf(o.etapa);
        const targetIdx=ETAPAS_ORDEN.indexOf(form.etapa);
        if(oIdx>targetIdx)return; // already past this stage
        // Check if all order items have at least one registro at this stage
        const items=(o.items||[]).filter(it=>it.producto);
        if(items.length===0)return;
        const allDone=items.every(it=>allRegs.some(reg=>reg.etapa===form.etapa&&reg.producto===it.producto));
        if(allDone){
          const next=form.etapa==="empaque"?"listo":ETAPAS_ORDEN[ETAPAS_ORDEN.indexOf(form.etapa)+1];
          setOrdenes(p=>p.map(x=>x.id===o.id?Object.assign({},x,{etapa:next}):x));
          dbUpdateOrder(o.id,{etapa:next});
        }
      });
    }

    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
    setForm(Object.assign({},F0,{etapa:form.etapa,maquina:(MAQUINAS[form.etapa]||[""])[0],empleado:form.empleado,turno:form.turno}));
  };

  // Filter: mezcla shows resinaLogs, others show regs
  const matchBuscarReg=r=>{if(!buscar)return true;const q=buscar.toLowerCase();return(r.producto||"").toLowerCase().includes(q)||(r.maquina||"").toLowerCase().includes(q)||(r.empleado||"").toLowerCase().includes(q)||(r.supervisorNombre||"").toLowerCase().includes(q)||(r.etapa||"").toLowerCase().includes(q);};
  const filRegs=(filt==="mezcla"?[]:filt==="all"?regs:regs.filter(r=>r.etapa===filt)).filter(matchBuscarReg);
  const filMezcla=(filt==="mezcla"?resinaLogs:filt==="all"?resinaLogs:[]).filter(b=>{if(!buscar)return true;const q=buscar.toLowerCase();return(b.lote||"").toLowerCase().includes(q)||(b.empleado||"").toLowerCase().includes(q)||(b.supervisorNombre||"").toLowerCase().includes(q);});
  const pn=pelNeta();

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <Card ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <h2 style={{color:B.textDark,fontSize:18,fontWeight:800,margin:"0 0 2px"}}>Nuevo Registro</h2>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:22,height:22,borderRadius:"50%",background:"linear-gradient(135deg,"+B.teal+","+B.navy+")",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:800}}>{sup.nombre.charAt(0)}</div><span style={{color:B.teal,fontSize:12,fontWeight:700}}>{sup.codigo}</span></div>
        </div>
        {saved&&<span style={{background:B.green+"18",color:B.green,borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:700}}>✓ Guardado</span>}
      </div>

      {/* Stage selector */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:16,scrollbarWidth:"none"}}>
        {ETAPAS.map(e=>(<button key={e} onClick={()=>set("etapa")(e)} style={{background:form.etapa===e?CE[e]:"transparent",border:"2px solid "+(form.etapa===e?CE[e]:B.border),borderRadius:20,padding:"9px 14px",color:form.etapa===e?"#fff":B.textMid,fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{ICONOS[e]} {ETIQUETAS[e]}</button>))}
      </div>

      {pn&&<div style={{background:B.green+"12",border:"1px solid "+B.green+"33",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:B.green,fontWeight:600}}>⚖️ Película neta (sin núcleo): {pn} lbs</div>}

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Common: date + machine */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/>
          {form.etapa!=="mezcla"&&<S label="Máquina" value={form.maquina} onChange={set("maquina")} options={(MAQUINAS[form.etapa]||[]).map(m=>({v:m,l:m}))}/>}
          {form.etapa==="mezcla"&&<F label="# Lote (opcional)" value={form.lote} onChange={set("lote")} placeholder="Ej: L-2025-01"/>}
        </div>

        {/* Employee + Turno */}
        <div style={{background:"#F8FAFC",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+B.border}}>
          <div style={{fontSize:11,fontWeight:700,color:B.textLight,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>{form.etapa==="mezcla"?"Operador de Mezcla":"Operador en "+form.maquina}</div>
          <S label="Operador" value={form.empleado} onChange={set("empleado")} options={[{v:"",l:"— Seleccionar —"},...NOMBRES_EMPLEADOS.map(n=>({v:n,l:n}))]}/>
          <div style={{marginTop:10}}>
            <div style={{fontSize:12,fontWeight:600,color:B.textMid,marginBottom:7}}>Turno</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {TURNOS.map(t=>{const isSelected=form.turno===t;const isNoche=t.includes("Noche");return(<button key={t} onClick={()=>set("turno")(t)} style={{background:isSelected?(isNoche?"#1C2540":"#FFFBEB"):B.card,border:"2px solid "+(isSelected?(isNoche?"#5BADA8":B.amber):B.border),borderRadius:10,padding:"11px 8px",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:3}}>{isNoche?"🌙":"☀️"}</div>
                <div style={{fontSize:12,fontWeight:800,color:isSelected?(isNoche?"#7EC8C4":B.amber):B.textMid}}>{isNoche?"Noche":"Día"}</div>
              </button>);})}
            </div>
          </div>
        </div>

        {/* ── Mezcla fields ── */}
        {form.etapa==="mezcla"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+B.border}}>
              <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Stock LDPE</div>
              <div style={{color:B.teal,fontSize:20,fontWeight:800}}>{ldpeStock.toLocaleString()}<span style={{fontSize:12,marginLeft:3}}>lbs</span></div>
            </div>
            <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+B.border}}>
              <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Stock MLLDPE</div>
              <div style={{color:B.navy,fontSize:20,fontWeight:800}}>{mlldpeStock.toLocaleString()}<span style={{fontSize:12,marginLeft:3}}>lbs</span></div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <F label="LDPE (lbs)" value={form.ldpeMezcla} onChange={set("ldpeMezcla")} type="number" placeholder="0"/>
            <F label="MLLDPE (lbs)" value={form.mlldpeMezcla} onChange={set("mlldpeMezcla")} type="number" placeholder="0"/>
          </div>
          {mezTotal()>0&&<div style={{background:"linear-gradient(135deg,"+B.purple+"12,"+B.teal+"12)",border:"1px solid "+B.purple+"33",borderRadius:12,padding:"14px",marginTop:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{color:B.textMid,fontSize:13,fontWeight:600}}>Total mezcla</span>

            </div>
            {mezPct()&&<div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                <span style={{color:B.teal,fontWeight:700}}>LDPE {mezPct()}%</span>
                <span style={{color:B.navy,fontWeight:700}}>MLLDPE {(100-Number(mezPct())).toFixed(1)}%</span>
              </div>
              <div style={{height:8,background:B.border,borderRadius:4,overflow:"hidden"}}>
                <div style={{width:mezPct()+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.tealLight+")",borderRadius:4}}/>

        {form.etapa==="slitter"&&<div>
          <F label="Producto" value={form.producto} onChange={set("producto")} placeholder="Ej: Tubo PVC 2″ SDR-26 x 6m"/>
          <div style={{marginTop:12}}><F label="Cliente (opcional)" value={form.cliente} onChange={set("cliente")} placeholder="Nombre"/></div>
          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <F label="Entrada (lbs)" value={form.lbsSlitter} onChange={set("lbsSlitter")} type="number" placeholder="0"/>
            <F label="Rollos Producidos" value={form.rollosProducidos} onChange={set("rollosProducidos")} type="number" placeholder="0"/>

          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <F label="Ancho (mm)" value={form.anchoRollo} onChange={set("anchoRollo")} type="number" placeholder="0"/>
            <F label="Desperdicios (lbs)" value={form.desperdicioSlitter} onChange={set("desperdicioSlitter")} type="number" placeholder="0"/>
          </div>
          <div style={{marginTop:10,background:B.green+"12",borderRadius:8,padding:"9px 12px",fontSize:12,color:B.green,fontWeight:600}}>📦 Los rollos producidos se agregarán automáticamente al almacén</div>
        </div>}

        {form.etapa==="cortadora"&&<div>
          <F label="Producto" value={form.producto} onChange={set("producto")} placeholder="Ej: Tubo PVC 2″ SDR-26 x 6m"/>
          <div style={{marginTop:12}}><F label="Cliente (opcional)" value={form.cliente} onChange={set("cliente")} placeholder="Nombre"/></div>
          <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <F label="Entrada (lbs)" value={form.lbsCortadora} onChange={set("lbsCortadora")} type="number" placeholder="0"/>
            <F label="Fundas Producidas" value={form.bolsasProducidas} onChange={set("bolsasProducidas")} type="number" placeholder="0"/>
          </div>
          <div style={{marginTop:12}}><F label="Desperdicios (lbs)" value={form.desperdicioCorte} onChange={set("desperdicioCorte")} type="number" placeholder="0"/></div>
          <div style={{marginTop:10,background:B.green+"12",borderRadius:8,padding:"9px 12px",fontSize:12,color:B.green,fontWeight:600}}>📦 Las fundas producidas se agregarán automáticamente al almacén</div>
        </div>}

        {form.etapa==="reciclaje"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="Entrada (lbs)" value={form.desperdicioReciclado} onChange={set("desperdicioReciclado")} type="number" placeholder="0"/>
          <F label="Recuperado (lbs)" value={form.materialRecuperado} onChange={set("materialRecuperado")} type="number" placeholder="0"/>
        </div>}

        {form.etapa==="peletizadora"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <F label="Material entrada (lbs)" value={form.peletEntrada} onChange={set("peletEntrada")} type="number" placeholder="0"/>
            <F label="Pellets producidos (lbs)" value={form.peletSalida} onChange={set("peletSalida")} type="number" placeholder="0"/>
          </div>
          <div style={{marginTop:12}}><F label="Desperdicios (lbs)" value={form.peletDesperdicio} onChange={set("peletDesperdicio")} type="number" placeholder="0"/></div>
          <div style={{marginTop:10,background:B.green+"12",borderRadius:8,padding:"9px 12px",fontSize:12,color:B.green,fontWeight:600}}>🔄 Los pellets producidos se agregarán a materia prima como material peletizado para fundas</div>
        </div>}

        {form.etapa==="maquina"&&<div>
          <S label="Motivo" value={form.motivoParada} onChange={set("motivoParada")} options={[{v:"",l:"— Seleccionar —"},...MOTIVOS_PARADA.map(m=>({v:m,l:m}))]}/>
          <div style={{marginTop:12}}><F label="Duración de parada (horas)" value={form.duracionParada} onChange={set("duracionParada")} type="number" placeholder="Ej: 2.5"/></div>
          <div style={{marginTop:12}}><F label="Piezas necesarias" value={form.piezasNecesarias} onChange={set("piezasNecesarias")} placeholder="Ej: Rodamiento, correa, tornillo..."/></div>
          <div style={{marginTop:12}}><F label="Piezas cambiadas" value={form.piezasCambiadas} onChange={set("piezasCambiadas")} placeholder="Qué se cambió o reparó..."/></div>
        </div>}

        <F label="Notas (opcional)" value={form.notas} onChange={set("notas")} placeholder="Observaciones..."/>
        <Btn ch={form.etapa==="mezcla"?"✓ Confirmar Lote":"+ Guardar Registro"} fn={save} full color={form.etapa==="mezcla"?"linear-gradient(135deg,"+B.purple+","+B.navy+")":undefined}/>
      </div>
    </div>}/>

    {/* Records list */}
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Registros ({(filt==="mezcla"?filMezcla.length:filt==="all"?filRegs.length+filMezcla.length:filRegs.length)})</div>
        <Btn ch="📥 Excel" fn={()=>exportToExcel(filRegs.map(r=>({Fecha:r.fecha,Etapa:r.etapa,Máquina:r.maquina,Producto:r.producto||"",Empleado:r.empleado||"",Turno:r.turno||"",Supervisor:r.supervisorNombre||""})),"registros_produccion","Producción")} color={B.navy} outline small/>
      </div>
      <div style={{marginBottom:10}}><SearchBar value={buscar} onChange={setBuscar} placeholder="Buscar producto, máquina, empleado..."/></div>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,marginBottom:12,scrollbarWidth:"none"}}>
        {["all",...ETAPAS].map(e=>(<button key={e} onClick={()=>setFilt(e)} style={{background:filt===e?(CE[e]||B.teal):"transparent",border:"1.5px solid "+(filt===e?(CE[e]||B.teal):B.border),borderRadius:20,padding:"7px 14px",color:filt===e?"#fff":B.textMid,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{e==="all"?"Todos":ETIQUETAS[e]}</button>))}
      </div>

      {/* Mezcla batch rows */}
      {filMezcla.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:filRegs.length>0?12:0}}>
        {filMezcla.map(b=>(<Card key={b.id} style={{padding:0,overflow:"hidden"}} ch={<div>
          <div style={{padding:"13px 14px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:10,background:B.purple+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🧪</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                <Badge label={b.lote||"Lote"} color={B.purple}/>
                {b.turno&&<TurnoBadge turno={b.turno}/>}
                <span style={{color:B.textLight,fontSize:12}}>{b.fecha}</span>
              </div>
              <div style={{color:B.textMid,fontSize:13,fontWeight:500}}>
                {b.empleado&&b.empleado+" · "}
                <span style={{color:B.teal,fontWeight:700}}>LDPE {b.ldpe} lbs</span> + <span style={{color:B.navy,fontWeight:700}}>MLLDPE {b.mlldpe} lbs</span> = <span style={{color:B.textDark,fontWeight:800}}>{b.total} lbs</span>
              </div>
            </div>
            {isSartori(sup)&&<button onClick={()=>{if(confirmDelete(sup,"¿Eliminar esta mezcla de resina?")){dbLogAudit("delete","resina_batches",b.id,sup.nombre);setResinaLogs(p=>p.filter(x=>x.id!==b.id));dbDeleteResina(b.id);}}} style={{background:"none",border:"none",color:B.textLight,cursor:"pointer",fontSize:16,padding:4}}>✕</button>}
          </div>
          {b.notas&&<div style={{borderTop:"1px solid "+B.border,padding:"8px 14px",background:B.bg,color:B.textMid,fontSize:12}}>📝 {b.notas}</div>}
        </div>}/>))}
      </div>}

      {/* Regular production rows */}
      {filRegs.length===0&&filMezcla.length===0?<Card style={{textAlign:"center",padding:32,border:"1.5px dashed "+B.border}} ch={<div style={{color:B.textLight,fontSize:14}}>Sin registros aún.</div>}/>
      :<div style={{display:"flex",flexDirection:"column",gap:8}}>{filRegs.map(r=><LogRow key={r.id} log={r} sup={sup} onDel={id=>{dbLogAudit("delete","registros",id,sup.nombre);setRegs(p=>p.filter(x=>x.id!==id));dbDelete(id);}}/>)}</div>}
    </div>
  </div>);
}

// ── Órdenes (with shipment tracking) ──────────────────────────────────────────
const ETAPAS_ORDEN=["pendiente","mezcla","extrusion","calibracion","corte","empaque","listo"];
const ETIQ_ORDEN={pendiente:"Pendiente",mezcla:"🧪 Mezcla",extrusion:"⚙️ Extrusión",calibracion:"📏 Calibración",corte:"✂️ Corte",empaque:"📦 Empaque",listo:"✓ Listo",enviado:"🚚 Enviado"};
const COLOR_ORDEN={pendiente:B.textLight,mezcla:"#7C3AED",extrusion:B.teal,calibracion:"#0D9488",corte:"#4E7C59",empaque:"#B45309",listo:B.green,enviado:B.navy};

function Ordenes({ordenes,setOrdenes,productoLogs,setProductoLogs,sup,clientes,setClientes,regs}){
  const [modo,setModo]=useState(false);
  const [exp,setExp]=useState(null);
  const [buscar,setBuscar]=useState("");
  const [envioId,setEnvioId]=useState(null); // order id being shipped
  const [envioItems,setEnvioItems]=useState([]); // [{producto,cantidad,unidad}]
  const [envioFecha,setEnvioFecha]=useState(new Date().toISOString().split("T")[0]);
  const [form,setForm]=useState({cliente:"",fechaEnvio:"",puerto:TODOS_PUERTOS[0].v,notas:"",items:[{producto:"",cantidad:"",unidad:"uds"}]});
  const addItem=()=>setForm(f=>Object.assign({},f,{items:[...f.items,{producto:"",cantidad:"",unidad:"uds"}]}));
  const setItem=(i,k,v)=>setForm(f=>{const it=[...f.items];it[i]=Object.assign({},it[i],{[k]:v});return Object.assign({},f,{items:it});});
  const removeItem=i=>setForm(f=>Object.assign({},f,{items:f.items.filter((_,x)=>x!==i)}));
  const save=()=>{
    if(!form.cliente||form.items.some(x=>!x.producto))return;
    const o={id:Date.now(),cliente:form.cliente,fechaEnvio:form.fechaEnvio,puerto:form.puerto,notas:form.notas,items:form.items,etapa:"pendiente",creadoPor:sup.nombre,creadoEn:new Date().toISOString().split("T")[0],envios:[]};
    setOrdenes(p=>[o,...p]);
    qSaveOrder(o);
    // Auto-save client to directory
    if(form.cliente){
      const existing=(clientes||[]).find(c=>c.nombre&&c.nombre.toLowerCase()===form.cliente.toLowerCase());
      if(!existing){
        const cl={id:String(Date.now()),nombre:form.cliente,created_at:new Date().toISOString()};
        setClientes(prev=>[cl,...prev]);
        dbSaveCliente(cl);
      }
    }
    setForm({cliente:"",fechaEnvio:"",puerto:TODOS_PUERTOS[0].v,notas:"",items:[{producto:"",cantidad:"",unidad:"uds"}]});
    setModo(false);
  };
  const avanzar=o=>{
    const idx=ETAPAS_ORDEN.indexOf(o.etapa);
    if(idx>=ETAPAS_ORDEN.length-1)return;
    const next=ETAPAS_ORDEN[idx+1];
    setOrdenes(p=>p.map(x=>x.id===o.id?Object.assign({},x,{etapa:next}):x));
    dbUpdateOrder(o.id,{etapa:next});
  };
  const eliminar=id=>{dbLogAudit("delete","ordenes",id,sup.nombre);setOrdenes(p=>p.filter(x=>x.id!==id));dbDeleteOrder(id);};

  // Start shipment flow
  const iniciarEnvio=o=>{
    setEnvioId(o.id);
    setEnvioFecha(new Date().toISOString().split("T")[0]);
    setEnvioItems((o.items||[]).map(it=>({producto:it.producto,cantidad:"",unidad:it.unidad,max:Number(it.cantidad||0)})));
  };

  // Calculate already shipped per product for an order
  const enviadoPorProducto=(o,producto)=>{
    if(!o.envios)return 0;
    return o.envios.reduce((s,env)=>{
      return s+(env.items||[]).filter(it=>it.producto===producto).reduce((ss,it)=>ss+Number(it.cantidad||0),0);
    },0);
  };

  // Confirm shipment
  const confirmarEnvio=()=>{
    const o=ordenes.find(x=>x.id===envioId);
    if(!o)return;
    const itemsEnviados=envioItems.filter(it=>Number(it.cantidad)>0).map(it=>({producto:it.producto,cantidad:Number(it.cantidad),unidad:it.unidad}));
    if(itemsEnviados.length===0)return;
    const envio={id:Date.now(),fecha:envioFecha,supervisor:sup.nombre,items:itemsEnviados};
    const newEnvios=[...(o.envios||[]),envio];

    // Check if fully shipped
    const allItems=o.items||[];
    let fullyShipped=true;
    allItems.forEach(it=>{
      const totalEnv=enviadoPorProducto(o,it.producto)+itemsEnviados.filter(e=>e.producto===it.producto).reduce((s,e)=>s+e.cantidad,0);
      if(totalEnv<Number(it.cantidad||0))fullyShipped=false;
    });

    const newEtapa=fullyShipped?"enviado":"listo";
    setOrdenes(p=>p.map(x=>x.id===envioId?Object.assign({},x,{envios:newEnvios,etapa:newEtapa}):x));
    dbUpdateOrder(o.id,{etapa:newEtapa,envios:newEnvios},Object.assign({},o,{envios:newEnvios}));

    // Deduct from stock (create salida entries)
    itemsEnviados.forEach(it=>{
      const entry={id:Date.now()+Math.random(),fecha:envioFecha,producto:it.producto,cantidad:it.cantidad,unidad:it.unidad,tipo:"salida",destino:o.cliente+" → "+o.puerto,ordenId:String(o.id),notas:"Envío orden #"+String(o.id).slice(-4),supervisor:sup.nombre};
      setProductoLogs(p=>[entry,...p]);
      qSaveProducto(entry);
    });

    setEnvioId(null);
    setEnvioItems([]);
  };

  const matchBuscar=o=>{if(!buscar)return true;const q=buscar.toLowerCase();return(o.cliente||"").toLowerCase().includes(q)||(o.puerto||"").toLowerCase().includes(q)||(o.items||[]).some(it=>(it.producto||"").toLowerCase().includes(q));};
  const abiertas=ordenes.filter(o=>o.etapa!=="listo"&&o.etapa!=="enviado").filter(matchBuscar);
  const listas=ordenes.filter(o=>o.etapa==="listo").filter(matchBuscar);
  const enviadas=ordenes.filter(o=>o.etapa==="enviado").filter(matchBuscar);
  const esTerresetre=p=>PUERTOS_TERRESTRES.includes(p);

  const printOrder=(o)=>{
    const items=o.items||[];const envios=o.envios||[];
    const w=window.open("","_blank","width=800,height=900");
    w.document.write("<html><head><title>Orden - "+o.cliente+"</title><style>"+
      "body{font-family:Arial,sans-serif;margin:40px;color:#1C2540}"+
      "table{width:100%;border-collapse:collapse;margin:20px 0}"+
      "th{background:#1C2540;color:#fff;padding:10px 12px;text-align:left;font-size:13px}"+
      "td{padding:8px 12px;border-bottom:1px solid #E2E8F0;font-size:13px}"+
      "tr:nth-child(even){background:#F8FAFC}"+
      ".header{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #5BADA8;padding-bottom:16px;margin-bottom:20px}"+
      ".logo{width:60px;height:60px;object-fit:contain;margin-right:14px}"+
      ".co{flex:1}.co h2{margin:0;font-size:16px}.co p{margin:2px 0;font-size:11px;color:#64748B}"+
      ".rnc{color:#5BADA8;font-weight:700;font-size:11px}"+
      ".inv-box{text-align:right}.inv-box h1{margin:0;font-size:22px;color:#1C2540}.inv-box p{margin:2px 0;font-size:12px;color:#64748B}"+
      ".info{display:flex;justify-content:space-between;margin:16px 0;flex-wrap:wrap;gap:12px}"+
      ".info div{font-size:13px}.info .label{color:#64748B;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:2px}"+
      ".section{margin-top:24px}.section h3{font-size:14px;color:#1C2540;margin:0 0 10px;border-bottom:2px solid #E2E8F0;padding-bottom:6px}"+
      ".badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}"+
      ".footer{margin-top:40px;text-align:center;font-size:10px;color:#94A3B8;border-top:1px solid #E2E8F0;padding-top:12px}"+
      "@media print{body{margin:20px}button{display:none!important}}"+
      "</style></head><body>"+
      "<div class='header'><div style='display:flex;align-items:center'><img src='"+LOGO_IMG+"' class='logo'/><div class='co'><h2>"+EMPRESA_INFO.nombre+"</h2><p>"+EMPRESA_INFO.dir+"</p><p>📞 "+EMPRESA_INFO.tel+"</p><p>"+EMPRESA_INFO.email+" · "+EMPRESA_INFO.web+"</p>"+(EMPRESA_INFO.rnc?"<p class='rnc'>"+EMPRESA_INFO.rnc+"</p>":"")+"</div></div>"+
      "<div class='inv-box'><h1>ORDEN</h1><p>"+o.creadoEn+"</p>"+
      "<p><span class='badge' style='background:"+(o.etapa==="listo"||o.etapa==="enviado"?"#DEF7EC;color:#03543F":"#FEF3C7;color:#92400E")+"'>"+(ETIQ_ORDEN[o.etapa]||o.etapa).toUpperCase()+"</span></p>"+
      "</div></div>"+
      "<div class='info'><div><div class='label'>Cliente</div><div><b>"+o.cliente+"</b></div></div>"+
      (o.puerto?"<div><div class='label'>Destino</div><div>"+o.puerto+"</div></div>":"")+
      (o.fechaEnvio?"<div><div class='label'>Fecha Envío</div><div>"+o.fechaEnvio+"</div></div>":"")+
      "<div><div class='label'>Creado por</div><div>"+o.creadoPor+"</div></div></div>"+
      (o.notas?"<div style='margin:12px 0;padding:10px;background:#F8FAFC;border-radius:6px;font-size:12px;color:#64748B'><b>Notas:</b> "+o.notas+"</div>":"")+
      "<div class='section'><h3>Productos</h3>"+

      (envios.length>0?"<div class='section'><h3>Envíos Realizados</h3>"+envios.map((env,ei)=>"<div style='margin-bottom:12px;padding:10px;background:#F8FAFC;border-radius:6px'><div style='display:flex;justify-content:space-between;margin-bottom:6px'><b>Envío "+(ei+1)+"</b><span style='color:#64748B;font-size:12px'>"+env.fecha+" · "+env.supervisor+"</span></div>"+
      (env.items||[]).map(it=>"<div style='display:flex;justify-content:space-between;font-size:13px;padding:2px 0'><span>"+it.producto+"</span><span style='font-weight:700'>"+Number(it.cantidad).toLocaleString()+" "+it.unidad+"</span></div>").join("")+"</div>").join("")+"</div>":"")+
      "<div class='footer'>"+EMPRESA_INFO.nombre+" · "+EMPRESA_INFO.dir+"<br>"+EMPRESA_INFO.tel+" · "+EMPRESA_INFO.email+" · "+EMPRESA_INFO.web+(EMPRESA_INFO.rnc?" · "+EMPRESA_INFO.rnc:"")+"</div>"+
      "<div style='text-align:center;margin-top:20px'><button onclick='window.print()' style='background:#1C2540;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer'>Guardar como PDF</button></div>"+
      "</body></html>");
    w.document.close();
  };

  const renderOrderCard=(o,section)=>{
    const ei=ETAPAS_ORDEN.indexOf(o.etapa==="enviado"?"listo":o.etapa);
    const c=COLOR_ORDEN[o.etapa];
    const items=o.items||[];
    const terrestre=esTerresetre(o.puerto);
    const isExp=exp===o.id;

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,cursor:"pointer"}} onClick={()=>setExp(isExp?null:o.id)}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <Badge label={o.etapa==="enviado"?"📦 Enviado":ETIQ_ORDEN[o.etapa]} color={c}/>
            {o.fechaEnvio&&<span style={{color:B.textLight,fontSize:12}}>📅 {o.fechaEnvio}</span>}
          </div>
          <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>{o.cliente}</div>
          {o.puerto&&<div style={{color:B.textLight,fontSize:12,marginTop:2}}>{terrestre?"🛣️":"🚢"} {o.puerto}</div>}

      {section==="activas"&&<div>

          {ETAPAS_ORDEN.map((e,i)=>{const done=i<=ei,curr=i===ei;return(<div key={e} style={{flex:1,height:5,borderRadius:3,background:done?(curr?c:B.green):B.border}}/>);})}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:B.textLight,marginBottom:10}}><span>Inicio</span><span style={{color:B.green,fontWeight:700}}>Listo</span></div>
      </div>}
      <div style={{marginBottom:8}}>
        {items.slice(0,isExp?99:2).map((it,i)=>{
          const env=enviadoPorProducto(o,it.producto);
          return(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+B.border}}>
            <span style={{color:B.textDark,fontSize:13,fontWeight:600}}>{it.producto}</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>

        {/* Linked production registros */}
        {(()=>{const linked=(regs||[]).filter(r=>String(r.ordenId)===String(o.id));if(linked.length===0)return null;
          const byStage={};linked.forEach(r=>{if(!byStage[r.etapa])byStage[r.etapa]={count:0,lbs:0,fundas:0};byStage[r.etapa].count++;byStage[r.etapa].lbs+=Number(r.pelicula)||Number(r.lbs_out)||0;byStage[r.etapa].fundas+=Number(r.bolsasProducidas)||0;});

        {/* Envio form inline */}
        {envioId===o.id&&<div style={{background:B.navy+"08",border:"1.5px solid "+B.navy+"33",borderRadius:12,padding:"14px",marginBottom:10}}>

          <div style={{marginTop:10}}>
            {envioItems.map((it,i)=>{
              const yaEnv=enviadoPorProducto(o,it.producto);
              const restante=it.max-yaEnv;
              return(<div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                <div style={{flex:1}}><span style={{color:B.textDark,fontSize:13,fontWeight:700}}>{it.producto}</span><span style={{color:B.textLight,fontSize:11,marginLeft:6}}>(máx: {restante} {it.unidad})</span></div>
                <input type="number" value={it.cantidad} onChange={e=>{const v=Math.min(Number(e.target.value),restante);setEnvioItems(p=>{const n=[...p];n[i]=Object.assign({},n[i],{cantidad:v>0?String(v):""});return n;});}} placeholder="0" style={Object.assign({},iS,{width:80,padding:"8px 10px",fontSize:14,textAlign:"center"})}/>
              </div>);
            })}
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <Btn ch="✓ Confirmar Envío" fn={confirmarEnvio} color={B.navy} small/>
            <Btn ch="Cancelar" fn={()=>setEnvioId(null)} color={B.textMid} outline small/>
          </div>
        </div>}

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {o.etapa!=="listo"&&o.etapa!=="enviado"&&<Btn ch={"Avanzar → "+(ETIQ_ORDEN[ETAPAS_ORDEN[ei+1]]||"")} fn={()=>avanzar(o)} color={B.green} small/>}
          {o.etapa==="listo"&&envioId!==o.id&&<Btn ch="📦 Enviar" fn={()=>iniciarEnvio(o)} color={B.navy} small/>}
          <Btn ch="📄 PDF" fn={()=>printOrder(o)} color={B.teal} outline small/>
          {isSartori(sup)&&<Btn ch="Eliminar" fn={()=>{if(confirmDelete(sup,"¿Seguro que desea eliminar esta orden?"))eliminar(o.id);}} color={B.red} outline small/>}
        </div>
      </div>}
    </div>}/>);
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Órdenes de Producción</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>{abiertas.length} activas · {listas.length} listas · {enviadas.length} enviadas</p></div>
      <Btn ch={modo?"✕ Cancelar":"+ Nueva"} fn={()=>setModo(!modo)} color={modo?B.textMid:("linear-gradient(135deg,"+B.teal+","+B.navy+")")} small/>
    </div>

    <SearchBar value={buscar} onChange={setBuscar} placeholder="Buscar cliente, producto, puerto..."/>

    {modo&&<Card accent={B.teal} ch={<div>
      <div style={{color:B.teal,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:16}}>Nueva Orden de Producción</div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:6}}>Cliente</div>
          <input list="clientes-list-ord" value={form.cliente} onChange={e=>setForm(f=>Object.assign({},f,{cliente:e.target.value}))} placeholder="Ej: Ouesplast" style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1.5px solid "+B.border,fontSize:14,fontWeight:500,background:"#fff",outline:"none",boxSizing:"border-box"}}/>
          <datalist id="clientes-list-ord">{(clientes||[]).map(c=><option key={c.id} value={c.nombre}/>)}</datalist>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="Fecha de Envío" value={form.fechaEnvio} onChange={v=>setForm(f=>Object.assign({},f,{fechaEnvio:v}))} type="date"/>
          <S label="Puerto / Destino" value={form.puerto} onChange={v=>setForm(f=>Object.assign({},f,{puerto:v}))} options={TODOS_PUERTOS}/>
        </div>
        {esTerresetre(form.puerto)&&<div style={{background:B.amber+"12",border:"1px solid "+B.amber+"33",borderRadius:10,padding:"10px 12px",fontSize:13,color:B.amber,fontWeight:600}}>🛣️ Frontera terrestre — verificar documentación de aduana</div>}
        <div>
          <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:10}}>Productos de la Orden</div>
          {form.items.map((it,i)=>(<div key={i} style={{background:B.bg,borderRadius:12,padding:"12px",marginBottom:8}}>
            <div style={{marginBottom:8}}><F label={"Producto "+(i+1)} value={it.producto} onChange={v=>setItem(i,"producto",v)} placeholder="Ej: Tubo PVC 1″ SDR-26"/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <F label="Cantidad" value={it.cantidad} onChange={v=>setItem(i,"cantidad",v)} type="number" placeholder="0"/>
              <S label="Unidad" value={it.unidad} onChange={v=>setItem(i,"unidad",v)} options={[{v:"uds",l:"Unidades"},{v:"lbs",l:"Libras"},{v:"rollos",l:"Rollos"},{v:"bolsas",l:"Bolsas"}]}/>
            </div>
            {form.items.length>1&&<button onClick={()=>removeItem(i)} style={{background:"none",border:"1px solid "+B.red+"44",color:B.red,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>✕ Quitar</button>}
          </div>))}
          <button onClick={addItem} style={{background:"none",border:"1.5px dashed "+B.teal,borderRadius:10,padding:"10px",width:"100%",color:B.teal,fontWeight:700,cursor:"pointer",fontSize:13}}>+ Agregar Producto</button>
        </div>
        <F label="Notas" value={form.notas} onChange={v=>setForm(f=>Object.assign({},f,{notas:v}))} placeholder="Instrucciones especiales..."/>
        <Btn ch="📋 Crear Orden" fn={save} full/>
      </div>
    </div>}/>}

    {abiertas.length===0&&listas.length===0&&!modo&&<Card style={{textAlign:"center",padding:32,border:"1.5px dashed "+B.border}} ch={<div><div style={{fontSize:36,marginBottom:8}}>📋</div><div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin órdenes activas</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca "+ Nueva" para registrar una orden</div></div>}/>}

    {abiertas.map(o=>renderOrderCard(o,"activas"))}

    {listas.length>0&&<div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Listas para Envío</span>
        <Badge label={listas.length} color={B.navy}/>
      </div>
      {listas.map(o=>renderOrderCard(o,"listas"))}
    </div>}

    {enviadas.length>0&&<div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Enviadas</span>
        <Badge label={enviadas.length} color={B.green}/>
      </div>
      {enviadas.map(o=>renderOrderCard(o,"enviadas"))}
    </div>}
  </div>);
}

// ── Rendimiento — by employee ────────────────────────────────────────────────
function Rendimiento({regs,resinaLogs}){
  const [periodo,setPeriodo]=useState("diario");
  const [etapa,setEtapa]=useState("all");
  const [maquinaFil,setMaquinaFil]=useState("all");
  const [vista,setVistaR]=useState("empleados"); // "empleados" | "supervisores" | "maquinas"
  const [fechaCustom,setFechaCustom]=useState("");

  const hoy=new Date().toISOString().split("T")[0];
  const semanaAtras=new Date(Date.now()-7*86400000).toISOString().split("T")[0];
  const mesAtras=new Date(Date.now()-30*86400000).toISOString().split("T")[0];

  // All machines flat list
  const todasMaquinas=Object.values(MAQUINAS).flat();

  const filtFecha=r=>{
    const fecha=fechaCustom||null;
    if(fecha)return r.fecha===fecha;
    if(periodo==="diario")return r.fecha===hoy;
    if(periodo==="semanal")return r.fecha>=semanaAtras;
    return r.fecha>=mesAtras;
  };
  const base=regs.filter(filtFecha)
    .filter(r=>etapa==="all"||r.etapa===etapa)
    .filter(r=>maquinaFil==="all"||r.maquina===maquinaFil);

  // Aggregate by employee (free text) OR supervisor
  const byEmpleado=useMemo(()=>{
    const m={};
    base.forEach(r=>{
      const key=r.empleado?(r.empleado.trim()||"Sin nombre"):("SUP: "+r.supervisorNombre.split(" ")[0]);
      const emp=EMPLEADOS.find(e=>e.nombre===key);
      if(!m[key])m[key]={nombre:key,cargo:emp?emp.cargo:"",area:emp?emp.area:"general",esSup:!r.empleado,registros:0,pelicula:0,fundas:0,rollos:0,desperdicio:0,turnos:new Set(),etapas:new Set(),maquinas:new Set()};
      m[key].registros++;
      m[key].pelicula+=Number(r.pelicula||0);
      m[key].fundas+=Number(r.bolsasProducidas||0);
      m[key].rollos+=Number(r.rollosProducidos||0);
      m[key].desperdicio+=Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioSlitter||0)+Number(r.desperdicioCorte||0);
      if(r.turno)m[key].turnos.add(r.turno.includes("Noche")?"🌙 Noche":"☀️ Día");
      m[key].etapas.add(ETIQUETAS[r.etapa]||r.etapa);
      if(r.maquina)m[key].maquinas.add(r.maquina);
    });
    return Object.values(m).sort((a,b)=>b.registros-a.registros);
  },[base]);

  // Aggregate by machine
  const byMaquina=useMemo(()=>{
    const allRegs=regs.filter(filtFecha).filter(r=>etapa==="all"||r.etapa===etapa).filter(r=>maquinaFil==="all"||r.maquina===maquinaFil);
    const m={};
    todasMaquinas.forEach(mq=>{
      const etapaKey=Object.entries(MAQUINAS).find(([,v])=>v.includes(mq))?.[0]||"";
      m[mq]={maquina:mq,etapa:etapaKey,registros:0,pelicula:0,fundas:0,rollos:0,desperdicio:0,lbsImpresion:0,turnos:new Set(),operadores:new Set()};
    });
    allRegs.forEach(r=>{
      if(!r.maquina||!m[r.maquina])return;
      m[r.maquina].registros++;
      m[r.maquina].pelicula+=Number(r.pelicula||0);
      m[r.maquina].fundas+=Number(r.bolsasProducidas||0);
      m[r.maquina].rollos+=Number(r.rollosProducidos||0);
      m[r.maquina].lbsImpresion+=Number(r.lbsImpresion||0);
      m[r.maquina].desperdicio+=Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioSlitter||0)+Number(r.desperdicioCorte||0);
      if(r.turno)m[r.maquina].turnos.add(r.turno.includes("Noche")?"🌙":"☀️");
      if(r.empleado)m[r.maquina].operadores.add(r.empleado.split(" ")[0]);
    });
    return Object.values(m).sort((a,b)=>b.registros-a.registros);
  },[regs,etapa,periodo,fechaCustom,maquinaFil]);

  const bySup=useMemo(()=>{
    const m={};
    SUPERVISORES.forEach(s=>{m[s.codigo]={nombre:s.nombre,codigo:s.codigo,registros:0,pelicula:0,fundas:0,desperdicio:0};});
    base.forEach(r=>{const k=r.supervisorCodigo;if(!m[k])return;m[k].registros++;m[k].pelicula+=Number(r.pelicula||0);m[k].fundas+=Number(r.bolsasProducidas||0);m[k].desperdicio+=Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioSlitter||0)+Number(r.desperdicioCorte||0);});
    return Object.values(m).sort((a,b)=>b.registros-a.registros);
  },[base]);

  const lista=vista==="empleados"?byEmpleado:vista==="maquinas"?byMaquina:bySup;
  const maxReg=Math.max(...lista.map(s=>s.registros),1);
  const maxFundas=Math.max(...lista.map(s=>s.fundas),1);
  const maxFilm=Math.max(...lista.map(s=>s.pelicula),1);

  const totalRegs=base.length;
  const totalFilm=base.reduce((s,r)=>s+Number(r.pelicula||0),0);
  const totalFundas=base.reduce((s,r)=>s+Number(r.bolsasProducidas||0),0);
  const totalDesp=base.reduce((s,r)=>s+Number(r.desperdicio||0)+Number(r.desperdicioImpresion||0)+Number(r.desperdicioSlitter||0)+Number(r.desperdicioCorte||0),0);
  const periodoLabel=fechaCustom?fechaCustom:(periodo==="diario"?"hoy":periodo==="semanal"?"esta semana":"este mes");
  const perLabel={diario:"hoy",semanal:"esta semana",mensual:"este mes"};

  // Birthdays this month
  const cumpleMes=useMemo(()=>{
    let profiles={};try{profiles=JSON.parse(localStorage.getItem("plastinord_emp_profiles")||"{}");}catch(e){}
    const now=new Date();const mesActual=now.getMonth();const diaHoy=now.getDate();
    const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const list=[];
    EMPLEADOS.forEach(e=>{
      const fn=profiles[e.nombre]?.fechaNacimiento;if(!fn)return;
      const d=new Date(fn+"T00:00:00");if(isNaN(d))return;
      if(d.getMonth()===mesActual)list.push({nombre:e.nombre,cargo:e.cargo,dia:d.getDate(),fecha:fn,pasado:d.getDate()<diaHoy,hoy:d.getDate()===diaHoy});
    });
    return{list:list.sort((a,b)=>a.dia-b.dia),mes:meses[mesActual]};
  },[]);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Rendimiento del Equipo</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Por empleado y por supervisor</p></div>

    {/* Cumpleaños del mes */}
    <Card ch={<div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:18}}>🎂</span>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Cumpleaños · {cumpleMes.mes}</div>
      </div>
      {cumpleMes.list.length===0?
        <div style={{textAlign:"center",padding:12,color:B.textLight,fontSize:13}}>Sin cumpleaños este mes</div>:
        <div style={{display:"flex",flexDirection:"column",gap:6}}>

    {/* Totals */}

      <Stat label="Fundas" value={totalFundas.toLocaleString()} unit="uds" color={B.navy} sub={periodoLabel}/>
      <Stat label="Desperdicio" value={totalDesp.toFixed(0)} unit="lbs" color={B.red} sub={periodoLabel}/>

    {/* Bars */}
    <Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:14}}>

        {maquinaFil!=="all"&&<span style={{color:B.teal,marginLeft:8}}>{maquinaFil}</span>}

        lista.map(s=>{
          const pctR=(s.registros/maxReg)*100;

          const etapasList=s.etapas?Array.from(s.etapas).join(", "):"";
          return(<div key={s.nombre||s.codigo} style={{marginBottom:20,paddingBottom:20,borderBottom:"1px solid "+B.border}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{flex:1}}>
                {vista==="maquinas"

                    <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>{s.maquina}</div>

                  </div>
                  :<div>
                    <div style={{color:B.textDark,fontSize:14,fontWeight:800}}>{s.nombre.split(" ")[0]} {s.nombre.split(" ")[1]||""}</div>
                    {vista==="empleados"?<div>
                      {s.cargo&&<div style={{color:B.teal,fontSize:11,fontWeight:700,marginTop:1}}>{s.cargo}</div>}
                      <div style={{color:B.textLight,fontSize:11,marginTop:2}}>{turnos&&turnos+" · "}{s.maquinas&&Array.from(s.maquinas).join(", ")}</div>
                    </div>:
                      <div style={{color:B.textLight,fontSize:11,marginTop:2}}>{s.codigo}</div>
                    }
                  </div>
                }
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:B.teal,fontWeight:800,fontSize:18}}>{s.registros}</div>
                <div style={{color:B.textLight,fontSize:10}}>registros</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
              <span style={{color:B.textLight,fontSize:11,width:58,flexShrink:0}}>Registros</span>
              <div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:pctR+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.tealLight+")",borderRadius:4}}/></div>
              <span style={{color:B.textDark,fontSize:12,fontWeight:700,width:24,textAlign:"right"}}>{s.registros}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
              <span style={{color:B.textLight,fontSize:11,width:58,flexShrink:0}}>Fundas</span>
              <div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:pctF+"%",height:"100%",background:"linear-gradient(90deg,"+B.navy+",#6B85B8)",borderRadius:4}}/></div>
              <span style={{color:B.textDark,fontSize:12,fontWeight:700,width:48,textAlign:"right"}}>{s.fundas>0?s.fundas.toLocaleString():"—"}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{color:B.textLight,fontSize:11,width:58,flexShrink:0}}>Película</span>
              <div style={{flex:1,height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}><div style={{width:pctP+"%",height:"100%",background:"linear-gradient(90deg,"+B.green+",#68D391)",borderRadius:4}}/></div>
              <span style={{color:B.textDark,fontSize:12,fontWeight:700,width:48,textAlign:"right"}}>{s.pelicula>0?s.pelicula.toFixed(0)+"lb":"—"}</span>
            </div>
          </div>);
        })
      }
    </div>}/>

    {/* Ranking */}
    {base.length>0&&lista.some(s=>s.registros>0)&&<Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>🏆 Ranking {perLabel[periodo]}</div>
      {lista.filter(s=>s.registros>0).map((s,i)=>{
        const medals=["🥇","🥈","🥉"];
        return(<div key={s.nombre||s.codigo} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<lista.filter(x=>x.registros>0).length-1?"1px solid "+B.border:"none"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:i===0?"linear-gradient(135deg,#F6E05E,#D97706)":i===1?"linear-gradient(135deg,#CBD5E0,#718096)":i===2?"linear-gradient(135deg,#C05621,#9C4221)":B.bg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:i<3?14:12,color:i<3?"#fff":B.textLight,flexShrink:0}}>{i<3?medals[i]:i+1}</div>
          <div style={{flex:1}}>
            <div style={{color:B.textDark,fontSize:14,fontWeight:700}}>{s.nombre.split(" ")[0]} {s.nombre.split(" ")[1]||""}</div>
            {s.cargo&&<div style={{color:B.teal,fontSize:11,fontWeight:600}}>{s.cargo}</div>}
            <div style={{color:B.textLight,fontSize:12}}>
              {s.registros} registros
              {s.fundas>0?" · "+s.fundas.toLocaleString()+" fundas":""}
              {s.pelicula>0?" · "+s.pelicula.toFixed(0)+" lbs film":""}
            </div>

          {i===0&&<span style={{fontSize:20}}>⭐</span>}
        </div>);
      })}
    </div>}/>}
  </div>);
}

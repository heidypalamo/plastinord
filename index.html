function AlmacenUnificado({logs,setLogs,ordenes,setOrdenes,productoLogs,setProductoLogs,sup,mat,setMat,movs,setMovs,regs,clientes,setClientes,facturas,setFacturas,pagos,setPagos}){
  const [seccion,setSeccion]=useState("terminado"); // "terminado" | "ordenes"
  const tabBtn=(id)=>({flex:1,background:seccion===id?"#fff":"transparent",border:"none",borderRadius:10,padding:"10px 4px",color:seccion===id?B.textDark:B.textLight,fontSize:12,fontWeight:700,cursor:"pointer",boxShadow:seccion===id?"0 1px 4px rgba(0,0,0,.1)":"none"});
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Almacén</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Producto terminado y órdenes</p></div>
    <div style={{display:"flex",background:B.bg,borderRadius:12,padding:4,gap:3}}>
      <button onClick={()=>setSeccion("terminado")} style={tabBtn("terminado")}>Producto Terminado</button>
      <button onClick={()=>setSeccion("ordenes")} style={tabBtn("ordenes")}>{"Órdenes"+(ordenes.filter(o=>o.etapa!=="enviado").length>0?" ("+ordenes.filter(o=>o.etapa!=="enviado").length+")":"")}</button>
    </div>
    {seccion==="terminado"&&<ProductoTerminado logs={logs} setLogs={setLogs} ordenes={ordenes} sup={sup} regs={regs} clientes={clientes} setClientes={setClientes} facturas={facturas} setFacturas={setFacturas} pagos={pagos} setPagos={setPagos} productoLogs={productoLogs} setProductoLogs={setProductoLogs}/>}
    {seccion==="ordenes"&&<Ordenes ordenes={ordenes} setOrdenes={setOrdenes} productoLogs={productoLogs||logs} setProductoLogs={setProductoLogs||setLogs} sup={sup} clientes={clientes} setClientes={setClientes} regs={regs}/>}
  </div>);
}

function ProductoTerminado({logs,setLogs,ordenes,sup,regs,clientes,setClientes,facturas,setFacturas,pagos,setPagos,productoLogs,setProductoLogs}){
  const [modo,setModo]=useState(false); // "entrada" | "salida" | "exportacion" | false
  const [saved,setSaved]=useState(false);
  const [filProd,setFilProd]=useState("all");
  const [buscar,setBuscar]=useState("");
  const [fechaAlm,setFechaAlm]=useState("");
  const F0p={fecha:new Date().toISOString().split("T")[0],producto:"",cantidad:"",unidad:"uds",tipo:"entrada",destino:"",ordenId:"",notas:""};
  const [form,setForm]=useState(F0p);
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  // Summary per product: total produced, total shipped, in warehouse, lbs, order completion
  // Summary per product — uses extrusión registros for lbs produced, producto_terminado for uds/rollos
  const resumen=React.useMemo(()=>{
    const m={};
    productosDeOrdenes(ordenes).filter(p=>p!=="Otro").forEach(p=>{m[p]={producto:p,producido:0,enviado:0,lbsProducido:0,lbsEnviado:0,ordenadoLbs:0};});
    // Sum uds/rollos from producto_terminado logs
    logs.forEach(l=>{
      if(!m[l.producto])m[l.producto]={producto:l.producto,producido:0,enviado:0,lbsProducido:0,lbsEnviado:0,ordenadoLbs:0};
      if(l.tipo==="entrada")m[l.producto].producido+=l.cantidad;
      else if(l.tipo==="salida")m[l.producto].enviado+=l.cantidad;
      // Track lbs entries from producto_terminado too
      if(l.unidad==="lbs"){
        if(l.tipo==="entrada")m[l.producto].lbsProducido+=l.cantidad;
        else if(l.tipo==="salida")m[l.producto].lbsEnviado+=l.cantidad;
      }
    });
    // Sum lbs from slitter registros (lbsSlitter = lbs entrada at slitter stage)
    (regs||[]).forEach(r=>{
      if(r.producto&&r.etapa==="slitter"&&r.lbsSlitter&&m[r.producto]){
        m[r.producto].lbsProducido+=Number(r.lbsSlitter)||0;
      }
    });
    // Sum ordered lbs from ordenes
    (ordenes||[]).forEach(o=>(o.items||[]).forEach(it=>{
      if(it.producto&&m[it.producto]&&(it.unidad==="lbs"||!it.unidad)){
        m[it.producto].ordenadoLbs+=Number(it.cantidad)||0;
      }
    }));
    return Object.values(m).map(p=>({...p,
      almacen:p.producido-p.enviado,
      lbsDisp:p.lbsProducido-p.lbsEnviado
    })).filter(p=>p.producido>0||p.lbsProducido>0||p.ordenadoLbs>0);
  },[logs,ordenes,regs]);

  const save=()=>{
    if(!form.cantidad||!form.producto)return;
    if(modo==="compra"&&!form.destino)return;
    const tipo=modo==="salida"?"salida":"entrada";
    const entry={id:Date.now(),fecha:form.fecha,producto:form.producto,cantidad:Number(form.cantidad),
      unidad:form.unidad,tipo,destino:form.destino+(modo==="compra"?" (Compra)":""),ordenId:form.ordenId,
      notas:form.notas||(modo==="compra"?"Compra externa":""),supervisor:sup.nombre};
    setLogs(p=>[entry,...p]);
    qSaveProducto(entry);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
    setForm(Object.assign({},F0p,{producto:form.producto,tipo:form.tipo}));
    setModo(false);
  };

  const del=id=>{dbLogAudit("delete","producto_terminado",id,sup.nombre);setLogs(p=>p.filter(x=>x.id!==id));dbDeleteProducto(id);};

  // Exportación
  const disponibles=resumen.filter(p=>p.almacen>0||p.lbsDisp>0);
  const [expForm,setExpForm]=useState({fecha:new Date().toISOString().split("T")[0],numExportacion:"",cliente:"",items:[]});
  const initExport=()=>{
    setExpForm({fecha:new Date().toISOString().split("T")[0],numExportacion:"",cliente:"",items:disponibles.map(p=>({producto:p.producto,disponible:p.lbsDisp>0?p.lbsDisp:p.almacen,unidad:p.lbsDisp>0?"lbs":"uds",cantidad:"",incluir:false}))});
    setModo("exportacion");
  };
  const toggleExpItem=(i)=>setExpForm(f=>{const items=[...f.items];items[i]={...items[i],incluir:!items[i].incluir};return{...f,items};});
  const setExpItem=(i,k,v)=>setExpForm(f=>{const items=[...f.items];items[i]={...items[i],[k]:v};return{...f,items};});
  const expItems=expForm.items.filter(it=>it.incluir&&Number(it.cantidad)>0);

  const saveExportacion=async()=>{
    try{
      if(!expForm.numExportacion){alert("Ingrese el número de exportación");return;}
      if(!expForm.cliente){alert("Ingrese el cliente");return;}
      if(expItems.length===0){alert("Seleccione al menos un producto con cantidad");return;}
      if(!window.confirm("¿Crear exportación "+expForm.numExportacion+" con "+expItems.length+" productos?"))return;
      // Create factura
      const fId=String(Date.now());
      const y=new Date().getFullYear();
      const existingFac=(facturas||[]).filter(f=>f.numero&&f.numero.startsWith("FAC-"+y));
      const mx=existingFac.reduce((max,f)=>{const n=parseInt((f.numero||"").split("-")[2])||0;return n>max?n:max;},0);
      const facNum="FAC-"+y+"-"+String(mx+1).padStart(3,"0");
      const factura={id:fId,numero:facNum,fecha:expForm.fecha,cliente:expForm.cliente,ncf:null,orden_id:null,subtotal:0,impuesto:0,total:0,estado:"pendiente",notas:"Exportación #"+expForm.numExportacion,creado_por:sup.nombre,created_at:new Date().toISOString()};
      const facItems=expItems.map((it,i)=>({id:fId+"-"+i,factura_id:fId,producto:it.producto,cantidad:Number(it.cantidad)||0,precio_unitario:0,subtotal:0}));
      setFacturas(prev=>[Object.assign({},factura,{_items:facItems}),...prev]);
      await dbSaveFactura(factura);
      for(const item of facItems){await dbSaveFacturaItem(item);}
      // Auto-save client
      if(expForm.cliente){
        const existing=(clientes||[]).find(c=>c.nombre&&c.nombre.toLowerCase()===expForm.cliente.toLowerCase());
        if(!existing){
          const cl={id:String(Date.now()),nombre:expForm.cliente,created_at:new Date().toISOString()};
          setClientes(prev=>[cl,...prev]);
          dbSaveCliente(cl);
        }
      }
      // Deduct from almacén
      for(const it of expItems){
        const qty=Number(it.cantidad)||0;
        if(qty>0){
          const salida={id:Date.now()+Math.random(),fecha:expForm.fecha,producto:it.producto,cantidad:qty,unidad:it.unidad,tipo:"salida",destino:expForm.cliente,ordenId:"",notas:"Exportación #"+expForm.numExportacion,supervisor:sup.nombre};
          setLogs(p=>[salida,...p]);
          await qSaveProducto(salida);
        }
      }
      setSaved(true);setTimeout(()=>setSaved(false),3000);
      setModo(false);
      alert("✓ Exportación #"+expForm.numExportacion+" creada — Factura "+facNum+" enviada a Contabilidad");
    }catch(err){
      console.error("saveExportacion error:",err);
      alert("Error al crear exportación: "+err.message);
    }
  };

  const prodFil=(filProd==="all"?logs:logs.filter(l=>l.producto===filProd)).filter(l=>{
    if(fechaAlm&&l.fecha!==fechaAlm)return false;
    if(!buscar)return true;
    const q=buscar.toLowerCase();
    return(l.producto||"").toLowerCase().includes(q)||(l.destino||"").toLowerCase().includes(q)||(l.notas||"").toLowerCase().includes(q);
  });
  const totalAlmacen=resumen.reduce((s,r)=>s+Math.max(0,r.almacen),0);
  const totalLbsDisp=resumen.reduce((s,r)=>s+Math.max(0,r.lbsDisp),0);

  // ── Daily report (per-day entradas/salidas) when a date is selected ──
  const reporteDia=React.useMemo(()=>{
    if(!fechaAlm)return null;
    const map={};
    (logs||[]).forEach(l=>{
      if(l.fecha!==fechaAlm)return;
      if(!map[l.producto])map[l.producto]={producto:l.producto,ent_uds:0,sal_uds:0,ent_lbs:0,sal_lbs:0,mov:0};
      const slot=map[l.producto];slot.mov++;
      const cant=Number(l.cantidad)||0;
      if(l.unidad==="lbs"){
        if(l.tipo==="entrada")slot.ent_lbs+=cant;
        else if(l.tipo==="salida")slot.sal_lbs+=cant;
      }else{
        if(l.tipo==="entrada")slot.ent_uds+=cant;
        else if(l.tipo==="salida")slot.sal_uds+=cant;
      }
    });
    return Object.values(map).map(r=>Object.assign({},r,{neto_uds:r.ent_uds-r.sal_uds,neto_lbs:r.ent_lbs-r.sal_lbs}));
  },[fechaAlm,logs]);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    {saved&&<span style={{background:B.green+"18",color:B.green,borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:700,textAlign:"center"}}>✓ Guardado</span>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

      </div>)}
      <Btn ch={"Crear Exportación"+(expItems.length>0?" — "+expItems.length+" productos":"")} fn={saveExportacion} full color={B.navy}/>
    </div>}/></div>}

    {/* Entrada/Compra form */}
    {(modo==="entrada"||modo==="compra")&&<div style={{animation:"slideDown .2s ease"}}><Card accent={modo==="compra"?B.purple:B.green} ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

        <F label="Producto" value={form.producto} onChange={set("producto")} placeholder="Nombre del producto"/>
      </div>

      <F label="Notas" value={form.notas} onChange={set("notas")} placeholder="Observaciones..."/>
      <Btn ch={"✓ Guardar "+(modo==="compra"?"Compra":"Entrada")} fn={save} full color={modo==="compra"?B.purple:B.green}/>
    </div>}/></div>}

    {/* Activity history */}
    <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginTop:4}}>Historial de Movimientos{fechaAlm?" — "+fechaAlm:""}</div>
    <Card ch={<div>
      <SearchBar value={buscar} onChange={setBuscar} placeholder="Buscar producto, destino..."/>

        {[...new Set(logs.map(l=>l.producto))].map(p=>(<button key={p} onClick={()=>setFilProd(p)} style={{background:filProd===p?B.navy:"transparent",border:"1.5px solid "+(filProd===p?B.navy:B.border),borderRadius:20,padding:"4px 10px",color:filProd===p?"#fff":B.textMid,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{p.split(" ")[0]}</button>))}
      </div>
      <div style={{marginTop:12}}>

            </div>

}

// ── Producción Simple (replaces Flujo) ───────────────────────────────────────
function ProduccionSimple({sup,regs,setRegs,resinaLogs,setResinaLogs,mat,setMat,movs,setMovs,ordenes,setOrdenes,productoLogs,setProductoLogs,lotes,setLotes}){
  // ── Date navigation (view any day) ──
  const hoyStr=new Date().toISOString().split("T")[0];
  const [fechaVer,setFechaVer]=useState(hoyStr);
  const readOnly=fechaVer!==hoyStr;
  const ayerStr=(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split("T")[0];})();
  // ── Mezcla state ──
  const [mezOpen,setMezOpen]=useState(false);
  const [ldpe,setLdpe]=useState("");
  const [mlldpe,setMlldpe]=useState("");
  const [mezMaq,setMezMaq]=useState("MEZ-1");
  const [mezEmp,setMezEmp]=useState("");
  const [mezNota,setMezNota]=useState("");
  const [mezLoteId,setMezLoteId]=useState("");
  const [mezFecha,setMezFecha]=useState(hoyStr);
  // Keep mezcla fecha in sync with date-view picker
  React.useEffect(()=>{setMezFecha(fechaVer);},[fechaVer]);

  const mezTotal=()=>(Number(ldpe)||0)+(Number(mlldpe)||0);
  const saveMezcla=()=>{
    if(readOnly)return;
    if(!mezTotal())return;
    const loteIdUsed=mezLoteId||null;
    const b={id:Date.now(),fecha:mezFecha,ldpe:Number(ldpe)||0,mlldpe:Number(mlldpe)||0,total:mezTotal(),maquina:mezMaq,empleado:mezEmp,notas:mezNota,loteId:loteIdUsed};
    // Deduct from Almacén
    [["ldpe",b.ldpe],["mlldpe",b.mlldpe]].forEach(([id,val])=>{
      if(!val)return;
      const m=mat.find(x=>x.id===id);if(!m)return;
      setMat(p=>p.map(x=>x.id===id?Object.assign({},x,{stockActual:Math.max(0,x.stockActual-val)}):x));
      const dmv={id:Date.now()+Math.random(),tipo:"descuento",materialId:id,materialNombre:m.nombre,cantidad:val,unidad:m.unidad,maquina:"Mezcla",fecha:b.fecha,supervisor:sup.nombre};
      setMovs(p=>[dmv,...p]);qSaveMovimiento(dmv);
    });
    setResinaLogs(p=>[b,...p]);qSaveResina(b);
    // Push into lote.etapas.mezcla if a lote was chosen
    if(loteIdUsed&&setLotes){
      const entry={id:b.id,fecha:b.fecha,lbs_out:b.total,lbs_in:0,desperdicio:0,empleado:b.empleado,maquina:b.maquina,notas:b.notas,ldpe:b.ldpe,mlldpe:b.mlldpe};
      setLotes(prev=>prev.map(L=>{
        if(String(L.id)!==String(loteIdUsed))return L;
        const et=Object.assign({},L.etapas||newLoteEtapas());
        et.mezcla=Object.assign({},et.mezcla||LOTE_STAGE_INIT(),{entries:[...(et.mezcla&&et.mezcla.entries||[]),entry]});
        const upd=Object.assign({},L,{etapas:et});
        dbUpdateLote(L.id,{etapas:JSON.stringify(et)});
        return upd;
      }));
    }
    setLdpe("");setMlldpe("");setMezNota("");setMezLoteId("");setMezOpen(false);
  };
  // Create a new lote (batch) — called from Mezcla card
  const crearNuevoLote=()=>{
    if(readOnly||!setLotes)return;
    const numero=nextLoteNumero(lotes||[]);
    const nuevo={id:Date.now(),numero,fecha:fechaVer,creadoPor:sup.nombre,etapas:newLoteEtapas()};
    setLotes(prev=>[...prev,nuevo]);
    dbSaveLote(nuevo);
    setMezLoteId(String(nuevo.id));
    if(!mezOpen)setMezOpen(true);
  };

  // ── Stage card state ──
  const STAGES=[
    {id:"extrusion",label:"Extrusión",icon:"⚙️",color:B.teal,fields:["lbs_in","lbs_out","rollosProducidos","tamanoRollo","desperdicio"]},
    {id:"impresion",label:"Impresora",icon:"🖨️",color:B.navy,fields:["lbs_out","producto","desperdicio"]},
    {id:"slitter",label:"Slitter",icon:"✂️",color:B.tealDark,fields:["lbs_out","producto","desperdicio"]},
    {id:"cortadora",label:"Cortadora",icon:"🛠️",color:"#4E7C59",fields:["bolsasProducidas","producto","desperdicio"]},
    {id:"peletizadora",label:"Peletizadora",icon:"🔄",color:"#0D9488",fields:["peletEntrada","peletSalida","peletDesperdicio"]}
  ];

  const saveReg=(etapa,data)=>{
    if(readOnly)return;
    const fecha=data.fecha||new Date().toISOString().split("T")[0];
    const r=Object.assign({id:Date.now(),fecha,etapa,supervisorNombre:sup.nombre,supervisorCodigo:sup.codigo,turno:data.turno||"☀️ Turno Día"},data);
    setRegs(p=>[r,...p]);qSave(r);
    // Push into lote.etapas[etapa] if a lote was chosen (extrusion/impresion)
    if(data.loteId&&setLotes&&(etapa==="extrusion"||etapa==="impresion")){
      const entry={id:r.id,fecha:r.fecha,lbs_in:Number(data.lbs_in)||0,lbs_out:Number(data.lbs_out)||Number(data.pelicula)||0,rollosProducidos:Number(data.rollosProducidos)||0,desperdicio:Number(data.desperdicio)||0,empleado:data.empleado,maquina:data.maquina,producto:data.producto||"",notas:data.notas||""};
      setLotes(prev=>prev.map(L=>{
        if(String(L.id)!==String(data.loteId))return L;
        const et=Object.assign({},L.etapas||newLoteEtapas());
        et[etapa]=Object.assign({},et[etapa]||LOTE_STAGE_INIT(),{entries:[...(et[etapa]&&et[etapa].entries||[]),entry]});
        const upd=Object.assign({},L,{etapas:et});
        dbUpdateLote(L.id,{etapas:JSON.stringify(et)});
        return upd;
      }));
    }
    // Auto-stock: slitter output → Producto Terminado (lbs)
    if(etapa==="slitter"&&(Number(data.lbs_out)||0)>0){
      const ptEntry={id:Date.now()+1,fecha,producto:data.producto||"Producto",cantidad:Number(data.lbs_out),unidad:"lbs",tipo:"entrada",destino:"",ordenId:"",notas:"Auto: Slitter "+data.maquina,supervisor:sup.nombre};
      setProductoLogs(p=>[ptEntry,...p]);qSaveProducto(ptEntry);
    }
    // Auto-stock: cortadora output → Producto Terminado (fundas)
    if(etapa==="cortadora"&&(Number(data.bolsasProducidas)||0)>0){
      const ptEntry={id:Date.now()+2,fecha,producto:data.producto||"Producto",cantidad:Number(data.bolsasProducidas),unidad:"uds",tipo:"entrada",destino:"",ordenId:"",notas:"Auto: Cortadora "+data.maquina,supervisor:sup.nombre};
      setProductoLogs(p=>[ptEntry,...p]);qSaveProducto(ptEntry);
    }
    // Auto-stock: peletizadora output → materia prima (material peletizado)
    if(etapa==="peletizadora"&&(Number(data.peletSalida)||0)>0){
      const lbs=Number(data.peletSalida);
      setMat(p=>p.map(x=>x.id==="peletizado"?Object.assign({},x,{stockActual:x.stockActual+lbs}):x));
      const mv={id:Date.now()+3,tipo:"entrada",materialId:"peletizado",materialNombre:"Material Peletizado",cantidad:lbs,unidad:"lbs",maquina:data.maquina||"PEL-1",fecha,supervisor:sup.nombre,notas:"Auto: Peletizadora — "+lbs+" lbs producidas"};
      setMovs(p=>[mv,...p]);qSaveMovimiento(mv);
    }
    // Auto-advance linked order
    if(data.ordenId){
      const o=(ordenes||[]).find(x=>String(x.id)===String(data.ordenId));
      if(o&&o.etapa!=="listo"&&o.etapa!=="enviado"){
        const oIdx=ETAPAS_ORDEN.indexOf(o.etapa);
        const stgIdx=ETAPAS_ORDEN.indexOf(etapa);
        if(stgIdx>=oIdx&&stgIdx<ETAPAS_ORDEN.length-1){
          const next=ETAPAS_ORDEN[stgIdx+1];
          setOrdenes(p=>p.map(x=>String(x.id)===String(data.ordenId)?Object.assign({},x,{etapa:next}):x));
          dbUpdateOrder(o.id,{etapa:next});
        }
      }
    }
  };

  const ldpeStock=(mat.find(m=>m.id==="ldpe")||{stockActual:0}).stockActual;
  const mlldpeStock=(mat.find(m=>m.id==="mlldpe")||{stockActual:0}).stockActual;

  // ── Daily chain aggregates (mezcla → extrusion → impresion) for fechaVer ──
  const mezDia=(resinaLogs||[]).filter(b=>b.fecha===fechaVer);
  const extDia=(regs||[]).filter(r=>r.fecha===fechaVer&&r.etapa==="extrusion");
  const impDia=(regs||[]).filter(r=>r.fecha===fechaVer&&r.etapa==="impresion");
  const mezLbsDia=mezDia.reduce((s,b)=>s+(Number(b.total)||0),0);
  const extInDia=extDia.reduce((s,r)=>s+(Number(r.lbs_in)||0),0);
  const extOutDia=extDia.reduce((s,r)=>s+(Number(r.pelicula)||Number(r.lbs_out)||0),0);
  const extRollosDia=extDia.reduce((s,r)=>s+(Number(r.rollosProducidos)||0),0);
  const extDespDia=extDia.reduce((s,r)=>s+(Number(r.desperdicio)||0),0);
  const impOutDia=impDia.reduce((s,r)=>s+(Number(r.lbs_out)||0),0);
  const impDespDia=impDia.reduce((s,r)=>s+(Number(r.desperdicio)||0),0);
  const rendExt=mezLbsDia>0?((extOutDia/mezLbsDia)*100).toFixed(0):null;
  const rendImp=extOutDia>0?((impOutDia/extOutDia)*100).toFixed(0):null;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Producción</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>Registrar etapas de producción</p></div>

    {/* ── Date navigation: view any day ── */}
    <Card accent={B.teal+"44"} ch={<div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:11,fontWeight:800,color:B.textLight,textTransform:"uppercase",letterSpacing:.6}}>Viendo día</div>
          <input type="date" value={fechaVer} onChange={e=>setFechaVer(e.target.value)} style={{padding:"7px 10px",border:"1.5px solid "+B.border,borderRadius:10,fontSize:13,fontWeight:700,color:B.textDark}}/>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setFechaVer(ayerStr)} style={{background:fechaVer===ayerStr?B.navy:"#fff",border:"1.5px solid "+(fechaVer===ayerStr?B.navy:B.border),borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:700,color:fechaVer===ayerStr?"#fff":B.textMid,cursor:"pointer"}}>Ayer</button>
          <button onClick={()=>setFechaVer(hoyStr)} style={{background:fechaVer===hoyStr?B.teal:"#fff",border:"1.5px solid "+(fechaVer===hoyStr?B.teal:B.border),borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:700,color:fechaVer===hoyStr?"#fff":B.textMid,cursor:"pointer"}}>Hoy</button>
        </div>
      </div>
      {readOnly&&<div style={{marginTop:10,background:"#F59E0B18",color:"#B45309",borderRadius:10,padding:"8px 12px",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>🔒 Modo solo lectura — viendo un día pasado. Cambia a "Hoy" para registrar.</div>}
    </div>}/>

    {/* ── Cadena del día: Mezcla → Extrusión → Impresión ── */}
    <Card accent={"#7C3AED44"} ch={<div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:14,color:B.textDark}}>🔗 Cadena del día</div>
        <div style={{fontSize:11,color:B.textLight,fontWeight:700}}>{fechaVer}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr auto 1fr",gap:6,alignItems:"stretch"}}>
        {/* Mezcla column */}
        <div style={{background:"#7C3AED10",borderRadius:12,padding:"10px 8px",border:"1px solid #7C3AED33"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#7C3AED",textTransform:"uppercase",letterSpacing:.5}}>🧪 Mezcla</div>
          <div style={{fontSize:18,fontWeight:900,color:B.textDark,marginTop:4}}>{mezLbsDia.toLocaleString()}</div>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>lbs · {mezDia.length} reg</div>
        </div>
        {/* Arrow + rendimiento */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
          <div style={{color:B.textLight,fontSize:18,fontWeight:900}}>→</div>
          {rendExt!==null&&<div style={{fontSize:9,color:B.teal,fontWeight:800}}>{rendExt}%</div>}
        </div>
        {/* Extrusion column */}
        <div style={{background:B.teal+"10",borderRadius:12,padding:"10px 8px",border:"1px solid "+B.teal+"44"}}>
          <div style={{fontSize:10,fontWeight:800,color:B.teal,textTransform:"uppercase",letterSpacing:.5}}>⚙️ Extrusión</div>
          <div style={{fontSize:18,fontWeight:900,color:B.textDark,marginTop:4}}>{extOutDia.toLocaleString()}</div>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>lbs · {extRollosDia} rollos</div>
          {extDespDia>0&&<div style={{fontSize:9,color:B.red,fontWeight:700,marginTop:2}}>-{extDespDia} desp.</div>}
        </div>
        {/* Arrow + rendimiento */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
          <div style={{color:B.textLight,fontSize:18,fontWeight:900}}>→</div>
          {rendImp!==null&&<div style={{fontSize:9,color:B.navy,fontWeight:800}}>{rendImp}%</div>}
        </div>
        {/* Impresion column */}
        <div style={{background:B.navy+"10",borderRadius:12,padding:"10px 8px",border:"1px solid "+B.navy+"44"}}>
          <div style={{fontSize:10,fontWeight:800,color:B.navy,textTransform:"uppercase",letterSpacing:.5}}>🖨️ Impresión</div>
          <div style={{fontSize:18,fontWeight:900,color:B.textDark,marginTop:4}}>{impOutDia.toLocaleString()}</div>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>lbs · {impDia.length} reg</div>
          {impDespDia>0&&<div style={{fontSize:9,color:B.red,fontWeight:700,marginTop:2}}>-{impDespDia} desp.</div>}
        </div>
      </div>
      {mezLbsDia===0&&extOutDia===0&&impOutDia===0&&<div style={{textAlign:"center",padding:"10px 0 2px",color:B.textLight,fontSize:11,fontStyle:"italic"}}>Sin producción registrada para este día</div>}
    </div>}/>

    {/* ── Mezcla Section ── */}
    <Card accent={"#7C3AED44"} ch={<div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:mezOpen?14:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:12,background:"#7C3AED18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🧪</div>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:B.textDark}}>Mezcla</div>
            <div style={{fontSize:12,color:B.textLight}}>Registro de resina · Auto-descuento</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {!readOnly&&<Btn ch="+ Lote" fn={crearNuevoLote} color={B.teal} outline small/>}
          <Btn ch={mezOpen?"✕ Cerrar":"+ Registrar"} fn={()=>{if(!readOnly)setMezOpen(!mezOpen);}} color={mezOpen?B.textMid:"#7C3AED"} small/>
        </div>
      </div>
      {/* Stock display */}
      {mezOpen&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div style={{background:B.teal+"12",borderRadius:10,padding:"8px 10px",border:"1px solid "+B.teal+"30"}}>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700,textTransform:"uppercase"}}>Stock LDPE</div>
          <div style={{fontSize:18,fontWeight:800,color:B.teal}}>{ldpeStock.toLocaleString()}<span style={{fontSize:11,color:B.textLight}}> lbs</span></div>
        </div>
        <div style={{background:B.navy+"12",borderRadius:10,padding:"8px 10px",border:"1px solid "+B.navy+"30"}}>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700,textTransform:"uppercase"}}>Stock MLLDPE</div>
          <div style={{fontSize:18,fontWeight:800,color:B.navy}}>{mlldpeStock.toLocaleString()}<span style={{fontSize:11,color:B.textLight}}> lbs</span></div>
        </div>
      </div>}
      {mezOpen&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <F label="Fecha" value={mezFecha} onChange={setMezFecha} type="date"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <F label="LDPE (lbs)" value={ldpe} onChange={setLdpe} type="number" placeholder="0"/>
          <F label="MLLDPE (lbs)" value={mlldpe} onChange={setMlldpe} type="number" placeholder="0"/>
        </div>
        {mezTotal()>0&&<div style={{background:B.bg,borderRadius:10,padding:"8px 12px"}}>
          <span style={{fontSize:12,fontWeight:700,color:B.textMid}}>Total: </span>
          <span style={{fontSize:16,fontWeight:800,color:"#7C3AED"}}>{mezTotal().toLocaleString()} lbs</span>
        </div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <S label="Máquina" value={mezMaq} onChange={setMezMaq} options={MAQUINAS.mezcla.map(m=>({v:m,l:m}))}/>
          <S label="Empleado" value={mezEmp} onChange={setMezEmp} options={[{v:"",l:"— Seleccionar —"},...NOMBRES_EMPLEADOS.map(n=>({v:n,l:n}))]}/>
        </div>
        <F label="Notas (opcional)" value={mezNota} onChange={setMezNota} placeholder="..."/>
        {(lotes||[]).length>0&&<S label="Lote (opcional)" value={mezLoteId} onChange={setMezLoteId} options={[{v:"",l:"— Sin lote —"},...lotes.slice().reverse().map(L=>({v:String(L.id),l:"Lote "+L.numero+" · "+L.fecha}))]}/>}
        <Btn ch={readOnly?"🔒 Solo lectura":"✓ Guardar Mezcla"} fn={saveMezcla} color={readOnly?B.textLight:"#7C3AED"} full/>
      </div>}
      {/* Mezcla entries for the selected day */}
      {mezDia.length>0&&mezDia.map(b=>(<div key={b.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:"1px solid "+B.border,marginTop:6}}>
        <div><span style={{color:B.textDark,fontSize:13,fontWeight:700}}>{(Number(b.total)||0).toLocaleString()} lbs</span><span style={{color:B.textLight,fontSize:11,marginLeft:8}}>{b.empleado||""}</span></div>
        <div style={{fontSize:11,color:B.textLight}}>{b.ldpe}L / {b.mlldpe}M{b.loteId?" · L"+((lotes||[]).find(L=>String(L.id)===String(b.loteId))||{}).numero:""}</div>
      </div>))}
    </div>}/>

    {/* ── Divider ── */}
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <div style={{flex:1,height:1,background:B.border}}/>
      <span style={{fontSize:11,fontWeight:700,color:B.textLight,letterSpacing:.5}}>ETAPAS DE PRODUCCIÓN</span>
      <div style={{flex:1,height:1,background:B.border}}/>
    </div>

    {/* ── Stage Cards ── */}
    {STAGES.map(stg=>(<StageCard key={stg.id} stage={stg} regs={regs} onSave={saveReg} onDelete={(id)=>{setRegs(p=>p.filter(x=>x.id!==id));dbDelete(id);}} sup={sup} ordenes={ordenes} fechaVer={fechaVer} readOnly={readOnly} lotes={lotes}/>))}

    {/* ── Actividad del día ── */}
    {(()=>{
      const stageMap={};STAGES.forEach(s=>{stageMap[s.id]=s;});
      const regsDia=regs.filter(r=>r.fecha===fechaVer).map(r=>({...r,_type:"reg",_sort:r.id}));
      const mezHistDia=(resinaLogs||[]).filter(b=>b.fecha===fechaVer).map(b=>({...b,_type:"mez",_sort:b.id}));
      const todos=[...regsDia,...mezHistDia].sort((a,b)=>b._sort-a._sort);
      return(<>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,height:1,background:B.border}}/>
          <span style={{fontSize:11,fontWeight:700,color:B.textLight,letterSpacing:.5}}>ACTIVIDAD DEL DÍA ({todos.length})</span>
          <div style={{flex:1,height:1,background:B.border}}/>
        </div>
        <Card ch={<div>
          {todos.length===0?<div style={{textAlign:"center",padding:24,color:B.textLight,fontSize:13}}>Sin registros para {fechaVer}</div>:
          todos.map((e,i)=>{
            const isMez=e._type==="mez";
            const stg=!isMez&&stageMap[e.etapa];
            const isExt=e.etapa==="extrusion";
            const isCort=e.etapa==="cortadora";
            const isPelet=e.etapa==="peletizadora";
            return(<div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<todos.length-1?"1px solid "+B.border:"none"}}>
              <div style={{width:36,height:36,borderRadius:10,background:(isMez?"#7C3AED":stg?stg.color:B.teal)+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{isMez?"🧪":stg?stg.icon:"📋"}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,fontWeight:800,color:isMez?"#7C3AED":stg?stg.color:B.teal,textTransform:"uppercase",letterSpacing:.3}}>{isMez?"Mezcla":stg?stg.label:e.etapa}</span>
                  {e.turno&&<TurnoBadge turno={e.turno}/>}
                </div>
                <div style={{fontSize:13,fontWeight:700,color:B.textDark,marginTop:2}}>
                  {isMez&&<span>{(e.total||0).toLocaleString()} lbs ({e.ldpe}L / {e.mlldpe}M)</span>}
                  {isExt&&<span>{(Number(e.pelicula)||Number(e.lbs_out)||0).toLocaleString()} lbs · {e.rollosProducidos||0} rollos</span>}
                  {isCort&&<span>{e.bolsasProducidas||0} fundas</span>}
                  {isPelet&&<span>{(Number(e.peletEntrada)||0).toLocaleString()} → {(Number(e.peletSalida)||0).toLocaleString()} lbs</span>}
                  {!isMez&&!isExt&&!isCort&&!isPelet&&<span>{(Number(e.lbs_out)||0).toLocaleString()} lbs</span>}
                  {e.desperdicio>0&&<span style={{color:B.red,fontSize:11,fontWeight:600,marginLeft:6}}>-{e.desperdicio} desp.</span>}
                </div>
                <div style={{fontSize:11,color:B.textLight,marginTop:2}}>{e.empleado||e.maquina||""}{e.maquina&&e.empleado?" · "+e.maquina:""}{e.producto?" · "+e.producto:""}</div>
              </div>
            </div>);
          })}
        </div>}/>
      </>);
    })()}
  </div>);
}

function StageCard({stage,regs,onSave,onDelete,sup,ordenes,fechaVer,readOnly,lotes}){
  const {id:etapa,label,icon,color:col,fields}=stage;
  const isExt=etapa==="extrusion";
  const isImp=etapa==="impresion";
  const isCort=etapa==="cortadora";
  const isPelet=etapa==="peletizadora";
  const hoyStr=new Date().toISOString().split("T")[0];
  const activeFecha=fechaVer||hoyStr;
  // Entries for the selected day (fechaVer) + recent global totals
  const entriesDia=regs.filter(r=>r.etapa===etapa&&r.fecha===activeFecha);
  const entries=entriesDia.length>0?entriesDia.slice(0,20):regs.filter(r=>r.etapa===etapa).slice(0,20);
  const hasEntries=entriesDia.length>0;
  const [showForm,setShowForm]=useState(false);

  // Form state
  const [lbsIn,setLbsIn]=useState("");
  const [lbsOut,setLbsOut]=useState("");
  const [rollos,setRollos]=useState("");
  const [tamano,setTamano]=useState("9.5");
  const [rollosUsados,setRollosUsados]=useState("");
  const [bolsas,setBolsas]=useState("");
  const [producto,setProducto]=useState("");
  const [desp,setDesp]=useState("");
  const [emp,setEmp]=useState("");
  const [maq,setMaq]=useState((MAQUINAS[etapa]||[""])[0]);
  const [turno,setTurno]=useState("☀️ Turno Día");
  const [notas,setNotas]=useState("");
  const [fecha,setFecha]=useState(activeFecha);
  const [peletEntrada,setPeletEntrada]=useState("");
  const [peletSalida,setPeletSalida]=useState("");
  const [peletDesp,setPeletDesp]=useState("");
  const [ordenId,setOrdenId]=useState("");
  const [loteId,setLoteId]=useState("");
  // Keep fecha in sync with the parent's date picker
  React.useEffect(()=>{setFecha(activeFecha);},[activeFecha]);
  // Lotes disponibles para esta etapa (solo extrusion e impresion usan la cadena)
  const loteOpts=React.useMemo(()=>{
    if(!lotes||(!isExt&&!isImp))return[];
    const opts=[{v:"",l:"— Sin lote —"}];
    lotes.forEach((L,i)=>{
      try{
        const disp=disponibleLbs(lotes,i,etapa);
        if(disp===null||disp>0){
          opts.push({v:String(L.id),l:"Lote "+L.numero+(disp!==null?" · "+disp.toLocaleString()+" lbs disp":"")});
        }
      }catch(_){}
    });
    return opts;
  },[lotes,etapa,isExt,isImp]);

  // Active orders at or before this stage
  const ordenesDisp=React.useMemo(()=>{
    const stgIdx=ETAPAS_ORDEN.indexOf(etapa);
    return(ordenes||[]).filter(o=>{
      if(o.etapa==="listo"||o.etapa==="enviado")return false;
      const oIdx=ETAPAS_ORDEN.indexOf(o.etapa);
      return oIdx<=stgIdx;
    });
  },[ordenes,etapa]);
  const ordenOpts=[{v:"",l:"— Sin orden —"},...ordenesDisp.map(o=>({v:String(o.id),l:o.cliente+" — "+(o.items||[]).map(it=>it.producto).join(", ")}))];

  const maqOpts=(MAQUINAS[etapa]||[]).map(m=>({v:m,l:m}));
  const empOpts=[{v:"",l:"— Seleccionar —"},...NOMBRES_EMPLEADOS.map(n=>({v:n,l:n}))];
  const prodOpts=[{v:"",l:"— Producto —"},...[...new Set((ordenes||[]).flatMap(o=>(o.items||[]).map(it=>it.producto)).filter(Boolean))].map(p=>({v:p,l:p})),{v:"Otro",l:"Otro"}];

  const reset=()=>{setLbsIn("");setLbsOut("");setRollos("");setTamano("9.5");setRollosUsados("");setBolsas("");setProducto("");setDesp("");setEmp("");setMaq((MAQUINAS[etapa]||[""])[0]);setTurno("☀️ Turno Día");setNotas("");setFecha(activeFecha);setPeletEntrada("");setPeletSalida("");setPeletDesp("");setOrdenId("");setLoteId("");};

  const handleSave=()=>{
    if(readOnly)return;
    const data={fecha,empleado:emp,maquina:maq,turno,notas,desperdicio:Number(desp)||0,ordenId:ordenId||null,loteId:loteId||null};
    if(isExt){
      data.pelicula=Number(lbsOut)||0;data.lbs_out=Number(lbsOut)||0;
      data.rollosProducidos=Number(rollos)||0;data.tamanoRollo=tamano;
      if(!data.pelicula)return;
    }else if(isCort){
      data.bolsasProducidas=Number(bolsas)||0;data.producto=producto;
      if(!data.bolsasProducidas)return;
    }else if(isPelet){
      data.peletEntrada=Number(peletEntrada)||0;data.peletSalida=Number(peletSalida)||0;data.peletDesperdicio=Number(peletDesp)||0;
      if(!data.peletSalida)return;
    }else{
      data.lbs_out=Number(lbsOut)||0;data.producto=producto;
      if(!data.lbs_out)return;
    }
    onSave(etapa,data);reset();setShowForm(false);
  };

  // Totals
  const totalLbs=entries.reduce((s,r)=>s+(Number(r.pelicula)||Number(r.lbs_out)||0),0);
  const totalRollos=entries.reduce((s,r)=>s+(Number(r.rollosProducidos)||0),0);
  const totalBolsas=entries.reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const totalPeletSalida=entries.reduce((s,r)=>s+(Number(r.peletSalida)||0),0);

  return(<Card accent={col+"44"} ch={<div>
    {/* Header */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showForm||hasEntries?12:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:40,height:40,borderRadius:12,background:col+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{icon}</div>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontWeight:800,fontSize:15,color:B.textDark}}>{label}</span>{hasEntries&&<Badge label={entries.length+" reg"} color={col}/>}</div>
          {hasEntries&&<div style={{fontSize:12,color:B.textLight,marginTop:2}}>
            {isExt&&<span>Total: <span style={{fontWeight:800,color:col}}>{totalLbs.toLocaleString()} lbs · {totalRollos} rollos</span></span>}
            {isCort&&<span>Total: <span style={{fontWeight:800,color:col}}>{totalBolsas.toLocaleString()} fundas</span></span>}
            {isPelet&&<span>Total: <span style={{fontWeight:800,color:col}}>{totalPeletSalida.toLocaleString()} lbs pellets</span></span>}
            {!isExt&&!isCort&&!isPelet&&<span>Total: <span style={{fontWeight:800,color:col}}>{totalLbs.toLocaleString()} lbs</span></span>}
          </div>}
        </div>
      </div>
      <Btn ch={showForm?"✕ Cerrar":"+ Registrar"} fn={()=>{if(!readOnly)setShowForm(!showForm);}} color={showForm?B.textMid:(readOnly?B.textLight:col)} small/>
    </div>

    {/* Today's entries — always visible so users can confirm what was logged today */}
    {entriesDia.length>0&&<div style={{fontSize:11,fontWeight:700,color:B.textLight,letterSpacing:.5,textTransform:"uppercase",margin:"4px 0 6px"}}>Registros de hoy ({entriesDia.length})</div>}
    {entriesDia.length>0&&entriesDia.slice(0,10).map(e=>(<div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:B.bg,borderRadius:10,marginBottom:6}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {isExt&&<span style={{fontSize:13,fontWeight:700,color:B.textDark}}>{(Number(e.pelicula)||Number(e.lbs_out)||0).toLocaleString()} lbs · {e.rollosProducidos||0} rollos ({e.tamanoRollo||"—"}")</span>}
          {isCort&&<span style={{fontSize:13,fontWeight:700,color:B.textDark}}>{e.bolsasProducidas||0} fundas</span>}
          {isPelet&&<span style={{fontSize:13,fontWeight:700,color:B.textDark}}>{(Number(e.peletEntrada)||0).toLocaleString()} lbs → {(Number(e.peletSalida)||0).toLocaleString()} lbs pellets</span>}
          {!isExt&&!isCort&&!isPelet&&<span style={{fontSize:13,fontWeight:700,color:B.textDark}}>{(Number(e.lbs_out)||0).toLocaleString()} lbs</span>}
          {e.desperdicio>0&&<span style={{fontSize:11,color:B.red,fontWeight:600}}>-{e.desperdicio} desp.</span>}
          {e.turno&&<TurnoBadge turno={e.turno}/>}
        </div>
        <div style={{fontSize:11,color:B.textLight,marginTop:2}}>{e.fecha} · {e.empleado||""} · {e.maquina||""}{e.producto?" · "+e.producto:""}</div>
      </div>
      {isSartori(sup)&&<button onClick={()=>{if(confirmDelete(sup,"¿Eliminar este registro?")){dbLogAudit("delete","registros",e.id,sup.nombre);onDelete(e.id);}}} style={{background:"none",border:"none",color:B.red+"88",fontSize:14,cursor:"pointer",padding:"4px",flexShrink:0}}>✕</button>}
    </div>))}

    {/* Form */}
    {showForm&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <F label="Fecha" value={fecha} onChange={setFecha} type="date"/>
      {(isExt||isImp)&&loteOpts.length>1&&<S label="Lote (opcional)" value={loteId} onChange={setLoteId} options={loteOpts}/>}
      {isExt&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <F label="Salida (lbs)" value={lbsOut} onChange={setLbsOut} type="number" placeholder="0"/>
        <F label="Rollos producidos" value={rollos} onChange={setRollos} type="number" placeholder="0"/>
      </div>}
      {isExt&&<S label="Tamaño del rollo" value={tamano} onChange={setTamano} options={[{v:"9.5",l:"9.5 pulgadas"},{v:"13",l:"13 pulgadas"},{v:"tubo",l:"Tubo"},{v:"embalaje",l:"Embalaje"}]}/>}
      {!isExt&&!isCort&&!isPelet&&<F label="Salida (lbs)" value={lbsOut} onChange={setLbsOut} type="number" placeholder="0"/>}
      {isCort&&<F label="Fundas producidas" value={bolsas} onChange={setBolsas} type="number" placeholder="0"/>}
      {isPelet&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <F label="Material entrada (lbs)" value={peletEntrada} onChange={setPeletEntrada} type="number" placeholder="0"/>
        <F label="Pellets producidos (lbs)" value={peletSalida} onChange={setPeletSalida} type="number" placeholder="0"/>
      </div>}
      {isPelet&&<F label="Desperdicio peletizadora (lbs)" value={peletDesp} onChange={setPeletDesp} type="number" placeholder="0"/>}
      {isPelet&&<div style={{background:"#0D948812",borderRadius:8,padding:"9px 12px",fontSize:12,color:"#0D9488",fontWeight:600}}>Los pellets producidos se agregan a materia prima como material peletizado</div>}
      {!isExt&&!isPelet&&<S label="Producto" value={producto} onChange={setProducto} options={prodOpts}/>}
      <F label="Desperdicio (lbs)" value={desp} onChange={setDesp} type="number" placeholder="0"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <S label="Máquina" value={maq} onChange={setMaq} options={maqOpts}/>
        <S label="Empleado" value={emp} onChange={setEmp} options={empOpts}/>
      </div>
      {ordenesDisp.length>0&&<S label="Orden (opcional)" value={ordenId} onChange={setOrdenId} options={ordenOpts}/>}
      <div>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:6}}>Turno</div>
        <div style={{display:"flex",gap:8}}>
          {["☀️ Turno Día","🌙 Turno Noche"].map(t=>(<button key={t} onClick={()=>setTurno(t)} style={{flex:1,padding:"10px",borderRadius:10,border:turno===t?"2px solid "+col:"1.5px solid "+B.border,background:turno===t?col+"12":"#fff",color:B.textDark,fontSize:13,fontWeight:700,cursor:"pointer"}}>{t}</button>))}
        </div>
      </div>
      <F label="Notas (opcional)" value={notas} onChange={setNotas} placeholder="..."/>
      <Btn ch={readOnly?"🔒 Solo lectura":"✓ Guardar "+label} fn={handleSave} color={readOnly?B.textLight:col} full/>
    </div>}
  </div>}/>);
}

// ── Panel de Producción (Operadores) ─────────────────────────────────────────
function PanelProduccion({regs,setRegs,ordenes,sup,setVista}){
  const [seccion,setSeccion]=useState("inicio");
  const [qf,setQf]=useState({maquina:"EXT-1",producto:"Tubo PVC 1\" SDR-26 x 6m",material:"resina_pvc",libras:"",desperdicio:"",notas:""});
  const [incForm,setIncForm]=useState({maquina:"EXT-1",tipo:"averia",descripcion:""});
  const [qfSaved,setQfSaved]=useState(false);
  const [incSaved,setIncSaved]=useState(false);

  const hoy=new Date().toISOString().split("T")[0];
  const regsHoy=regs.filter(r=>r.fecha===hoy);

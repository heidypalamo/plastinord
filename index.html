  const ordenesComp=(ordenes||[]).filter(o=>o.etapa==="listo"&&o.fechaEnvio&&o.fechaEnvio.startsWith(hoy)).length;
  const maqActivas=["EXT-1","EXT-2","EXT-3","EXT-4","EXT-5"];
  const maqData=[
    {id:"EXT-1",nombre:"Extrusora #1",estado:"activa",operador:"Jose Amaury"},
    {id:"EXT-2",nombre:"Extrusora #2",estado:"pausa",operador:"Luis García"},
    {id:"EXT-3",nombre:"Extrusora #3",estado:"activa",operador:"Esequiel Delgado"},
    {id:"EXT-4",nombre:"Extrusora #4",estado:"inactiva",operador:"—"},
    {id:"EXT-5",nombre:"Extrusora #5",estado:"activa",operador:"Reynaldo Polanco"},
  ];
  const activas=maqData.filter(m=>m.estado==="activa").length;
  const detenidas=maqData.filter(m=>m.estado!=="activa").length;
  const historial=regsHoy.slice(0,8);

  const gs={
    page:{minHeight:"100vh",background:B.bg},
    glass:{background:"#fff",border:"1.5px solid "+B.border,borderRadius:18,padding:"18px",boxShadow:"0 2px 12px rgba(0,0,0,.06)"},
    glassLight:{background:B.bg,border:"1.5px solid "+B.border,borderRadius:14,padding:"14px"},
    title:{color:B.textDark,fontSize:22,fontWeight:800,margin:0,lineHeight:1.2},
    subtitle:{color:B.textLight,fontSize:13,margin:"4px 0 0",letterSpacing:.5},
    label:{color:B.teal,fontSize:11,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:6},
    statVal:{color:B.textDark,fontSize:28,fontWeight:800,lineHeight:1},
    statUnit:{color:B.textLight,fontSize:12,fontWeight:600,marginLeft:4},
    statLabel:{color:B.textMid,fontSize:11,fontWeight:600,marginTop:4},
    input:{background:B.bg,border:"1.5px solid "+B.border,borderRadius:12,padding:"14px 16px",color:B.textDark,fontSize:16,outline:"none",width:"100%",boxSizing:"border-box",WebkitAppearance:"none"},
    select:{background:B.bg,border:"1.5px solid "+B.border,borderRadius:12,padding:"14px 16px",color:B.textDark,fontSize:16,outline:"none",width:"100%",boxSizing:"border-box",WebkitAppearance:"none"},
    btnPrimary:{background:"linear-gradient(135deg,"+B.teal+","+B.tealDark+")",border:"none",borderRadius:14,padding:"16px 24px",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",boxShadow:"0 4px 20px rgba(91,173,168,.35)"},
    btnAction:{background:"#fff",border:"1.5px solid "+B.border,borderRadius:16,padding:"20px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",transition:"all .2s"},
  };

  const saveQuickProd=()=>{
    if(!qf.libras)return;
    const rec={id:Date.now(),fecha:hoy,etapa:"extrusion",maquina:qf.maquina,producto:qf.producto,pelicula:qf.libras,desperdicio:qf.desperdicio||"0",notas:qf.notas,supervisorCodigo:sup.codigo,supervisorNombre:sup.nombre,empleado:sup.nombre,turno:"☀️ Turno Día"};
    setRegs(p=>[rec,...p]);
    qSave(rec);
    setQf(f=>({...f,libras:"",desperdicio:"",notas:""}));
    setQfSaved(true);
    setTimeout(()=>setQfSaved(false),2500);
  };

  const saveIncident=()=>{
    if(!incForm.descripcion)return;
    const rec={id:Date.now(),fecha:hoy,etapa:"extrusion",maquina:incForm.maquina,notas:"⚠️ INCIDENTE ["+incForm.tipo+"]: "+incForm.descripcion,supervisorCodigo:sup.codigo,supervisorNombre:sup.nombre,empleado:sup.nombre,turno:"☀️ Turno Día",pelicula:"0"};
    setRegs(p=>[rec,...p]);
    qSave(rec);
    setIncForm({maquina:"EXT-1",tipo:"averia",descripcion:""});
    setIncSaved(true);
    setTimeout(()=>setIncSaved(false),2500);
  };

  if(seccion==="inicio")return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Title */}
      <div>
        <h2 style={gs.title}>Panel de Producción</h2>
        <p style={gs.subtitle}>Registro y control de producción diaria</p>
      </div>

      {/* Action Buttons */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[
          {icon:"📝",label:"Registrar Producción",action:()=>setSeccion("quickProd"),color:B.teal},
          {icon:"📋",label:"Ver Órdenes de Producción",action:()=>setVista("almacen"),color:B.navy},
          {icon:"🔧",label:"Reportar Problema de Máquina",action:()=>setSeccion("incidente"),color:B.amber},
          {icon:"⏸️",label:"Registrar Parada de Máquina",action:()=>setSeccion("incidente"),color:B.red},
        ].map((b,i)=>(
          <div key={i} onClick={b.action} style={{...gs.glass,padding:"22px 16px",textAlign:"center",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
            <div style={{width:52,height:52,borderRadius:14,background:b.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{b.icon}</div>
            <div style={{color:B.textDark,fontSize:13,fontWeight:700,lineHeight:1.3}}>{b.label}</div>
          </div>
        ))}
      </div>

      {/* Today's Summary */}
      <div>
        <div style={gs.label}>Resumen de Hoy</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={gs.glassLight}>
            <div style={gs.statVal}>{lbsHoy.toFixed(0)}<span style={gs.statUnit}>lbs</span></div>
            <div style={gs.statLabel}>Libras producidas hoy</div>
          </div>
          <div style={gs.glassLight}>
            <div style={gs.statVal}>{ordenesComp}<span style={gs.statUnit}>uds</span></div>
            <div style={gs.statLabel}>Órdenes completadas hoy</div>
          </div>
          <div style={gs.glassLight}>
            <div style={{...gs.statVal,color:B.green}}>{activas}</div>
            <div style={gs.statLabel}>Máquinas activas</div>
          </div>
          <div style={gs.glassLight}>
            <div style={{...gs.statVal,color:B.amber}}>{detenidas}</div>
            <div style={gs.statLabel}>Máquinas detenidas</div>
          </div>
        </div>
      </div>

      {/* Active Machines */}
      <div>
        <div style={gs.label}>Máquinas</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {maqData.map(m=>{
            const sc=m.estado==="activa"?B.green:m.estado==="pausa"?B.amber:B.red;
            const sl=m.estado==="activa"?"Activa":m.estado==="pausa"?"En pausa":"Inactiva";
            return(
              <div key={m.id} style={gs.glass}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{color:B.textDark,fontSize:15,fontWeight:700}}>{m.nombre}</div>
                  <span style={{background:sc+"22",color:sc,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:800}}>{sl}</span>
                </div>
                <div style={{color:B.textMid,fontSize:13,marginBottom:12}}>Operador: {m.operador}</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setQf(f=>({...f,maquina:m.id}));setSeccion("quickProd");}} style={{flex:1,background:B.teal+"22",border:"1px solid "+B.teal+"44",borderRadius:10,padding:"10px",color:B.tealLight,fontSize:12,fontWeight:700,cursor:"pointer"}}>📝 Producción</button>
                  <button onClick={()=>{setIncForm(f=>({...f,maquina:m.id}));setSeccion("incidente");}} style={{flex:1,background:B.amber+"22",border:"1px solid "+B.amber+"44",borderRadius:10,padding:"10px",color:B.amber,fontSize:12,fontWeight:700,cursor:"pointer"}}>🔧 Problema</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Production History */}
      {historial.length>0&&<div>
        <div style={gs.label}>Últimos Registros</div>
        <div style={gs.glass}>
          {historial.map((r,i)=>{
            const hora=r.id?new Date(r.id).toLocaleTimeString("es-DO",{hour:"2-digit",minute:"2-digit"}):"--:--";
            return(
              <div key={r.id||i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<historial.length-1?"1px solid "+B.border:"none"}}>
                <div style={{color:B.teal,fontSize:13,fontWeight:700,minWidth:60}}>{hora}</div>
                <div style={{flex:1}}>
                  <div style={{color:B.textDark,fontSize:13,fontWeight:600}}>{r.maquina} · {r.producto||"—"}</div>
                </div>
                <div style={{color:B.teal,fontSize:14,fontWeight:800}}>{Number(r.pelicula||r.bolsasProducidas||0).toLocaleString()} lb</div>
              </div>
            );
          })}
        </div>
      </div>}
    </div>
  );

  if(seccion==="quickProd")return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setSeccion("inicio")} style={{background:B.bg,border:"1.5px solid "+B.border,borderRadius:10,padding:"8px 14px",color:B.textDark,fontSize:14,fontWeight:700,cursor:"pointer"}}>← Atrás</button>
        <h2 style={{...gs.title,fontSize:20}}>Registro Rápido</h2>
      </div>
      {qfSaved&&<div style={{background:B.green+"22",border:"1px solid "+B.green+"44",borderRadius:12,padding:"14px",textAlign:"center",color:B.green,fontWeight:700,fontSize:14}}>✅ Producción guardada exitosamente</div>}
      <div style={gs.glass}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div>
            <div style={gs.label}>Máquina</div>
            <select value={qf.maquina} onChange={e=>setQf(f=>({...f,maquina:e.target.value}))} style={gs.select}>
              {MAQUINAS.extrusion.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <div style={gs.label}>Producto</div>
            <select value={qf.producto} onChange={e=>setQf(f=>({...f,producto:e.target.value}))} style={gs.select}>
              {productosDeOrdenes(ordenes).map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <div style={gs.label}>Material</div>
            <select value={qf.material} onChange={e=>setQf(f=>({...f,material:e.target.value}))} style={gs.select}>
              <option value="LDPE">Resina LDPE</option>
              <option value="MLLDPE">Resina MLLDPE</option>
              <option value="Mezcla">Mezcla LDPE + MLLDPE</option>
            </select>
          </div>
          <div>
            <div style={gs.label}>Libras Producidas</div>
            <input type="number" inputMode="numeric" value={qf.libras} onChange={e=>setQf(f=>({...f,libras:e.target.value}))} placeholder="Ej: 320" style={gs.input}/>
          </div>
          <div>
            <div style={gs.label}>Desperdicio (opcional)</div>
            <input type="number" inputMode="numeric" value={qf.desperdicio} onChange={e=>setQf(f=>({...f,desperdicio:e.target.value}))} placeholder="Ej: 15" style={gs.input}/>
          </div>
          <div>
            <div style={gs.label}>Notas (opcional)</div>
            <textarea value={qf.notas} onChange={e=>setQf(f=>({...f,notas:e.target.value}))} placeholder="Observaciones..." rows={3} style={{...gs.input,resize:"vertical"}}/>
          </div>
          <button onClick={saveQuickProd} style={gs.btnPrimary}>Guardar Producción</button>
        </div>
      </div>
    </div>
  );

  if(seccion==="incidente")return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setSeccion("inicio")} style={{background:B.bg,border:"1.5px solid "+B.border,borderRadius:10,padding:"8px 14px",color:B.textDark,fontSize:14,fontWeight:700,cursor:"pointer"}}>← Atrás</button>
        <h2 style={{...gs.title,fontSize:20}}>Reportar Incidente</h2>
      </div>
      {incSaved&&<div style={{background:B.green+"22",border:"1px solid "+B.green+"44",borderRadius:12,padding:"14px",textAlign:"center",color:B.green,fontWeight:700,fontSize:14}}>✅ Incidente reportado exitosamente</div>}
      <div style={gs.glass}>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div>
            <div style={gs.label}>Máquina</div>
            <select value={incForm.maquina} onChange={e=>setIncForm(f=>({...f,maquina:e.target.value}))} style={gs.select}>
              {MAQUINAS.mezcla.map(m=><option key={m} value={m}>{m}</option>)}
              {MAQUINAS.extrusion.map(m=><option key={m} value={m}>{m}</option>)}
              {MAQUINAS.calibracion.map(m=><option key={m} value={m}>{m}</option>)}
              {MAQUINAS.corte.map(m=><option key={m} value={m}>{m}</option>)}
              {MAQUINAS.empaque.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <div style={gs.label}>Tipo de Problema</div>
            <select value={incForm.tipo} onChange={e=>setIncForm(f=>({...f,tipo:e.target.value}))} style={gs.select}>
              <option value="averia">🔧 Avería de Máquina</option>
              <option value="material">📦 Falta de Material</option>
              <option value="calidad">⚠️ Problema de Calidad</option>
              <option value="mantenimiento">🛠️ Mantenimiento Necesario</option>
            </select>
          </div>
          <div>
            <div style={gs.label}>Descripción</div>
            <textarea value={incForm.descripcion} onChange={e=>setIncForm(f=>({...f,descripcion:e.target.value}))} placeholder="Describa el problema..." rows={4} style={{...gs.input,resize:"vertical"}}/>
          </div>
          <button onClick={saveIncident} style={{...gs.btnPrimary,background:"linear-gradient(135deg,"+B.amber+","+B.red+")"}}>Reportar Incidente</button>
        </div>
      </div>
    </div>
  );

  return null;
}

function Dashboard({regs,mat,ordenes,resinaLogs,setVista,productoLogs}){
  // ── All-time totals ──
  const tP=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||0),0);
  const tD=regs.reduce((s,r)=>s+(Number(r.desperdicio)||0)+(Number(r.desperdicioImpresion)||0)+(Number(r.desperdicioSlitter)||0)+(Number(r.desperdicioCorte)||0),0);
  const tPT=(()=>{const m={};(productoLogs||[]).forEach(l=>{if(!m[l.producto])m[l.producto]={lbsIn:0,lbsOut:0};if(l.unidad==="lbs"){if(l.tipo==="entrada")m[l.producto].lbsIn+=l.cantidad;else if(l.tipo==="salida")m[l.producto].lbsOut+=l.cantidad;}});(regs||[]).forEach(r=>{if(r.producto&&r.etapa==="slitter"&&r.lbsSlitter){if(!m[r.producto])m[r.producto]={lbsIn:0,lbsOut:0};m[r.producto].lbsIn+=Number(r.lbsSlitter)||0;}});return Object.values(m).reduce((s,p)=>s+Math.max(0,p.lbsIn-p.lbsOut),0);})();
  const tRollos=regs.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.rollosProducidos)||0),0);
  const tRollos95=regs.filter(r=>r.etapa==="extrusion"&&r.tamanoRollo==="9.5").reduce((s,r)=>s+(Number(r.rollosProducidos)||0),0);
  const tRollos13=regs.filter(r=>r.etapa==="extrusion"&&r.tamanoRollo==="13").reduce((s,r)=>s+(Number(r.rollosProducidos)||0),0);
  const yld=tP>0?((tP/(tP+tD))*100).toFixed(1):null;

  // ── Today ──
  const hoy=new Date().toISOString().split("T")[0];
  const regsHoy=regs.filter(r=>r.fecha===hoy);
  const lbsHoyExt=regsHoy.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||Number(r.lbs_out)||0),0);
  const rollosHoy=regsHoy.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.rollosProducidos)||0),0);
  const fundasHoy=regsHoy.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const despHoy=regsHoy.reduce((s,r)=>s+(Number(r.desperdicio)||0)+(Number(r.desperdicioImpresion)||0)+(Number(r.desperdicioSlitter)||0)+(Number(r.desperdicioCorte)||0),0);
  const wastePct=lbsHoyExt>0?((despHoy/lbsHoyExt)*100).toFixed(1):0;

  // ── Yesterday (for comparison) ──
  const ayerDate=new Date();ayerDate.setDate(ayerDate.getDate()-1);
  const ayer=ayerDate.toISOString().split("T")[0];
  const regsAyer=regs.filter(r=>r.fecha===ayer);
  const lbsAyer=regsAyer.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||Number(r.lbs_out)||0),0);
  const rollosAyer=regsAyer.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.rollosProducidos)||0),0);
  const fundasAyer=regsAyer.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const despAyer=regsAyer.reduce((s,r)=>s+(Number(r.desperdicio)||0)+(Number(r.desperdicioImpresion)||0)+(Number(r.desperdicioSlitter)||0)+(Number(r.desperdicioCorte)||0),0);
  const wastePctAyer=lbsAyer>0?((despAyer/lbsAyer)*100).toFixed(1):0;

  // ── Pipeline: lbs per stage today ──
  const pipelineStages=[
    {id:"mezcla",label:"Mezcla",icon:"🧪",color:"#7C3AED",value:(resinaLogs||[]).filter(b=>b.fecha===hoy).reduce((s,b)=>s+(Number(b.total)||0),0),unit:"lbs"},
    {id:"extrusion",label:"Extrusión",icon:"⚙️",color:B.teal,value:lbsHoyExt,unit:"lbs"},
    {id:"impresion",label:"Impresión",icon:"🖨️",color:B.navy,value:regsHoy.filter(r=>r.etapa==="impresion").reduce((s,r)=>s+(Number(r.lbs_out)||0),0),unit:"lbs"},
    {id:"slitter",label:"Slitter",icon:"✂️",color:B.tealDark,value:regsHoy.filter(r=>r.etapa==="slitter").reduce((s,r)=>s+(Number(r.lbs_out)||Number(r.lbsSlitter)||0),0),unit:"lbs"},
    {id:"cortadora",label:"Cortadora",icon:"🛠️",color:"#4E7C59",value:fundasHoy,unit:"fundas"}
  ];
  const pipelineMax=Math.max(...pipelineStages.map(s=>s.value),1);

  // ── Waste by stage today ──
  const wasteStages=[
    {label:"Extrusión",value:regsHoy.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.desperdicio)||0),0)},
    {label:"Impresión",value:regsHoy.filter(r=>r.etapa==="impresion").reduce((s,r)=>s+(Number(r.desperdicioImpresion)||Number(r.desperdicio)||0),0)},
    {label:"Slitter",value:regsHoy.filter(r=>r.etapa==="slitter").reduce((s,r)=>s+(Number(r.desperdicioSlitter)||Number(r.desperdicio)||0),0)},
    {label:"Cortadora",value:regsHoy.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.desperdicioCorte)||Number(r.desperdicio)||0),0)}
  ];
  const wasteMax=Math.max(...wasteStages.map(s=>s.value),1);

  // ── This week ──
  const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
  const regsWeek=regs.filter(r=>new Date(r.fecha)>=weekAgo);
  const lbsWeek=regsWeek.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||Number(r.lbs_out)||0),0);
  const rollosWeek=regsWeek.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.rollosProducidos)||0),0);
  const fundasWeek=regsWeek.filter(r=>r.etapa==="cortadora").reduce((s,r)=>s+(Number(r.bolsasProducidas)||0),0);
  const despWeek=regsWeek.reduce((s,r)=>s+(Number(r.desperdicio)||0)+(Number(r.desperdicioImpresion)||0)+(Number(r.desperdicioSlitter)||0)+(Number(r.desperdicioCorte)||0),0);
  const lbsWeekExt=regsWeek.filter(r=>r.etapa==="extrusion").reduce((s,r)=>s+(Number(r.pelicula)||Number(r.lbs_out)||0),0);
  const wastePctWeek=lbsWeekExt>0?((despWeek/lbsWeekExt)*100).toFixed(1):0;
  const mezclasWeek=(resinaLogs||[]).filter(b=>new Date(b.fecha)>=weekAgo).length;

  // ── Orders ──
  const ordenesActivas=(ordenes||[]).filter(o=>o.etapa!=="listo"&&o.etapa!=="enviado").length;
  const ordenesListas=(ordenes||[]).filter(o=>o.etapa==="listo").length;
  const ordenesActivasList=(ordenes||[]).filter(o=>o.etapa!=="listo"&&o.etapa!=="enviado");

  // ── Machines active today ──
  const maqHoy=React.useMemo(()=>{
    const m={};
    regsHoy.forEach(r=>{
      if(!r.maquina)return;
      const key=r.maquina;
      if(!m[key])m[key]={maquina:key,etapa:r.etapa,empleados:new Set(),lbs:0,fundas:0,registros:0};
      if(r.empleado)m[key].empleados.add(r.empleado);
      m[key].lbs+=Number(r.pelicula)||Number(r.lbs_out)||0;
      m[key].fundas+=Number(r.bolsasProducidas)||0;
      m[key].registros++;
    });
    return Object.values(m).sort((a,b)=>b.lbs-a.lbs||b.fundas-a.fundas);
  },[regsHoy]);

  // ── Stock alerts ──
  const lowStockItems=(mat||[]).filter(m=>m.stockActual<=m.stockMinimo);
  const fechaHoy=new Date().toLocaleDateString("es-DO",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  const wColor=(pct)=>Number(pct)>5?B.red:Number(pct)>3?B.amber:B.green;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    {/* Header */}
    <div style={{borderRadius:16,overflow:"hidden",background:"linear-gradient(135deg,"+B.navyDeep+","+B.tealDark+")",padding:"20px 20px 16px",display:"flex",alignItems:"center",gap:16}}>
      <img src={LOGO_IMG} alt="Plastinord Hub" style={{width:56,height:56,objectFit:"contain",borderRadius:12,background:"rgba(255,255,255,.15)",padding:6}}/>
      <div>
        <h2 style={{color:"#fff",fontSize:22,fontWeight:800,margin:"0 0 2px"}}>Plastinord Hub</h2>
        <p style={{color:"rgba(255,255,255,.7)",fontSize:13,margin:0,textTransform:"capitalize"}}>{fechaHoy}</p>
      </div>
    </div>

    {/* Stock Alert */}
    {lowStockItems.length>0&&<div style={{background:B.red+"12",border:"1.5px solid "+B.red+"44",borderRadius:12,padding:"12px 16px",display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>setVista("materiaprima")}><span style={{fontSize:20}}>🚨</span><div style={{flex:1}}><div style={{color:B.red,fontWeight:700,fontSize:14}}>Stock Bajo ({lowStockItems.length})</div><div style={{color:B.textMid,fontSize:13}}>{lowStockItems.map(a=>a.nombre).join(", ")}</div></div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>}

    {/* Producción Hoy — with yesterday comparison */}
    <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:-8}}>Producción Hoy</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Lbs Extruidas" value={lbsHoyExt.toLocaleString()} unit="lbs" color={B.teal} sub={"Ayer: "+lbsAyer.toLocaleString()}/>
      <Stat label="Rollos" value={rollosHoy.toLocaleString()} unit="rollos" color={B.navy} sub={"Ayer: "+rollosAyer.toLocaleString()}/>
      <Stat label="Fundas" value={fundasHoy.toLocaleString()} unit="uds" color={B.tealDark} sub={"Ayer: "+fundasAyer.toLocaleString()}/>
      <Stat label="Desperdicio" value={wastePct+"%"} color={wColor(wastePct)} sub={"Ayer: "+wastePctAyer+"%"}/>
    </div>

    {/* Pipeline de Producción */}
    <Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>Pipeline de Producción — Hoy</div>
      {pipelineStages.map(stg=>(<div key={stg.id} style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>{stg.icon}</span>
            <span style={{fontSize:12,fontWeight:700,color:B.textDark}}>{stg.label}</span>
          </div>
          <span style={{fontSize:13,fontWeight:800,color:stg.color}}>{stg.value.toLocaleString()} {stg.unit}</span>
        </div>
        <div style={{height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}>
          <div style={{width:Math.max(stg.value>0?2:0,(stg.value/pipelineMax)*100)+"%",height:"100%",background:stg.color,borderRadius:4,transition:"width .3s"}}/>
        </div>
      </div>))}
    </div>}/>

    {/* Desperdicio por Etapa */}
    {despHoy>0&&<Card accent={wColor(wastePct)} ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Desperdicio Hoy</div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{color:wColor(wastePct),fontWeight:800,fontSize:18}}>{wastePct}%</span>
          <span style={{color:B.textLight,fontSize:11}}>({despHoy.toLocaleString()} lbs)</span>
        </div>
      </div>
      {wasteStages.filter(s=>s.value>0).map(stg=>(<div key={stg.label} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
        <span style={{fontSize:12,color:B.textMid,width:70,flexShrink:0}}>{stg.label}</span>
        <div style={{flex:1,height:6,background:B.bg,borderRadius:3,overflow:"hidden"}}>
          <div style={{width:(stg.value/wasteMax)*100+"%",height:"100%",background:B.red,borderRadius:3}}/>
        </div>
        <span style={{fontSize:12,fontWeight:700,color:B.red,width:55,textAlign:"right",flexShrink:0}}>{stg.value.toLocaleString()} lbs</span>
      </div>))}
    </div>}/>}

    {/* Esta Semana — Enhanced */}
    <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:-8}}>Esta Semana</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Lbs Semana" value={lbsWeek.toLocaleString()} unit="lbs" color={B.teal}/>
      <Stat label="Rollos Semana" value={rollosWeek.toLocaleString()} unit="rollos" color={B.navy}/>
      <Stat label="Fundas Semana" value={fundasWeek.toLocaleString()} unit="uds" color={B.tealDark}/>
      <Stat label="Desperdicio" value={wastePctWeek+"%"} color={wColor(wastePctWeek)} sub={mezclasWeek+" mezclas"}/>
    </div>

    {/* Órdenes */}
    <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:-8}}>Órdenes</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Activas" value={ordenesActivas} color={B.navy} sub="En proceso"/>
      <Stat label="Listas" value={ordenesListas} color={B.green} sub="Para envío"/>
    </div>

    {ordenesActivasList.length>0&&<div style={{background:B.teal+"10",border:"1.5px solid "+B.teal+"44",borderRadius:12,padding:"12px 16px",cursor:"pointer"}} onClick={()=>setVista("almacen")}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{color:B.teal,fontWeight:700,fontSize:14}}>Órdenes Activas ({ordenesActivasList.length})</div><span style={{color:B.teal,fontSize:13,fontWeight:700}}>Ver →</span></div>
      {ordenesActivasList.slice(0,3).map(o=>(<div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}><span style={{color:B.textDark,fontSize:13,fontWeight:600}}>{o.cliente}</span><Badge label={ETIQ_ORDEN[o.etapa]} color={COLOR_ORDEN[o.etapa]}/></div>))}
    </div>}

    {/* Almacén */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Stat label="Prod. Term." value={tPT.toLocaleString()} unit="lbs" color={B.green} sub="En Almacén"/>
      <Stat label="Rollos Disp." value={tRollos.toLocaleString()} unit="rollos" color={B.navy} sub={"9.5\": "+tRollos95+" · 13\": "+tRollos13}/>
    </div>

    {/* Eficiencia */}
    {yld&&<Card accent={B.green} ch={<div><div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Eficiencia de Extrusión</div><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:10,background:B.bg,borderRadius:5,overflow:"hidden"}}><div style={{width:yld+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.green+")",borderRadius:5}}/></div><span style={{color:B.green,fontWeight:800,fontSize:20}}>{yld}%</span></div></div>}/>}

    {/* Máquinas Activas Hoy */}
    {maqHoy.length>0&&<Card ch={<div>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Máquinas Activas Hoy ({maqHoy.length})</div>
      {maqHoy.map(m=>(<div key={m.maquina} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid "+B.border}}>
        <div style={{width:36,height:36,borderRadius:10,background:B.teal+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:B.teal,flexShrink:0}}>{m.maquina.split("-")[0]}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:B.textDark,fontSize:13,fontWeight:700}}>{m.maquina}</div>
          <div style={{color:B.textLight,fontSize:11}}>{[...m.empleados].join(", ")||"—"} · {m.registros} registro{m.registros!==1?"s":""}</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          {m.lbs>0&&<div style={{color:B.teal,fontWeight:800,fontSize:14}}>{m.lbs.toLocaleString()} lbs</div>}
          {m.fundas>0&&<div style={{color:B.tealDark,fontWeight:800,fontSize:14}}>{m.fundas.toLocaleString()} uds</div>}
        </div>
      </div>))}
    </div>}/>}

    {/* Accesos Rápidos */}
    <div style={{color:B.textLight,fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:-8}}>Accesos Rápidos</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
      <button onClick={()=>setVista("registro")} style={{background:B.teal,color:"#fff",border:"none",borderRadius:12,padding:"14px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Registrar</button>
      <button onClick={()=>setVista("almacen")} style={{background:B.navy,color:"#fff",border:"none",borderRadius:12,padding:"14px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Órdenes</button>
      <button onClick={()=>setVista("almacen")} style={{background:B.green,color:"#fff",border:"none",borderRadius:12,padding:"14px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Almacén</button>
    </div>

    {/* Inventario */}
    <Card ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.8,textTransform:"uppercase"}}>Inventario</div>
        <button onClick={()=>setVista("materiaprima")} style={{background:"none",border:"1px solid "+B.border,color:B.teal,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>Ver →</button>
      </div>
      {mat.map(m=>{const bj=m.stockActual<=m.stockMinimo,cr=m.stockActual<=m.stockMinimo*.5,bc=cr?B.red:bj?B.amber:B.green;return(<div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+B.border}}><span style={{color:B.textDark,fontSize:14,fontWeight:600}}>{m.nombre}</span><div style={{display:"flex",alignItems:"center",gap:8}}>{(bj||cr)&&<span>{cr?"🚨":"⚠️"}</span>}<span style={{color:bc,fontWeight:800,fontSize:15}}>{m.stockActual.toLocaleString()} {m.unidad}</span></div></div>);})}
    </div>}/>

    {regs.length===0&&<Card style={{textAlign:"center",padding:40,border:"1.5px dashed "+B.border}} ch={<div><div style={{fontSize:40,marginBottom:10}}>📋</div><div style={{color:B.textMid,fontSize:15,fontWeight:700}}>Sin registros aún</div><div style={{color:B.textLight,fontSize:13,marginTop:4}}>Toca <strong>Registrar</strong> para comenzar</div></div>}/>}
  </div>);
}

// ── Accounting: Gastos ────────────────────────────────────────────────────────
function GastosModule({gastos,setGastos,sup}){
  const [modo,setModo]=useState(false);
  const [form,setForm]=useState({fecha:new Date().toISOString().split("T")[0],categoria:"materia_prima",monto:"",moneda:"HTG",descripcion:"",proveedor:""});
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  const save=async()=>{
    if(!form.monto)return;
    const g={id:String(Date.now()),fecha:form.fecha,categoria:form.categoria,monto:Number(form.monto),moneda:form.moneda,descripcion:form.descripcion,proveedor:form.proveedor,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setGastos(prev=>[g,...prev]);
    await dbSaveGasto(g);
    setForm({fecha:new Date().toISOString().split("T")[0],categoria:"materia_prima",monto:"",moneda:"HTG",descripcion:"",proveedor:""});
    setModo(false);
  };

  const del=async(id)=>{dbLogAudit("delete","gastos",id,sup.nombre);setGastos(prev=>prev.filter(g=>g.id!==id));await dbDeleteGasto(id);};

  const totByCat=useMemo(()=>{
    const m={};gastos.forEach(g=>{m[g.categoria]=(m[g.categoria]||0)+Number(g.monto);});return m;
  },[gastos]);
  const totalUSD=gastos.filter(g=>g.moneda==="US$").reduce((s,g)=>s+Number(g.monto),0);
  const totalHTG=gastos.filter(g=>(g.moneda||"HTG")==="HTG").reduce((s,g)=>s+Number(g.monto),0);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10}}>
      {totalHTG>0&&<Stat label="Gastos HTG" value={"HTG "+totalHTG.toLocaleString()} color={B.red}/>}
      {totalUSD>0&&<Stat label="Gastos US$" value={"US$ "+totalUSD.toLocaleString()} color={B.red}/>}
      <Stat label="Registros" value={gastos.length} color={B.navy}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      {CATEGORIAS_GASTO.map(c=>{
        const catHTG=gastos.filter(g=>g.categoria===c.v&&(g.moneda||"HTG")==="HTG").reduce((s,g)=>s+Number(g.monto),0);
        const catUSD=gastos.filter(g=>g.categoria===c.v&&g.moneda==="US$").reduce((s,g)=>s+Number(g.monto),0);
        return <div key={c.v} style={{background:"#fff",borderRadius:12,padding:"10px 12px",border:"1.5px solid "+B.border}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{c.l}</div>
          {catHTG>0&&<div style={{color:B.textDark,fontSize:16,fontWeight:800}}>HTG {catHTG.toLocaleString()}</div>}
          {catUSD>0&&<div style={{color:B.textDark,fontSize:14,fontWeight:700}}>US$ {catUSD.toLocaleString()}</div>}
          {!catHTG&&!catUSD&&<div style={{color:B.textLight,fontSize:14}}>—</div>}
        </div>;
      })}
    </div>
    {!modo&&<Btn ch="+ Nuevo Gasto" fn={()=>setModo(true)} full/>}
    {modo&&<Card ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{color:B.navy,fontSize:16,fontWeight:800}}>Nuevo Gasto</div>
      <F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/>
      <S label="Categoría" value={form.categoria} onChange={set("categoria")} options={CATEGORIAS_GASTO}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <F label={"Monto ("+form.moneda+")"} value={form.monto} onChange={set("monto")} type="number" placeholder="0.00"/>
        <S label="Moneda" value={form.moneda} onChange={set("moneda")} options={[{v:"HTG",l:"HTG (Gourdes)"},{v:"US$",l:"US$ (Dólares)"}]}/>
      </div>
      <F label="Descripción" value={form.descripcion} onChange={set("descripcion")} placeholder="Detalle del gasto"/>
      <F label="Proveedor" value={form.proveedor} onChange={set("proveedor")} placeholder="Nombre del proveedor"/>
      <div style={{display:"flex",gap:8}}>
        <Btn ch="Guardar" fn={save} full/><Btn ch="Cancelar" fn={()=>setModo(false)} outline small/>
      </div>
    </div>}/>}
    {gastos.map(g=><Card key={g.id} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
          <Badge label={(CATEGORIAS_GASTO.find(c=>c.v===g.categoria)||{l:g.categoria}).l} color={B.navy}/>
          <span style={{color:B.textLight,fontSize:12}}>{g.fecha}</span>
        </div>
        <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>{g.moneda||"HTG"} {Number(g.monto).toLocaleString()}</div>
        {g.descripcion&&<div style={{color:B.textMid,fontSize:13}}>{g.descripcion}</div>}
        {g.proveedor&&<div style={{color:B.textLight,fontSize:12}}>Proveedor: {g.proveedor}</div>}
      </div>
      {isSartori(sup)&&<Btn ch="✕" fn={()=>{if(confirmDelete(sup,"¿Seguro que desea eliminar este gasto?"))del(g.id);}} color={B.red} outline small/>}
    </div>}/>)}
  </div>);
}

// ── Accounting: Facturación ──────────────────────────────────────────────────
function Facturacion({facturas,setFacturas,productoLogs,setProductoLogs,ordenes,sup,pagos,setPagos,clientes,setClientes}){
  const [modo,setModo]=useState(false);
  const [exp,setExp]=useState(null);
  const [editId,setEditId]=useState(null);
  const [editItems,setEditItems]=useState([]);
  const [editNCF,setEditNCF]=useState("");
  const [editNumero,setEditNumero]=useState("");
  const [vista,setVista]=useState("todas"); // "todas" | "clientes"
  const [buscarFac,setBuscarFac]=useState("");
  const [expCliente,setExpCliente]=useState(null);
  const [editClienteId,setEditClienteId]=useState(null);
  const [clienteForm,setClienteForm]=useState({telefono:"",email:"",direccion:"",rnc:""});
  const vistaTabBtn=(id)=>({flex:1,background:vista===id?"#fff":"transparent",border:"none",borderRadius:10,padding:"10px 4px",color:vista===id?B.textDark:B.textLight,fontSize:12,fontWeight:700,cursor:"pointer",boxShadow:vista===id?"0 1px 4px rgba(0,0,0,.1)":"none"});
  const nextNum=()=>{const y=new Date().getFullYear();const ex=facturas.filter(f=>f.numero&&f.numero.startsWith("FAC-"+y));const mx=ex.reduce((max,f)=>{const n=parseInt((f.numero||"").split("-")[2])||0;return n>max?n:max;},0);return"FAC-"+y+"-"+String(mx+1).padStart(3,"0");};

  // Compute available stock from producto terminado
  const stockDisponible=React.useMemo(()=>{
    const m={};
    productoLogs.forEach(l=>{
      if(!m[l.producto])m[l.producto]={producto:l.producto,almacen:0,unidad:l.unidad||"uds"};
      if(l.tipo==="entrada")m[l.producto].almacen+=l.cantidad;
      else if(l.tipo==="salida")m[l.producto].almacen-=l.cantidad;
      else if(l.tipo==="ajuste")m[l.producto].almacen+=l.cantidad;
    });
    return Object.values(m).filter(p=>p.almacen>0);
  },[productoLogs]);
  const prodOptions=stockDisponible.map(p=>({v:p.producto,l:p.producto+" ("+Math.max(0,p.almacen)+" "+p.unidad+")"}));
  const defaultProd=prodOptions.length>0?prodOptions[0].v:"";

  const [form,setForm]=useState({numero:nextNum(),fecha:new Date().toISOString().split("T")[0],cliente:"",ncf:"",moneda:"HTG",notas:"",items:[{producto:defaultProd,cantidad:"",precio:""}]});
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  const addItem=()=>setForm(f=>Object.assign({},f,{items:[...f.items,{producto:defaultProd,cantidad:"",precio:""}]}));
  const setItem=(i,k,v)=>setForm(f=>{const items=[...f.items];items[i]=Object.assign({},items[i],{[k]:v});return Object.assign({},f,{items});});
  const rmItem=(i)=>setForm(f=>Object.assign({},f,{items:f.items.filter((_,j)=>j!==i)}));

  const subtotal=form.items.reduce((s,it)=>s+(Number(it.cantidad)||0)*(Number(it.precio)||0),0);
  const total=subtotal;

  const save=async()=>{
    if(!form.cliente||!form.items.length)return;
    const fId=String(Date.now());
    const factura={id:fId,numero:form.numero,fecha:form.fecha,cliente:form.cliente,ncf:form.ncf||null,moneda:form.moneda||"HTG",orden_id:null,subtotal,impuesto:0,total,estado:"pendiente",notas:form.notas,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setFacturas(prev=>[Object.assign({},factura,{_items:form.items.map((it,i)=>({id:fId+"-"+i,factura_id:fId,producto:it.producto,cantidad:Number(it.cantidad)||0,precio_unitario:Number(it.precio)||0,subtotal:(Number(it.cantidad)||0)*(Number(it.precio)||0)}))}),...prev]);
    await dbSaveFactura(factura);
    // Auto-save client to directory
    if(form.cliente){
      const existing=(clientes||[]).find(c=>c.nombre&&c.nombre.toLowerCase()===form.cliente.toLowerCase());
      if(!existing){
        const cl={id:String(Date.now()),nombre:form.cliente,created_at:new Date().toISOString()};
        setClientes(prev=>[cl,...prev]);
        dbSaveCliente(cl);
      }
    }
    for(const [i,it] of form.items.entries()){
      await dbSaveFacturaItem({id:fId+"-"+i,factura_id:fId,producto:it.producto,cantidad:Number(it.cantidad)||0,precio_unitario:Number(it.precio)||0,subtotal:(Number(it.cantidad)||0)*(Number(it.precio)||0)});
    }
    // Auto-deduct from almacén (producto terminado) for each invoiced item
    for(const it of form.items){
      const qty=Number(it.cantidad)||0;
      if(qty>0&&it.producto){
        const salida={id:Date.now()+Math.random(),fecha:form.fecha,producto:it.producto,cantidad:qty,unidad:"uds",tipo:"salida",destino:form.cliente,ordenId:"",notas:"Factura "+form.numero,supervisor:sup.nombre};
        setProductoLogs(prev=>[salida,...prev]);
        await qSaveProducto(salida);
      }
    }
    setForm({numero:nextNum(),fecha:new Date().toISOString().split("T")[0],cliente:"",ncf:"",moneda:"HTG",notas:"",items:[{producto:defaultProd,cantidad:"",precio:""}]});
    setModo(false);
  };

  const startEdit=(f)=>{
    setEditId(f.id);
    setEditNumero(f.numero||"");
    setEditNCF(f.ncf||"");
    setEditItems((f._items||[]).map(it=>({...it,precio_unitario:String(it.precio_unitario||""),cantidad:it.cantidad})));
  };
  const saveEdit=async()=>{
    const f=facturas.find(x=>x.id===editId);if(!f)return;
    const updatedItems=editItems.map(it=>({...it,cantidad:Number(it.cantidad)||0,precio_unitario:Number(it.precio_unitario)||0,subtotal:(Number(it.cantidad)||0)*(Number(it.precio_unitario)||0)}));
    const subtotal=updatedItems.reduce((s,it)=>s+(it.subtotal||0),0);
    const updated=Object.assign({},f,{numero:editNumero,ncf:editNCF,subtotal,impuesto:0,total:subtotal,_items:updatedItems});
    setFacturas(prev=>prev.map(x=>x.id===editId?updated:x));
    await dbUpdateFactura(editId,{numero:editNumero,ncf:editNCF,subtotal,impuesto:0,total:subtotal});
    // Diff items vs original to handle add / remove / update separately.
    const originalItems=f._items||[];
    const updatedIds=new Set(updatedItems.map(it=>it.id));
    const removedItems=originalItems.filter(it=>!updatedIds.has(it.id));
    const originalIds=new Set(originalItems.map(it=>it.id));
    for(const it of removedItems){
      try{await fetch(SUPA_URL+"/rest/v1/factura_items?id=eq."+it.id,{method:"DELETE",headers:SH});}catch(e){}
    }
    for(const it of updatedItems){
      if(originalIds.has(it.id)){
        try{await fetch(SUPA_URL+"/rest/v1/factura_items?id=eq."+it.id,{method:"PATCH",headers:Object.assign({},SH,{"Prefer":"return=minimal"}),body:JSON.stringify({producto:it.producto,cantidad:it.cantidad,precio_unitario:it.precio_unitario,subtotal:it.subtotal})});}catch(e){}
      }else{
        try{await dbSaveFacturaItem({id:it.id,factura_id:editId,producto:it.producto,cantidad:it.cantidad,precio_unitario:it.precio_unitario,subtotal:it.subtotal});}catch(e){}
      }
    }
    setEditId(null);
  };
  // Add / remove / change product on the editable factura draft (Sartori + Scarlet only)
  const addEditItem=()=>setEditItems(p=>[...p,{id:editId+"-new-"+Date.now(),producto:defaultProd,cantidad:"",precio_unitario:""}]);
  const rmEditItem=(i)=>setEditItems(p=>p.filter((_,j)=>j!==i));
  const setEditItemField=(i,k,v)=>setEditItems(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n;});

  // Client profile edit
  const startEditCliente=(c)=>{
    setEditClienteId(c.id);
    setClienteForm({telefono:c.telefono||"",email:c.email||"",direccion:c.direccion||"",rnc:c.rnc||""});
  };
  const saveCliente=async()=>{
    const c=clientes.find(x=>x.id===editClienteId);if(!c)return;
    const updated=Object.assign({},c,clienteForm);
    setClientes(prev=>prev.map(x=>x.id===editClienteId?updated:x));
    await dbUpdateCliente(editClienteId,clienteForm);
    setEditClienteId(null);
  };

  // Client profiles with balance
  const clienteProfiles=React.useMemo(()=>{
    const m={};
    facturas.forEach(f=>{
      if(!f.cliente)return;
      const key=f.cliente.toLowerCase();
      if(!m[key])m[key]={nombre:f.cliente,facturas:[],total:0,pagado:0,pendiente:0};
      m[key].facturas.push(f);
      m[key].total+=Number(f.total||0);
      if(f.estado==="pagada")m[key].pagado+=Number(f.total||0);
      else if(f.estado!=="anulada")m[key].pendiente+=Number(f.total||0);
    });
    // Attach client DB record
    return Object.values(m).map(p=>{
      const dbClient=(clientes||[]).find(c=>c.nombre&&c.nombre.toLowerCase()===p.nombre.toLowerCase());
      return{...p,clienteId:dbClient?dbClient.id:null,telefono:dbClient?dbClient.telefono||"":"",email:dbClient?dbClient.email||"":"",direccion:dbClient?dbClient.direccion||"":"",rnc:dbClient?dbClient.rnc||"":"",
        facturas:p.facturas.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))};
    }).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  },[facturas,clientes]);

  // Filtered facturas for "Todas" view
  const facturasOrdenadas=React.useMemo(()=>{
    let list=[...facturas].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
    if(buscarFac){const q=buscarFac.toLowerCase();list=list.filter(f=>(f.numero||"").toLowerCase().includes(q)||(f.cliente||"").toLowerCase().includes(q)||(f.fecha||"").includes(q));}
    return list;
  },[facturas,buscarFac]);

  const marcarPagada=async(f)=>{
    setFacturas(prev=>prev.map(x=>x.id===f.id?Object.assign({},x,{estado:"pagada"}):x));
    await dbUpdateFactura(f.id,{estado:"pagada"});
    const pago={id:String(Date.now()),tipo:"cobro",referencia_id:f.id,referencia_tipo:"factura",monto:f.total,fecha:new Date().toISOString().split("T")[0],metodo:"transferencia",notas:"Pago factura "+f.numero,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setPagos(prev=>[pago,...prev]);
    await dbSavePago(pago);
  };

  const del=async(id)=>{dbLogAudit("delete","facturas",id,sup.nombre);setFacturas(prev=>prev.filter(f=>f.id!==id));await dbDeleteFacturaItems(id);await dbDeleteFactura(id);};

  const printFactura=(f)=>{
    const items=(f._items||[]);
    const sub=items.reduce((s,it)=>s+(Number(it.subtotal)||0),0);
    const tot=sub;
    const w=window.open("","_blank","width=800,height=900");
    // Printable invoice for Haitian clients — labels in French. Currency defaults to HTG
    // but uses the factura's `moneda` field if set (HTG / US$).
    const cur=f.moneda||"HTG";
    w.document.write("<html lang='fr'><head><meta charset='UTF-8'/><title>Facture "+f.numero+"</title><style>"+
      "body{font-family:Arial,sans-serif;margin:40px;color:#1C2540}"+
      "table{width:100%;border-collapse:collapse;margin:20px 0}"+
      "th{background:#1C2540;color:#fff;padding:10px 12px;text-align:left;font-size:13px}"+
      "td{padding:8px 12px;border-bottom:1px solid #E2E8F0;font-size:13px}"+
      "tr:nth-child(even){background:#F8FAFC}"+
      ".header{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #5BADA8;padding-bottom:16px;margin-bottom:20px}"+
      ".logo{width:60px;height:60px;object-fit:contain;margin-right:14px}"+
      ".co{flex:1}.co h2{margin:0;font-size:16px}.co p{margin:2px 0;font-size:11px;color:#64748B}"+
      ".rnc{color:#5BADA8;font-weight:700;font-size:11px}"+
      ".inv-box{text-align:right}.inv-box h1{margin:0;font-size:22px;color:#1C2540}.inv-box p{margin:2px 0;font-size:12px;color:#64748B}"+
      ".info{display:flex;justify-content:space-between;margin:16px 0}"+
      ".info div{font-size:13px}.info .label{color:#64748B;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:2px}"+
      ".totals{text-align:right;margin-top:10px}.totals div{margin:4px 0;font-size:14px}"+
      ".totals .grand{font-size:20px;font-weight:800;color:#1C2540;border-top:2px solid #1C2540;padding-top:8px;margin-top:8px}"+
      ".badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}"+
      ".footer{margin-top:40px;text-align:center;font-size:10px;color:#94A3B8;border-top:1px solid #E2E8F0;padding-top:12px}"+
      "@media print{body{margin:20px}button{display:none!important}}"+
      "</style></head><body>"+
      "<div class='header'><div style='display:flex;align-items:center'><img src='"+LOGO_IMG+"' class='logo'/><div class='co'><h2>"+EMPRESA_INFO.nombre+"</h2><p>"+EMPRESA_INFO.dir+"</p>"+(EMPRESA_INFO.email||EMPRESA_INFO.web?"<p>📞 "+EMPRESA_INFO.tel+"</p><p>"+EMPRESA_INFO.email+(EMPRESA_INFO.email&&EMPRESA_INFO.web?" · ":"")+EMPRESA_INFO.web+"</p>":"")+(EMPRESA_INFO.rnc?"<p class='rnc'>"+EMPRESA_INFO.rnc+"</p>":"")+"</div></div>"+
      "<div class='inv-box'><h1>FACTURE</h1><p><b>N° "+f.numero+"</b></p><p>"+f.fecha+"</p>"+
      "<p><span class='badge' style='background:"+(f.estado==="pagada"?"#DEF7EC;color:#03543F":"#FEF3C7;color:#92400E")+"'>"+(f.estado==="pagada"?"PAYÉE":"EN ATTENTE")+"</span></p>"+
      "</div></div>"+
      "<div class='info'><div><div class='label'>Client</div><div><b>"+(f.cliente||"—")+"</b></div></div>"+
      (f.ncf?"<div><div class='label'>NIF</div><div><b>"+f.ncf+"</b></div></div>":"")+
      "<div><div class='label'>Émise par</div><div>"+(f.creado_por||"—")+"</div></div></div>"+
      "<table><thead><tr><th>#</th><th>Produit</th><th>Quantité</th><th>Prix Unit.</th><th style='text-align:right'>Sous-total</th></tr></thead><tbody>"+
      items.map((it,i)=>"<tr><td>"+(i+1)+"</td><td>"+it.producto+"</td><td>"+Number(it.cantidad).toLocaleString()+"</td><td>"+cur+" "+Number(it.precio_unitario).toLocaleString()+"</td><td style='text-align:right;font-weight:700'>"+cur+" "+Number(it.subtotal).toLocaleString()+"</td></tr>").join("")+
      "</tbody></table>"+
      "<div class='totals'><div><span style='color:#64748B'>Sous-total :</span> "+cur+" "+sub.toLocaleString()+"</div>"+
      "<div class='grand'>Total : "+cur+" "+tot.toLocaleString()+"</div></div>"+
      (f.notas?"<div style='margin-top:20px;padding:12px;background:#F8FAFC;border-radius:8px;font-size:12px;color:#64748B'><b>Notes :</b> "+f.notas+"</div>":"")+
      "<div style='margin-top:24px;text-align:center;font-size:12px;color:#64748B;font-style:italic'>Merci pour votre confiance</div>"+
      "<div class='footer'>"+EMPRESA_INFO.nombre+" · "+EMPRESA_INFO.dir+(EMPRESA_INFO.email||EMPRESA_INFO.web?"<br>"+EMPRESA_INFO.tel+" · "+EMPRESA_INFO.email+(EMPRESA_INFO.email&&EMPRESA_INFO.web?" · ":"")+EMPRESA_INFO.web:"")+(EMPRESA_INFO.rnc?" · "+EMPRESA_INFO.rnc:"")+"</div>"+
      "<div style='text-align:center;margin-top:20px'><button onclick='window.print()' style='background:#1C2540;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer'>Enregistrer en PDF</button></div>"+
      "</body></html>");
    w.document.close();
  };

  const totalFacturado=facturas.reduce((s,f)=>s+Number(f.total||0),0);
  const totalPendiente=facturas.filter(f=>f.estado==="pendiente").reduce((s,f)=>s+Number(f.total||0),0);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Total Facturado" value={"$"+totalFacturado.toLocaleString()} color={B.green}/>
      <Stat label="Pendiente" value={"$"+totalPendiente.toLocaleString()} color={B.amber}/>
    </div>
    <div style={{display:"flex",gap:8}}>
      {!modo&&<Btn ch="+ Nueva Factura" fn={()=>{setForm(f=>Object.assign({},f,{numero:nextNum()}));setModo(true);}} full/>}
      <Btn ch="📥 Excel" fn={()=>exportToExcel(facturas.map(f=>({Número:f.numero,Fecha:f.fecha,Cliente:f.cliente,NIF:f.ncf||"",Subtotal:Number(f.subtotal||0),Total:Number(f.total||0),Estado:f.estado||"pendiente"})),"facturas","Facturas")} color={B.navy} outline small/>
    </div>
    <div style={{display:"flex",background:B.bg,borderRadius:12,padding:4,gap:3}}>
      <button onClick={()=>setVista("todas")} style={vistaTabBtn("todas")}>Todas</button>
      <button onClick={()=>setVista("clientes")} style={vistaTabBtn("clientes")}>Por Cliente</button>
    </div>
    {modo&&<Card ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid "+B.teal,paddingBottom:12}}>
        <img src={LOGO_IMG} alt="Logo" style={{width:50,height:50,objectFit:"contain"}}/>
        <div style={{flex:1}}>
          <div style={{color:B.navy,fontSize:14,fontWeight:800}}>{EMPRESA_INFO.nombre}</div>
          <div style={{color:B.textLight,fontSize:10,lineHeight:1.3}}>{EMPRESA_INFO.dir}</div>
          <div style={{color:B.textLight,fontSize:10}}>📞 {EMPRESA_INFO.tel} · {EMPRESA_INFO.email}</div>
          <div style={{color:B.textLight,fontSize:10}}>{EMPRESA_INFO.web}</div>
          <div style={{color:B.teal,fontSize:10,fontWeight:700}}>{EMPRESA_INFO.rnc}</div>
        </div>
      </div>
      <div style={{color:B.navy,fontSize:16,fontWeight:800}}>Nueva Factura</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <F label="Número" value={form.numero} onChange={set("numero")}/>
        <F label="Fecha" value={form.fecha} onChange={set("fecha")} type="date"/>
      </div>
      <div>
        <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:6}}>Cliente</div>
        <input list="clientes-list" value={form.cliente} onChange={e=>set("cliente")(e.target.value)} placeholder="Nombre del cliente" style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1.5px solid "+B.border,fontSize:14,fontWeight:500,background:"#fff",outline:"none",boxSizing:"border-box"}}/>
        <datalist id="clientes-list">{(clientes||[]).map(c=><option key={c.id} value={c.nombre}/>)}</datalist>
      </div>
      <F label="NIF (Cliente)" value={form.ncf} onChange={set("ncf")} placeholder="Numéro d'identification fiscale (optionnel)"/>
      <S label="Moneda (Facture)" value={form.moneda||"HTG"} onChange={set("moneda")} options={[{v:"HTG",l:"HTG (Gourdes)"},{v:"US$",l:"US$ (Dólares)"}]}/>
      <div style={{color:B.textLight,fontSize:12,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",marginBottom:4}}>Productos en Almacén</div>

// ── Accounting: Cuentas por Cobrar ───────────────────────────────────────────
function CuentasCobrar({facturas,setFacturas,pagos,setPagos,sup}){
  const [payId,setPayId]=useState(null);
  const [payForm,setPayForm]=useState({monto:"",fecha:new Date().toISOString().split("T")[0],metodo:"transferencia"});

  const pendientes=facturas.filter(f=>f.estado==="pendiente"||f.estado==="parcial");
  const hoy=new Date();
  const aging=(fecha)=>{const d=Math.floor((hoy-new Date(fecha))/(1000*60*60*24));return d;};

  const buckets={a:0,b:0,c:0,d:0};
  pendientes.forEach(f=>{const d=aging(f.fecha);const amt=Number(f.total||0);if(d<=30)buckets.a+=amt;else if(d<=60)buckets.b+=amt;else if(d<=90)buckets.c+=amt;else buckets.d+=amt;});
  const totalPend=pendientes.reduce((s,f)=>s+Number(f.total||0),0);

  const registrarPago=async(f)=>{
    const monto=Number(payForm.monto);if(!monto)return;
    const pago={id:String(Date.now()),tipo:"cobro",referencia_id:f.id,referencia_tipo:"factura",monto,fecha:payForm.fecha,metodo:payForm.metodo,notas:"Abono factura "+f.numero,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setPagos(prev=>[pago,...prev]);
    await dbSavePago(pago);
    const pagosFactura=pagos.filter(p=>p.referencia_id===f.id&&p.tipo==="cobro").reduce((s,p)=>s+Number(p.monto),0)+monto;
    const nuevoEstado=pagosFactura>=Number(f.total)?"pagada":"parcial";
    setFacturas(prev=>prev.map(x=>x.id===f.id?Object.assign({},x,{estado:nuevoEstado}):x));
    await dbUpdateFactura(f.id,{estado:nuevoEstado});
    setPayId(null);setPayForm({monto:"",fecha:new Date().toISOString().split("T")[0],metodo:"transferencia"});
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Total por Cobrar" value={"$"+totalPend.toLocaleString()} color={B.amber}/>
      <Stat label="Facturas Pend." value={pendientes.length} color={B.navy}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
      {[{l:"0-30d",v:buckets.a,c:B.green},{l:"31-60d",v:buckets.b,c:B.amber},{l:"61-90d",v:buckets.c,c:B.red},{l:"90+d",v:buckets.d,c:B.purple}].map(b=><div key={b.l} style={{background:"#fff",borderRadius:10,padding:"8px 10px",border:"1.5px solid "+B.border,textAlign:"center"}}>
        <div style={{color:B.textLight,fontSize:9,fontWeight:700}}>{b.l}</div>
        <div style={{color:b.c,fontSize:14,fontWeight:800}}>${b.v.toLocaleString()}</div>
      </div>)}
    </div>
    {pendientes.map(f=><Card key={f.id} ch={<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{color:B.navy,fontWeight:800}}>{f.numero}</span><Badge label={aging(f.fecha)+" días"} color={aging(f.fecha)>60?B.red:aging(f.fecha)>30?B.amber:B.green}/></div>
          <div style={{color:B.textMid,fontSize:13}}>{f.cliente}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>US$ {Number(f.total||0).toLocaleString()}</div>
          <div style={{color:B.textLight,fontSize:11}}>{f.fecha}</div>
        </div>
      </div>
      {payId===f.id?<div style={{borderTop:"1px solid "+B.border,paddingTop:10,display:"flex",flexDirection:"column",gap:8}}>
        <F label="Monto (US$)" value={payForm.monto} onChange={v=>setPayForm(p=>Object.assign({},p,{monto:v}))} type="number" placeholder="0.00"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <F label="Fecha" value={payForm.fecha} onChange={v=>setPayForm(p=>Object.assign({},p,{fecha:v}))} type="date"/>
          <S label="Método" value={payForm.metodo} onChange={v=>setPayForm(p=>Object.assign({},p,{metodo:v}))} options={METODOS_PAGO}/>
        </div>
        <div style={{display:"flex",gap:8}}><Btn ch="Registrar Pago" fn={()=>registrarPago(f)} small/><Btn ch="Cancelar" fn={()=>setPayId(null)} outline small/></div>
      </div>:<div style={{display:"flex",gap:8,marginTop:6}}><Btn ch="Registrar Pago" fn={()=>setPayId(f.id)} small/></div>}
    </div>}/>)}
    {!pendientes.length&&<div style={{textAlign:"center",padding:30,color:B.textLight}}>No hay facturas pendientes de cobro</div>}
  </div>);
}

// ── Accounting: Cuentas por Pagar ────────────────────────────────────────────
function CuentasPagarModule({cuentasPagar,setCuentasPagar,pagos,setPagos,sup,proveedores,setProveedores}){
  const [modo,setModo]=useState(false);
  const [payId,setPayId]=useState(null);
  const [viewImg,setViewImg]=useState(null);
  const [payForm,setPayForm]=useState({monto:"",fecha:new Date().toISOString().split("T")[0],metodo:"transferencia"});
  const [form,setForm]=useState({proveedor:"",concepto:"",monto:"",moneda:"HTG",categoria:"otros",fecha_factura:new Date().toISOString().split("T")[0],fecha_vencimiento:"",notas:"",imagen:"",pagoInmediato:false,metodoPago:"efectivo"});
  const set=k=>v=>setForm(f=>Object.assign({},f,{[k]:v}));

  const handleImg=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=800,maxH=800;
        let w=img.width,h=img.height;
        if(w>maxW){h=h*(maxW/w);w=maxW;}
        if(h>maxH){w=w*(maxH/h);h=maxH;}
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        const compressed=canvas.toDataURL("image/jpeg",0.6);
        setForm(f=>Object.assign({},f,{imagen:compressed}));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const save=async()=>{
    if(!form.concepto||!form.monto)return;
    const monto=Number(form.monto);
    const isPaid=form.pagoInmediato;
    const c={id:String(Date.now()),proveedor:form.proveedor||form.concepto,concepto:form.concepto,categoria:form.categoria,monto,moneda:form.moneda,fecha_factura:form.fecha_factura,fecha_vencimiento:isPaid?null:form.fecha_vencimiento||null,estado:isPaid?"pagada":"pendiente",pagado:isPaid?monto:0,notas:form.notas,imagen:form.imagen||null,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setCuentasPagar(prev=>[c,...prev]);
    await dbSaveCuentaPagar(c);
    // Auto-save proveedor to directory
    if(form.proveedor&&proveedores){
      const existing=(proveedores||[]).find(p=>p.nombre.toLowerCase()===form.proveedor.toLowerCase());

        setProveedores(prev=>[pv,...prev]);
        dbSaveProveedor(pv);

    if(isPaid){

      setPagos(prev=>[pago,...prev]);
      await dbSavePago(pago);
    }
    setForm({proveedor:"",concepto:"",monto:"",moneda:"HTG",categoria:"otros",fecha_factura:new Date().toISOString().split("T")[0],fecha_vencimiento:"",notas:"",imagen:"",pagoInmediato:false,metodoPago:"efectivo"});
    setModo(false);
  };

    const pago={id:String(Date.now()),tipo:"pago",referencia_id:cp.id,referencia_tipo:"cuenta_pagar",monto,fecha:payForm.fecha,metodo:payForm.metodo,notas:"Pago a "+cp.proveedor,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setPagos(prev=>[pago,...prev]);
    await dbSavePago(pago);
    const pagado=Number(cp.pagado||0)+monto;
    const nuevoEstado=pagado>=Number(cp.monto)?"pagada":"parcial";
    setCuentasPagar(prev=>prev.map(x=>x.id===cp.id?Object.assign({},x,{pagado,estado:nuevoEstado}):x));
    await dbUpdateCuentaPagar(cp.id,{pagado,estado:nuevoEstado});
    setPayId(null);setPayForm({monto:"",fecha:new Date().toISOString().split("T")[0],metodo:"transferencia"});

  const provList=[...new Set(cuentasPagar.map(c=>c.proveedor||c.concepto).filter(Boolean))].sort();

  const saveEditProv=async()=>{

  const delProv=async(id)=>{

      <div style={{display:"grid",gridTemplateColumns:"1fr 100px",gap:10}}>

      <div>
        <div style={{fontSize:12,fontWeight:600,color:B.textMid,marginBottom:6}}>Foto de Factura</div>

    {filtered.map(cp=><Card key={cp.id} accent={cp.estado==="pagada"?B.green:B.border} ch={<div>

          {Number(cp.pagado)>0&&<div style={{color:B.green,fontSize:11,marginTop:2}}>Pagado: {cp.moneda||"HTG"} {Number(cp.pagado).toLocaleString()}</div>}

        <F label="Monto" value={payForm.monto} onChange={v=>setPayForm(p=>Object.assign({},p,{monto:v}))} type="number" placeholder="0.00"/>

    </div>}/>)}
    {!cuentasPagar.length&&<div style={{textAlign:"center",padding:30,color:B.textLight}}>No hay cuentas por pagar registradas</div>}
  </div>);
}

// ── Accounting: Resumen Financiero ───────────────────────────────────────────
function ResumenFinanciero({facturas,gastos,cuentasPagar,pagos,resinaLogs,movs}){
  const [periodo,setPeriodo]=useState("mensual");
  const hoy=new Date();

  const filtrarPorPeriodo=(fecha)=>{
    const d=new Date(fecha);
    if(periodo==="diario")return d.toDateString()===hoy.toDateString();
    if(periodo==="semanal"){const w=new Date(hoy);w.setDate(w.getDate()-7);return d>=w;}
    if(periodo==="anual"){const y=new Date(hoy.getFullYear(),0,1);return d>=y;}
    const m=new Date(hoy.getFullYear(),hoy.getMonth(),1);return d>=m;
  };

  const ingresos=facturas.filter(f=>(f.estado==="pagada"||f.estado==="parcial")&&filtrarPorPeriodo(f.fecha)).reduce((s,f)=>s+Number(f.total||0),0);
  // All cuentasPagar (paid + pending) as expenses, plus old gastos for historical data
  const allExpenses=[...cuentasPagar.map(c=>({categoria:c.categoria||"otros",monto:c.monto,moneda:c.moneda||"HTG",fecha:c.fecha_factura,concepto:c.concepto,proveedor:c.proveedor,estado:c.estado})),...gastos.map(g=>({categoria:g.categoria,monto:g.monto,moneda:g.moneda||"HTG",fecha:g.fecha,concepto:g.descripcion,proveedor:g.proveedor,estado:"pagada"}))];
  const expUSD=allExpenses.filter(g=>g.moneda==="US$");
  const expHTG=allExpenses.filter(g=>(g.moneda||"HTG")==="HTG");
  const costoMP=expUSD.filter(g=>g.categoria==="materia_prima"&&filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const gastosOp=expUSD.filter(g=>g.categoria!=="materia_prima"&&filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const totalGastosUSD=expUSD.filter(g=>filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const totalGastosHTG=expHTG.filter(g=>filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const totalGastos=totalGastosUSD; // utilidad/margen still computed in USD (palamo legacy); HTG/DOP shown alongside
  const utilidad=ingresos-totalGastos;
  const margen=ingresos>0?((utilidad/ingresos)*100).toFixed(1):0;

  // Price per pound: total MP cost / total lbs purchased
  const totalLbsCompradas=(movs||[]).filter(m=>m.tipo==="entrada"&&(m.materialId==="ldpe"||m.materialId==="mlldpe")&&filtrarPorPeriodo(m.fecha)).reduce((s,m)=>s+Number(m.cantidad||0),0);
  const costoMPPeriodo=gastos.filter(g=>g.categoria==="materia_prima"&&filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const precioLibra=totalLbsCompradas>0?(costoMPPeriodo/totalLbsCompradas).toFixed(2):null;

  const porPagar=cuentasPagar.filter(c=>c.estado!=="pagada").reduce((s,c)=>s+Number(c.monto||0)-Number(c.pagado||0),0);
  const porCobrar=facturas.filter(f=>f.estado==="pendiente"||f.estado==="parcial").reduce((s,f)=>s+Number(f.total||0),0);

  // Monthly breakdown for chart (last 6 months)
  const meses=[];
  for(let i=5;i>=0;i--){
    const d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    const label=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][d.getMonth()];
    const ingM=facturas.filter(f=>(f.estado==="pagada"||f.estado==="parcial")&&f.fecha&&f.fecha.startsWith(key)).reduce((s,f)=>s+Number(f.total||0),0);
    const gasM=gastos.filter(g=>g.fecha&&g.fecha.startsWith(key)).reduce((s,g)=>s+Number(g.monto||0),0);
    meses.push({label,ing:ingM,gas:gasM,util:ingM-gasM});
  }
  const maxMes=Math.max(...meses.map(m=>Math.max(m.ing,m.gas)),1);

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:6}}>
      {["diario","semanal","mensual","anual"].map(p=><button key={p} onClick={()=>setPeriodo(p)} style={{background:periodo===p?B.navy:"transparent",border:"1.5px solid "+(periodo===p?B.navy:B.border),borderRadius:20,padding:"7px 14px",color:periodo===p?"#fff":B.textMid,fontSize:12,fontWeight:700,cursor:"pointer"}}>{p.charAt(0).toUpperCase()+p.slice(1)}</button>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Stat label="Ingresos (US$)" value={"US$ "+ingresos.toLocaleString()} color={B.green}/>
      {totalGastosHTG>0&&<Stat label="Gastos (HTG)" value={"HTG "+totalGastosHTG.toLocaleString()} color={B.red}/>}
      {totalGastosUSD>0&&<Stat label="Gastos (US$)" value={"US$ "+totalGastosUSD.toLocaleString()} color={B.red}/>}
      <Stat label="Utilidad (US$)" value={(utilidad>=0?"US$ ":"-US$ ")+Math.abs(utilidad).toLocaleString()} color={utilidad>=0?B.teal:B.red} sub={"Margen: "+margen+"%"}/>
    </div>
    <Card ch={<div>
      <div style={{color:B.navy,fontSize:14,fontWeight:800,marginBottom:10}}>Costo por Libra</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <div style={{background:B.teal+"12",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Lbs Compradas</div>
          <div style={{color:B.teal,fontSize:18,fontWeight:800}}>{totalLbsCompradas.toLocaleString()}</div>
        </div>
        <div style={{background:B.amber+"12",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Costo MP</div>
          <div style={{color:B.amber,fontSize:18,fontWeight:800}}>US$ {costoMPPeriodo.toLocaleString()}</div>
        </div>
        <div style={{background:B.navy+"12",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{color:B.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Precio/Lb</div>
          <div style={{color:B.navy,fontSize:18,fontWeight:800}}>{precioLibra?"US$ "+precioLibra:"—"}</div>
        </div>
      </div>
      {!precioLibra&&<div style={{color:B.textLight,fontSize:11,marginTop:8,textAlign:"center"}}>Registre compras de materia prima y gastos de MP para ver el costo por libra</div>}
    </div>}/>
    <Card ch={<div>
      <div style={{color:B.navy,fontSize:14,fontWeight:800,marginBottom:12}}>Flujo de Caja</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

    <Card ch={<div>
      <div style={{color:B.navy,fontSize:14,fontWeight:800,marginBottom:12}}>Últimos 6 Meses</div>

            <div style={{background:B.green,borderRadius:4,height:"100%",width:Math.max(2,(m.ing/maxMes)*100)+"%",transition:"width .3s"}} title={"Ingresos: "+m.ing}/>
            <div style={{background:B.red,borderRadius:4,height:"100%",width:Math.max(2,(m.gas/maxMes)*100)+"%",transition:"width .3s"}} title={"Gastos: "+m.gas}/>

      </div>
    </div>}/>
    <Card ch={<div>
      <div style={{color:B.navy,fontSize:14,fontWeight:800,marginBottom:12}}>Desglose de Gastos</div>

        const amtUSD=expUSD.filter(g=>g.categoria===cat.v&&filtrarPorPeriodo(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
        const pct=totalGastosUSD>0?((amtUSD/totalGastosUSD)*100).toFixed(0):0;

          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
            <span style={{color:B.textMid,fontSize:12,fontWeight:600}}>{cat.l}</span>

          </div>

            <div style={{height:"100%",background:B.teal,borderRadius:4,width:pct+"%",transition:"width .3s"}}/>
          </div>
        </div>;
      })}
    </div>}/>
    <Btn ch="📄 Generar Reporte para Contador" fn={()=>{
      const periodoLabel=periodo==="diario"?"Hoy":periodo==="semanal"?"Última Semana":periodo==="anual"?"Año "+hoy.getFullYear():"Este Mes";

      const w=window.open("","_blank","width=900,height=1100");

        ".stat .val{font-size:20px;font-weight:800;margin-top:4px}"+
        ".green{color:#059669}.red{color:#DC2626}.navy{color:#1C2540}.amber{color:#D97706}"+
        "table{width:100%;border-collapse:collapse;margin:10px 0}th{background:#F1F5F9;text-align:left;padding:8px 10px;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase}"+

        "<div class='header'><div><h1>Reporte Contable</h1><div class='co'>"+EMPRESA_INFO.nombre+"<br>"+EMPRESA_INFO.dir+"<br>"+EMPRESA_INFO.rnc+"</div></div>"+

        "<div class='grid'>"+
          "<div class='stat'><div class='label'>Costo Materia Prima</div><div class='val amber'>US$ "+costoMP.toLocaleString()+"</div></div>"+

    {tab==="cobrar"&&<CuentasCobrar facturas={facturas} setFacturas={setFacturas} pagos={pagos} setPagos={setPagos} sup={sup}/>}
    {tab==="pagar"&&<CuentasPagarModule cuentasPagar={cuentasPagar} setCuentasPagar={setCuentasPagar} pagos={pagos} setPagos={setPagos} sup={sup} proveedores={proveedores} setProveedores={setProveedores}/>}

// ── Empleados Panel ──────────────────────────────────────────────────────────
function EmpleadosPanel({sup}){
  const SK="plastinord_emp_profiles";
  const SK_LIC="plastinord_licencias";
  const TIPOS_LICENCIA=[{v:"vacaciones",l:"Vacaciones"},{v:"medica",l:"Licencia Médica"},{v:"personal",l:"Permiso Personal"},{v:"sin_goce",l:"Licencia sin Goce"}];
  const [profiles,setProfiles]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK)||"{}");}catch(e){return{};}});
  const [licencias,setLicencias]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK_LIC)||"[]");}catch(e){return[];}});
  const persistLic=(list)=>{setLicencias(list);localStorage.setItem(SK_LIC,JSON.stringify(list));};
  const [selected,setSelected]=useState(null);
  const [editing,setEditing]=useState(false);
  const [buscar,setBuscar]=useState("");
  const [filtroTipo,setFiltroTipo]=useState("todos");
  const [showLicForm,setShowLicForm]=useState(false);
  const [licForm,setLicForm]=useState({tipo:"vacaciones",fechaInicio:"",fechaFin:"",monto:"",fechaPago:"",notas:""});
  const [showAddEmp,setShowAddEmp]=useState(false);
  const [newEmp,setNewEmp]=useState({nombre:"",cargo:"",area:"general",salario:"",tipo:"nomina",ingreso:new Date().toISOString().split("T")[0],ci:""});
  const canManage=canManageEmpleados(sup);
  // Mark an employee as inactive: removed from active lists but historical references intact
  const removeEmpleado=(nombre)=>{
    if(!canManage)return;
    if(!confirm("¿Marcar a "+nombre+" como inactivo (ya no trabaja)?\n\nNo aparecerá en nuevas nóminas pero seguirá visible en el historial."))return;
    const inactivos=(()=>{try{return JSON.parse(localStorage.getItem("plastinord_empleados_inactivos")||"[]");}catch(e){return[];}})();
    if(!inactivos.includes(nombre))inactivos.push(nombre);
    localStorage.setItem("plastinord_empleados_inactivos",JSON.stringify(inactivos));
    const idx=EMPLEADOS.findIndex(e=>e.nombre===nombre);
    if(idx>=0)EMPLEADOS.splice(idx,1);
    const nidx=NOMBRES_EMPLEADOS.indexOf(nombre);
    if(nidx>=0)NOMBRES_EMPLEADOS.splice(nidx,1);
    alert("✓ "+nombre+" marcado como inactivo");
    setSelected(null);
  };
  const addEmpleado=()=>{
    if(!canManage)return alert("Sin permisos para agregar empleados");
    if(!newEmp.nombre||!newEmp.cargo)return alert("Nombre y cargo son requeridos");
    if(EMPLEADOS.find(e=>e.nombre.toLowerCase()===newEmp.nombre.toLowerCase()))return alert("Este empleado ya existe");
    const emp={nombre:newEmp.nombre,cargo:newEmp.cargo,area:newEmp.area,salario:Number(newEmp.salario)||0,tipo:newEmp.tipo,ingreso:newEmp.ingreso,ci:newEmp.ci||""};
    EMPLEADOS.push(emp);
    NOMBRES_EMPLEADOS.push(emp.nombre);
    const extras=(()=>{try{return JSON.parse(localStorage.getItem("plastinord_empleados_extra")||"[]");}catch(e){return[];}})();
    extras.push(emp);
    localStorage.setItem("plastinord_empleados_extra",JSON.stringify(extras));
    setNewEmp({nombre:"",cargo:"",area:"general",salario:"",tipo:"nomina",ingreso:new Date().toISOString().split("T")[0],ci:""});
    setShowAddEmp(false);
    alert("✓ Empleado "+emp.nombre+" agregado");
  };

  const allEmps=[...EMPLEADOS,...OTROS_PAGOS.map(o=>({nombre:o.nombre,cargo:o.cargo,salario:o.mensual,moneda:o.moneda,tipo:"otros"}))];
  const filtered=allEmps.filter(e=>{
    if(filtroTipo!=="todos"&&e.tipo!==filtroTipo)return false;
    if(buscar){const q=buscar.toLowerCase();return e.nombre.toLowerCase().includes(q)||e.cargo.toLowerCase().includes(q);}
    return true;
  });

  const getP=(nombre)=>profiles[nombre]||{};
  const setP=(nombre,data)=>{
    const next={...profiles,[nombre]:{...getP(nombre),...data}};
    setProfiles(next);localStorage.setItem(SK,JSON.stringify(next));
  };

  // Vacation calculation: 14 days/year after 1 year, prorated
  const calcVacaciones=(ingreso)=>{
    if(!ingreso)return{acumulados:0,usados:0,disponibles:0};
    const start=new Date(ingreso);const now=new Date();
    const years=(now-start)/(365.25*24*60*60*1000);
    if(years<1)return{acumulados:0,usados:0,disponibles:0};
    const acumulados=Math.floor(years)*14;
    const usados=getP(selected?.nombre||"").vacacionesUsadas||0;
    return{acumulados,usados,disponibles:Math.max(0,acumulados-usados)};
  };

  // Detail view
  if(selected){
    const e=selected;
    const p=getP(e.nombre);
    const vac=calcVacaciones(e.ingreso);
    const fmt=n=>"HTG "+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

    if(editing){
      return <EmpleadoEditForm nombre={e.nombre} profile={p} onSave={(data)=>{setP(e.nombre,data);setEditing(false);}} onCancel={()=>setEditing(false)}/>;
    }

    return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
      <button onClick={()=>setSelected(null)} style={{alignSelf:"flex-start",background:"none",border:"none",color:B.teal,fontSize:14,fontWeight:700,cursor:"pointer",padding:0}}>← Volver</button>

      {/* Profile header */}
      <Card ch={<div>
        <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
          <div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,"+B.teal+","+B.navy+")",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:22,fontWeight:800,flexShrink:0}}>
            {e.nombre.split(" ").map(n=>n[0]).slice(0,2).join("")}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:800,color:B.textDark}}>{e.nombre}</div>
            <div style={{fontSize:13,color:B.teal,fontWeight:700}}>{e.cargo}</div>
            {e.area&&<div style={{fontSize:11,color:B.textLight,marginTop:2}}>Area: {e.area}</div>}
            <div style={{fontSize:11,color:B.textLight}}>Tipo: {e.tipo==="nomina"?"Nómina Principal":e.tipo==="adicional"?"Adicional":"Otros Pagos"}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10}}>
          <Btn ch="Editar Perfil" fn={()=>setEditing(true)} outline small/>
          {canManage&&e.tipo!=="otros"&&<Btn ch="✕ Marcar Inactivo" fn={()=>removeEmpleado(e.nombre)} color={B.red} outline small/>}
        </div>
      </div>}/>

      {/* Key info */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Card ch={<div>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700,textTransform:"uppercase"}}>SALARIO MENSUAL</div>
          <div style={{fontSize:18,fontWeight:800,color:B.navy}}>{e.moneda==="US$"?"US$ ":"HTG "}{(e.salario||0).toLocaleString()}</div>
        </div>}/>
        <Card ch={<div>
          <div style={{fontSize:10,color:B.textLight,fontWeight:700,textTransform:"uppercase"}}>INGRESO</div>
          <div style={{fontSize:18,fontWeight:800,color:B.teal}}>{e.ingreso||"N/A"}</div>
        </div>}/>
      </div>

      {/* ID */}
      {e.ci&&<Card ch={<div>
        <div style={{fontSize:10,color:B.textLight,fontWeight:700,textTransform:"uppercase"}}>CEDULA / PASAPORTE</div>
        <div style={{fontSize:16,fontWeight:700,color:B.textDark}}>{e.ci}</div>
      </div>}/>}

      {/* Personal info */}
      <Card ch={<div>
        <div style={{fontSize:13,fontWeight:800,color:B.navy,marginBottom:8}}>Información Personal</div>
        {[["Fecha Nacimiento",p.fechaNacimiento||"—"],["Teléfono",p.telefono||"—"],["Contacto Emergencia",p.contactoEmergencia||"—"],["Dirección",p.direccion||"—"]].map(([l,v])=>
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+B.border}}>
            <span style={{fontSize:12,color:B.textLight}}>{l}</span>
            <span style={{fontSize:12,fontWeight:600,color:B.textDark}}>{v}</span>
          </div>)}
      </div>}/>

      {/* Sizes */}
      <Card ch={<div>
        <div style={{fontSize:13,fontWeight:800,color:B.navy,marginBottom:8}}>Tallas de Uniforme</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["Camisa",p.tallaCamisa],["Zapatos",p.tallaZapatos],["Pantalón",p.tallaPantalon]].map(([l,v])=>
            <div key={l} style={{background:B.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
              <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>{l}</div>
              <div style={{fontSize:16,fontWeight:800,color:v?B.textDark:B.textLight}}>{v||"—"}</div>
            </div>)}
        </div>
      </div>}/>

      {/* Vacaciones */}
      {e.ingreso&&<Card ch={<div>
        <div style={{fontSize:13,fontWeight:800,color:B.navy,marginBottom:8}}>Vacaciones</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div style={{background:B.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>ACUMULADOS</div>
            <div style={{fontSize:18,fontWeight:800,color:B.navy}}>{vac.acumulados}</div>
          </div>
          <div style={{background:B.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>USADOS</div>
            <div style={{fontSize:18,fontWeight:800,color:B.red}}>{vac.usados}</div>
          </div>
          <div style={{background:B.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>DISPONIBLES</div>
            <div style={{fontSize:18,fontWeight:800,color:B.green}}>{vac.disponibles}</div>
          </div>
        </div>
      </div>}/>}

      {/* Licencias */}
      {(()=>{
        const empLic=licencias.filter(l=>l.empleado===e.nombre).sort((a,b)=>new Date(b.fechaInicio)-new Date(a.fechaInicio));
        const calcDias=(fi,ff)=>{if(!fi||!ff)return 0;const d=Math.ceil((new Date(ff)-new Date(fi))/(1000*60*60*24))+1;return Math.max(0,d);};
        const saveLic=()=>{
          if(!licForm.fechaInicio||!licForm.fechaFin)return;
          const dias=calcDias(licForm.fechaInicio,licForm.fechaFin);
          if(licForm.tipo==="vacaciones"&&dias>vac.disponibles){alert("Solo tiene "+vac.disponibles+" días de vacaciones disponibles");return;}
          const rec={id:String(Date.now()),empleado:e.nombre,tipo:licForm.tipo,fechaInicio:licForm.fechaInicio,fechaFin:licForm.fechaFin,dias,monto:licForm.tipo==="vacaciones"?parseFloat(licForm.monto)||0:0,fechaPago:licForm.tipo==="vacaciones"?licForm.fechaPago:"",estado:"aprobada",aprobadoPor:sup.nombre,notas:licForm.notas,created_at:new Date().toISOString()};
          const newList=[rec,...licencias];
          persistLic(newList);
          // Auto-update vacacionesUsadas
          if(licForm.tipo==="vacaciones"){
            const totalVacUsadas=newList.filter(l=>l.empleado===e.nombre&&l.tipo==="vacaciones").reduce((s,l)=>s+(l.dias||0),0);
            setP(e.nombre,{vacacionesUsadas:totalVacUsadas});
          }
          setShowLicForm(false);setLicForm({tipo:"vacaciones",fechaInicio:"",fechaFin:"",monto:"",fechaPago:"",notas:""});
        };
        const delLic=(id)=>{
          if(!confirm("¿Eliminar esta licencia?"))return;
          const rec=licencias.find(l=>l.id===id);
          const newList=licencias.filter(l=>l.id!==id);
          persistLic(newList);
          if(rec&&rec.tipo==="vacaciones"){
            const totalVacUsadas=newList.filter(l=>l.empleado===e.nombre&&l.tipo==="vacaciones").reduce((s,l)=>s+(l.dias||0),0);
            setP(e.nombre,{vacacionesUsadas:totalVacUsadas});
          }
        };
        const tipoColor={vacaciones:B.teal,medica:B.red,personal:B.amber,sin_goce:B.textMid};
        const tipoLabel={vacaciones:"Vacaciones",medica:"Licencia Médica",personal:"Permiso Personal",sin_goce:"Sin Goce"};
        return(<Card ch={<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:B.navy}}>Licencias</div>
            <Btn ch={showLicForm?"✕ Cancelar":"+ Registrar"} fn={()=>setShowLicForm(!showLicForm)} color={showLicForm?B.textMid:B.teal} small/>
          </div>
          {showLicForm&&<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12,animation:"slideDown .2s ease",background:B.bg,borderRadius:12,padding:12}}>
            <S label="Tipo" value={licForm.tipo} onChange={v=>setLicForm(f=>({...f,tipo:v}))} options={TIPOS_LICENCIA}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <F label="Fecha inicio" value={licForm.fechaInicio} onChange={v=>setLicForm(f=>({...f,fechaInicio:v}))} type="date"/>
              <F label="Fecha fin" value={licForm.fechaFin} onChange={v=>setLicForm(f=>({...f,fechaFin:v}))} type="date"/>
            </div>
            {licForm.fechaInicio&&licForm.fechaFin&&<div style={{background:"#fff",borderRadius:8,padding:"6px 10px",fontSize:13,fontWeight:700,color:B.navy,textAlign:"center"}}>{calcDias(licForm.fechaInicio,licForm.fechaFin)} días{licForm.tipo==="vacaciones"?" (disponibles: "+vac.disponibles+")":""}</div>}
            {licForm.tipo==="vacaciones"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <F label="Monto pagado (HTG)" value={licForm.monto} onChange={v=>setLicForm(f=>({...f,monto:v}))} type="number" placeholder="0.00"/>
              <F label="Fecha de pago" value={licForm.fechaPago} onChange={v=>setLicForm(f=>({...f,fechaPago:v}))} type="date"/>
            </div>}
            <F label="Notas" value={licForm.notas} onChange={v=>setLicForm(f=>({...f,notas:v}))} placeholder="Opcional"/>
            <Btn ch="✓ Registrar Licencia" fn={saveLic} color={B.teal} full/>
          </div>}
          {empLic.length===0&&!showLicForm?<div style={{textAlign:"center",padding:16,color:B.textLight,fontSize:13}}>Sin licencias registradas</div>:
          empLic.map(l=>(<div key={l.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid "+B.border}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <Badge label={tipoLabel[l.tipo]||l.tipo} color={tipoColor[l.tipo]||B.teal}/>
                <span style={{fontSize:12,fontWeight:800,color:B.textDark}}>{l.dias} días</span>
              </div>
              <div style={{fontSize:11,color:B.textLight,marginTop:2}}>{l.fechaInicio} → {l.fechaFin}{l.notas?" · "+l.notas:""}</div>
              {l.tipo==="vacaciones"&&(l.monto>0||l.fechaPago)&&<div style={{fontSize:11,color:B.teal,fontWeight:700,marginTop:2}}>{l.monto>0?"HTG "+l.monto.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):""}{l.monto>0&&l.fechaPago?" · ":""}{l.fechaPago?"Pagado: "+l.fechaPago:""}</div>}
            </div>
            <button onClick={()=>delLic(l.id)} style={{background:"none",border:"none",color:B.red+"88",fontSize:13,cursor:"pointer",flexShrink:0}}>✕</button>
          </div>))}
        </div>}/>);
      })()}

      {/* Notes */}
      {p.notas&&<Card ch={<div>
        <div style={{fontSize:13,fontWeight:800,color:B.navy,marginBottom:4}}>Notas</div>
        <div style={{fontSize:13,color:B.textMid,whiteSpace:"pre-wrap"}}>{p.notas}</div>
      </div>}/>}
    </div>);
  }

  // List view
  return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Empleados</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>{allEmps.length} empleados registrados</p></div>
      {canManage&&<Btn ch={showAddEmp?"✕":"+ Nuevo"} fn={()=>setShowAddEmp(!showAddEmp)} color={showAddEmp?B.textMid:B.teal} small/>}
    </div>

    {showAddEmp&&<div style={{animation:"slideDown .2s ease"}}><Card accent={B.teal} ch={<div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{color:B.teal,fontSize:12,fontWeight:800,letterSpacing:1,textTransform:"uppercase"}}>Nuevo Empleado</div>
      <F label="Nombre completo" value={newEmp.nombre} onChange={v=>setNewEmp(f=>({...f,nombre:v}))} placeholder="Nombre y apellido"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <F label="Cargo" value={newEmp.cargo} onChange={v=>setNewEmp(f=>({...f,cargo:v}))} placeholder="Ej: Operador Extrusión"/>
        <S label="Área" value={newEmp.area} onChange={v=>setNewEmp(f=>({...f,area:v}))} options={[{v:"extrusion",l:"Extrusión"},{v:"impresion",l:"Impresión"},{v:"slitter",l:"Slitter"},{v:"cortadora",l:"Cortadora"},{v:"reciclaje",l:"Reciclaje"},{v:"supervision",l:"Supervisión"},{v:"general",l:"General"}]}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <F label="Salario mensual (HTG)" value={newEmp.salario} onChange={v=>setNewEmp(f=>({...f,salario:v}))} type="number" placeholder="0"/>
        <S label="Tipo" value={newEmp.tipo} onChange={v=>setNewEmp(f=>({...f,tipo:v}))} options={[{v:"nomina",l:"Nómina"},{v:"adicional",l:"Adicional"}]}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <F label="Fecha ingreso" value={newEmp.ingreso} onChange={v=>setNewEmp(f=>({...f,ingreso:v}))} type="date"/>
        <F label="Cédula / Pasaporte" value={newEmp.ci} onChange={v=>setNewEmp(f=>({...f,ci:v}))} placeholder="000-0000000-0"/>
      </div>
      <Btn ch="✓ Agregar Empleado" fn={addEmpleado} color={B.teal} full/>
    </div>}/>}</div>}

    <SearchBar value={buscar} onChange={setBuscar} placeholder="Buscar empleado..."/>

    <div style={{display:"flex",gap:6}}>
      {[["todos","Todos"],["nomina","Nómina"],["adicional","Adicional"],["otros","Otros"]].map(([v,l])=>
        <button key={v} onClick={()=>setFiltroTipo(v)} style={{flex:1,background:filtroTipo===v?B.navy:"transparent",border:"1.5px solid "+(filtroTipo===v?B.navy:B.border),borderRadius:20,padding:"6px 10px",color:filtroTipo===v?"#fff":B.textMid,fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>
      )}
    </div>

    {/* Stats */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
      <Stat label="Nómina" value={EMPLEADOS.filter(e=>e.tipo==="nomina").length} color={B.teal}/>
      <Stat label="Adicional" value={EMPLEADOS.filter(e=>e.tipo==="adicional").length} color={B.purple}/>
      <Stat label="Otros" value={OTROS_PAGOS.length} color={B.amber}/>
    </div>

    {filtered.map(e=>{
      const p=getP(e.nombre);
      const hasProfile=p.telefono||p.tallaCamisa;
      return(<div key={e.nombre} onClick={()=>setSelected(e)} style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+B.border,cursor:"pointer",display:"flex",gap:12,alignItems:"center"}}>
        <div style={{width:40,height:40,borderRadius:12,background:e.tipo==="nomina"?"linear-gradient(135deg,"+B.teal+","+B.navy+")":e.tipo==="adicional"?"linear-gradient(135deg,"+B.purple+",#5B21B6)":"linear-gradient(135deg,"+B.amber+",#B45309)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:800,flexShrink:0}}>
          {e.nombre.split(" ").map(n=>n[0]).slice(0,2).join("")}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:B.textDark,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.nombre}</div>
          <div style={{fontSize:11,color:B.textLight}}>{e.cargo}</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:13,fontWeight:800,color:B.navy}}>{e.moneda==="US$"?"US$":"HTG"} {(e.salario||0).toLocaleString()}</div>
          {hasProfile&&<div style={{fontSize:9,color:B.green,fontWeight:700}}>Perfil completo</div>}
        </div>
      </div>);
    })}
  </div>);
}

// ── Contribuciones (ONA, OFATMA, Préstamos) ────────────────────────────────
function Contribuciones({sup,gastos,setGastos}){
  const SK="plastinord_contribuciones";
  const SK_LOANS="plastinord_prestamos";
  const [seccion,setSeccion]=useState("obligaciones"); // obligaciones | prestamos
  const [contribs,setContribs]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK)||"[]");}catch(e){return[];}});
  const [prestamos,setPrestamos]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK_LOANS)||"[]");}catch(e){return[];}});
  const [showForm,setShowForm]=useState(false);
  const [showLoanForm,setShowLoanForm]=useState(false);
  const [filtro,setFiltro]=useState("todos"); // todos | pendiente | pagado

  const persist=(d)=>{localStorage.setItem(SK,JSON.stringify(d));};
  const persistLoans=(d)=>{localStorage.setItem(SK_LOANS,JSON.stringify(d));};

  // Contribution form state
  const hoy=new Date().toISOString().split("T")[0];
  const [cTipo,setCTipo]=useState("ONA");
  const [cPeriodo,setCPeriodo]=useState(hoy.substring(0,7));
  const [cMonto,setCMonto]=useState("");
  const [cNotas,setCNotas]=useState("");

  const saveContrib=()=>{
    if(!cMonto)return;
    const c={id:String(Date.now()),tipo:cTipo,periodo:cPeriodo,monto:Number(cMonto),estado:"pendiente",notas:cNotas,creado_por:sup.nombre,created_at:new Date().toISOString()};
    const next=[c,...contribs];setContribs(next);persist(next);
    setCMonto("");setCNotas("");setShowForm(false);
  };

  const marcarPagado=async(id)=>{
    if(!confirm("¿Marcar como pagado? Se registrará como gasto en Contabilidad."))return;
    const c=contribs.find(x=>x.id===id);if(!c)return;
    const next=contribs.map(x=>x.id===id?{...x,estado:"pagado",fecha_pago:new Date().toISOString()}:x);
    setContribs(next);persist(next);
    // Send to Gastos
    const g={id:String(Date.now())+"contrib",fecha:hoy,categoria:c.tipo==="ONA"?"nomina":c.tipo==="OFATMA"?"nomina":"otros",monto:c.monto,moneda:"HTG",descripcion:"["+c.tipo+"] "+c.periodo+(c.notas?" — "+c.notas:""),proveedor:c.tipo,creado_por:sup.nombre,created_at:new Date().toISOString()};
    setGastos(prev=>[g,...prev]);
    await dbSaveGasto(g);
  };

  const delContrib=(id)=>{
    if(!confirm("¿Eliminar esta contribución?"))return;
    const next=contribs.filter(x=>x.id!==id);setContribs(next);persist(next);
  };

  const filteredC=filtro==="todos"?contribs:contribs.filter(c=>c.estado===filtro);
  const totalPend=contribs.filter(c=>c.estado==="pendiente").reduce((s,c)=>s+c.monto,0);
  const totalPagado=contribs.filter(c=>c.estado==="pagado").reduce((s,c)=>s+c.monto,0);

  // Loan form state
  const [lEmpleado,setLEmpleado]=useState(EMPLEADOS[0]?.nombre||"");
  const [lMonto,setLMonto]=useState("");
  const [lCuota,setLCuota]=useState("");
  const [lNotas,setLNotas]=useState("");

  const saveLoan=()=>{
    if(!lMonto||!lCuota)return;
    const loan={id:String(Date.now()),empleado:lEmpleado,montoOriginal:Number(lMonto),saldoPendiente:Number(lMonto),cuotaQuincenal:Number(lCuota),notas:lNotas,pagos:[],estado:"activo",created_at:new Date().toISOString()};
    const next=[loan,...prestamos];setPrestamos(next);persistLoans(next);
    setLMonto("");setLCuota("");setLNotas("");setShowLoanForm(false);
  };

  const registrarPagoLoan=(loanId,monto)=>{
    const next=prestamos.map(l=>{
      if(l.id!==loanId)return l;
      const pago={id:String(Date.now()),fecha:hoy,monto};
      const newSaldo=Math.max(0,l.saldoPendiente-monto);
      return{...l,saldoPendiente:newSaldo,pagos:[...l.pagos,pago],estado:newSaldo<=0?"pagado":"activo"};
    });
    setPrestamos(next);persistLoans(next);
  };

  const tabBtn=(id)=>({flex:1,background:seccion===id?"#fff":"transparent",border:"none",borderRadius:10,padding:"10px 4px",color:seccion===id?B.textDark:B.textLight,fontSize:12,fontWeight:700,cursor:"pointer",boxShadow:seccion===id?"0 1px 4px rgba(0,0,0,.1)":"none"});

  // Loan detail
  const [loanDetalle,setLoanDetalle]=useState(null);
  if(loanDetalle){
    const l=loanDetalle;
    const pct=((l.montoOriginal-l.saldoPendiente)/l.montoOriginal*100).toFixed(0);
    return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
      <button onClick={()=>setLoanDetalle(null)} style={{alignSelf:"flex-start",background:"none",border:"none",color:B.teal,fontSize:14,fontWeight:700,cursor:"pointer",padding:0}}>← Volver</button>
      <Card ch={<div>
        <div style={{fontSize:17,fontWeight:800,color:B.textDark}}>{l.empleado}</div>
        <Badge label={l.estado==="activo"?"Activo":"Pagado"} color={l.estado==="activo"?B.amber:B.green}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
          <div style={{background:B.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>ORIGINAL</div>
            <div style={{fontSize:16,fontWeight:800,color:B.navy}}>HTG {l.montoOriginal.toLocaleString()}</div>
          </div>
          <div style={{background:B.bg,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:B.textLight,fontWeight:700}}>PENDIENTE</div>
            <div style={{fontSize:16,fontWeight:800,color:l.saldoPendiente>0?B.red:B.green}}>HTG {l.saldoPendiente.toLocaleString()}</div>
          </div>
        </div>
        <div style={{marginTop:8}}>
          <div style={{height:8,background:B.bg,borderRadius:4,overflow:"hidden"}}>
            <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.green+")",borderRadius:4}}/>
          </div>
          <div style={{fontSize:11,color:B.textLight,marginTop:3,textAlign:"right"}}>{pct}% pagado</div>
        </div>
        <div style={{fontSize:12,color:B.textMid,marginTop:4}}>Cuota quincenal: HTG {l.cuotaQuincenal.toLocaleString()}</div>
        {l.notas&&<div style={{fontSize:12,color:B.textLight,marginTop:2}}>{l.notas}</div>}
      </div>}/>

      {l.estado==="activo"&&<Btn ch={"Registrar Pago — HTG "+l.cuotaQuincenal.toLocaleString()} fn={()=>{if(confirm("¿Registrar pago de HTG "+l.cuotaQuincenal.toLocaleString()+"?"))registrarPagoLoan(l.id,l.cuotaQuincenal);setLoanDetalle({...l,saldoPendiente:Math.max(0,l.saldoPendiente-l.cuotaQuincenal),pagos:[...l.pagos,{id:String(Date.now()),fecha:hoy,monto:l.cuotaQuincenal}]});}} full/>}

      <Card ch={<div>
        <div style={{fontSize:13,fontWeight:800,color:B.navy,marginBottom:8}}>Historial de Pagos</div>
        {l.pagos.length===0&&<div style={{fontSize:12,color:B.textLight,textAlign:"center",padding:12}}>Sin pagos registrados</div>}
        {l.pagos.map((p,i)=><div key={p.id||i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+B.border}}>
          <span style={{fontSize:12,color:B.textMid}}>{p.fecha}</span>
          <span style={{fontSize:12,fontWeight:700,color:B.green}}>HTG {p.monto.toLocaleString()}</span>
        </div>)}
      </div>}/>
    </div>);
  }

  return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
    <div><h2 style={{color:B.textDark,fontSize:20,fontWeight:800,margin:"0 0 2px"}}>Contribuciones</h2><p style={{color:B.textLight,fontSize:13,margin:0}}>ONA, OFATMA y préstamos</p></div>

    <div style={{display:"flex",background:B.bg,borderRadius:12,padding:4,gap:3}}>
      <button onClick={()=>setSeccion("obligaciones")} style={tabBtn("obligaciones")}>ONA / OFATMA</button>
      <button onClick={()=>setSeccion("prestamos")} style={tabBtn("prestamos")}>Préstamos</button>
    </div>

    {seccion==="obligaciones"&&<React.Fragment>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Stat label="Pendiente" value={"HTG "+totalPend.toLocaleString()} color={B.amber}/>
        <Stat label="Pagado" value={"HTG "+totalPagado.toLocaleString()} color={B.green}/>
      </div>

      <div style={{display:"flex",gap:6}}>
        {[["todos","Todos"],["pendiente","Pendientes"],["pagado","Pagados"]].map(([v,l])=>
          <button key={v} onClick={()=>setFiltro(v)} style={{flex:1,background:filtro===v?B.navy:"transparent",border:"1.5px solid "+(filtro===v?B.navy:B.border),borderRadius:20,padding:"6px 10px",color:filtro===v?"#fff":B.textMid,fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>
        )}
      </div>

      {!showForm&&<Btn ch="+ Nueva Contribución" fn={()=>setShowForm(true)} full/>}

      {showForm&&<Card ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:14,fontWeight:800,color:B.navy}}>Nueva Contribución</div>
        <S label="Tipo" value={cTipo} onChange={v=>setCTipo(v)} options={[{v:"ONA",l:"ONA (Pensión)"},{v:"OFATMA",l:"OFATMA (Salud/Trabajo)"},{v:"Otro",l:"Otro"}]}/>
        <F label="Período" value={cPeriodo} onChange={v=>setCPeriodo(v)} type="month"/>
        <F label="Monto (HTG)" value={cMonto} onChange={v=>setCMonto(v)} type="number" placeholder="0.00"/>
        <F label="Notas" value={cNotas} onChange={v=>setCNotas(v)} placeholder="Detalles adicionales"/>
        <div style={{display:"flex",gap:8}}>
          <Btn ch="Guardar" fn={saveContrib} full/><Btn ch="Cancelar" fn={()=>setShowForm(false)} outline small/>
        </div>
      </div>}/>}

      {filteredC.length===0&&<Card style={{textAlign:"center",padding:30}} ch={<div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin contribuciones</div>}/>}
      {filteredC.map(c=><Card key={c.id} ch={<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
            <Badge label={c.tipo} color={c.tipo==="ONA"?B.navy:c.tipo==="OFATMA"?B.purple:B.amber}/>
            <Badge label={c.estado==="pendiente"?"Pendiente":"Pagado"} color={c.estado==="pendiente"?B.amber:B.green}/>
          </div>
          <div style={{color:B.textDark,fontSize:16,fontWeight:800}}>HTG {c.monto.toLocaleString()}</div>
          <div style={{color:B.textLight,fontSize:12}}>{c.periodo}{c.notas?" — "+c.notas:""}</div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {c.estado==="pendiente"&&<Btn ch="Pagar" fn={()=>marcarPagado(c.id)} small/>}
          {isSartori(sup)&&<Btn ch="X" fn={()=>delContrib(c.id)} color={B.red} outline small/>}
        </div>
      </div>}/>)}
    </React.Fragment>}

    {seccion==="prestamos"&&<React.Fragment>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Stat label="Préstamos Activos" value={prestamos.filter(l=>l.estado==="activo").length} color={B.amber}/>
        <Stat label="Saldo Total" value={"HTG "+prestamos.filter(l=>l.estado==="activo").reduce((s,l)=>s+l.saldoPendiente,0).toLocaleString()} color={B.red}/>
      </div>

      {!showLoanForm&&<Btn ch="+ Nuevo Préstamo" fn={()=>setShowLoanForm(true)} full/>}

      {showLoanForm&&<Card ch={<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:14,fontWeight:800,color:B.navy}}>Nuevo Préstamo</div>
        <S label="Empleado" value={lEmpleado} onChange={v=>setLEmpleado(v)} options={EMPLEADOS.map(e=>({v:e.nombre,l:e.nombre.split(" ").slice(0,2).join(" ")+" — "+e.cargo}))}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <F label="Monto Total (HTG)" value={lMonto} onChange={v=>setLMonto(v)} type="number" placeholder="0"/>
          <F label="Cuota Quincenal (HTG)" value={lCuota} onChange={v=>setLCuota(v)} type="number" placeholder="0"/>
        </div>
        {lMonto&&lCuota&&Number(lCuota)>0&&<div style={{fontSize:12,color:B.textMid,background:B.bg,borderRadius:8,padding:"6px 10px"}}>
          Cuotas estimadas: {Math.ceil(Number(lMonto)/Number(lCuota))} quincenas ({Math.ceil(Number(lMonto)/Number(lCuota)/2)} meses)
        </div>}
        <F label="Notas" value={lNotas} onChange={v=>setLNotas(v)} placeholder="Motivo del préstamo"/>
        <div style={{display:"flex",gap:8}}>
          <Btn ch="Guardar" fn={saveLoan} full/><Btn ch="Cancelar" fn={()=>setShowLoanForm(false)} outline small/>
        </div>
      </div>}/>}

      {prestamos.length===0&&<Card style={{textAlign:"center",padding:30}} ch={<div style={{color:B.textMid,fontSize:14,fontWeight:700}}>Sin préstamos registrados</div>}/>}
      {prestamos.map(l=>{
        const pct=((l.montoOriginal-l.saldoPendiente)/l.montoOriginal*100).toFixed(0);
        return(<div key={l.id} onClick={()=>setLoanDetalle(l)} style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+(l.estado==="activo"?B.amber+"40":B.green+"40"),cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:B.textDark}}>{l.empleado.split(" ").slice(0,2).join(" ")}</div>
              <Badge label={l.estado==="activo"?"Activo":"Pagado"} color={l.estado==="activo"?B.amber:B.green}/>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:14,fontWeight:800,color:l.saldoPendiente>0?B.red:B.green}}>HTG {l.saldoPendiente.toLocaleString()}</div>
              <div style={{fontSize:10,color:B.textLight}}>de HTG {l.montoOriginal.toLocaleString()}</div>
            </div>
          </div>
          <div style={{height:6,background:B.bg,borderRadius:3,overflow:"hidden"}}>
            <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+B.teal+","+B.green+")",borderRadius:3}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:B.textLight,marginTop:3}}>
            <span>Cuota: HTG {l.cuotaQuincenal.toLocaleString()}</span>
            <span>{pct}% pagado</span>
          </div>
        </div>);
      })}
    </React.Fragment>}
  </div>);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [sup,setSup]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const [regs,setRegs]=useState([]);
  const [resinaLogs,setResinaLogs]=useState([]);
  const [mat,setMat]=useState(MATERIALES_INIT);
  const [movs,setMovs]=useState([]);
  const [ordenes,setOrdenes]=useState([]);
  const [productoLogs,setProductoLogs]=useState([]);
  const [modulo,setModulo]=useState(null);
  const [vistaModulo,setVistaModulo]=useState(null);
  const enterModulo=useCallback((mod)=>{const defaults={produccion:"inicio",contabilidad:"inicio",equipos:"rendimiento"};setModulo(mod);setVistaModulo(defaults[mod]);},[]);
  const backToModules=()=>{setModulo(null);setVistaModulo(null);};
  // Auto-enter Producción for operators
  useEffect(()=>{if(sup&&sup.rol==="operador"&&!modulo)enterModulo("produccion");},[sup,modulo,enterModulo]);
  const [dbLoading,setDbLoading]=useState(true);
  const [facturas,setFacturas]=useState([]);
  const [cuentasPagar,setCuentasPagar]=useState([]);
  const [gastos,setGastos]=useState([]);
  const [pagos,setPagos]=useState([]);
  const [lotes,setLotes]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [proveedores,setProveedores]=useState([]);

  const refreshAllData=useCallback(()=>{
    return Promise.all([dbLoad(),dbLoadOrders(),dbLoadResina(),dbLoadProductos(),dbLoadMovimientos(),dbLoadLotes(),dbLoadClientes(),dbLoadProveedores()]).then(([r,o,res,pt,mvs,lt,cl,pv])=>{
      // Merge: keep locally-added records (saved <45s ago) that aren't yet in the DB response
      const cutoff=Date.now()-45000;
      const mergeFn=(dbData)=>{const ids=new Set(dbData.map(x=>String(x.id)));return prev=>{const pending=prev.filter(x=>x.id>cutoff&&!ids.has(String(x.id)));return pending.length?[...pending,...dbData]:dbData;};};
      setRegs(mergeFn(r));
      setOrdenes(mergeFn(o));
      setResinaLogs(mergeFn(res));
      setProductoLogs(mergeFn(pt));
      setMovs(mergeFn(mvs));
      setLotes(lt||[]);setClientes(cl||[]);setProveedores(pv||[]);
      const stock={};
      mvs.forEach(mv=>{
        if(!stock[mv.materialId])stock[mv.materialId]=0;
        stock[mv.materialId]+=(mv.tipo==="entrada"?1:-1)*mv.cantidad;
      });
      setMat(prev=>prev.map(m=>stock[m.id]!==undefined?Object.assign({},m,{stockActual:Math.max(0,stock[m.id])}):m));
      setDbLoading(false);
    }).catch(()=>setDbLoading(false));
  },[]);

  // Initial load
  useEffect(()=>{refreshAllData();},[refreshAllData]);

  // Auto-refresh every 30 seconds so all employees see live data
  useEffect(()=>{
    const interval=setInterval(()=>{refreshAllData();},30000);
    return ()=>clearInterval(interval);
  },[refreshAllData]);

  // Also refresh when tab becomes visible again (employee switches back to app)
  useEffect(()=>{
    const onVis=()=>{if(document.visibilityState==="visible")refreshAllData();};
    document.addEventListener("visibilitychange",onVis);
    return ()=>document.removeEventListener("visibilitychange",onVis);
  },[refreshAllData]);

  const refreshContab=useCallback(()=>{
    if(sup&&isContador(sup)){
      const cutoff=Date.now()-45000;
      const mergeFn=(dbData)=>{const ids=new Set(dbData.map(x=>String(x.id)));return prev=>{const pending=prev.filter(x=>x.id>cutoff&&!ids.has(String(x.id)));return pending.length?[...pending,...dbData]:dbData;};};
      Promise.all([dbLoadFacturas(),dbLoadCuentasPagar(),dbLoadGastos(),dbLoadPagos()])
        .then(([f,cp,g,p])=>{setFacturas(mergeFn(f));setCuentasPagar(mergeFn(cp));setGastos(mergeFn(g));setPagos(mergeFn(p));});
    }
  },[sup]);
  useEffect(()=>{refreshContab();},[refreshContab]);
  // Auto-refresh contabilidad every 30s too
  useEffect(()=>{
    if(!sup||!isContador(sup))return;
    const iv=setInterval(refreshContab,30000);
    return ()=>clearInterval(iv);
  },[refreshContab,sup]);

  const{pulling,pullY,handlers:pullHandlers}=usePullToRefresh(refreshAllData);
  const [online,setOnline]=useState(navigator.onLine);
  useEffect(()=>{
    const on=()=>setOnline(true);const off=()=>setOnline(false);
    window.addEventListener("online",on);window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);

  // Backup export function
  const exportBackup=()=>{
    const data={exportDate:new Date().toISOString(),registros:regs,ordenes,resinaLogs,productoLogs,movimientos:movs,lotes,clientes,proveedores,facturas,cuentasPagar,gastos,pagos,materiales:mat};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="plastinord-backup-"+new Date().toISOString().split("T")[0]+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };
  const exportBackupRef=React.useRef(exportBackup);
  exportBackupRef.current=exportBackup;

  // Backup import — restores to React state AND pushes to server (upsert)
  const [restoring,setRestoring]=useState(null);
  const importBackup=()=>{
    const input=document.createElement("input");
    input.type="file";input.accept=".json,application/json";
    input.onchange=(e)=>{
      const file=e.target.files&&e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=async(ev)=>{
        let d;try{d=JSON.parse(ev.target.result);}catch(err){alert("Archivo inválido: "+err.message);return;}
        const summary="Backup del "+(d.exportDate?new Date(d.exportDate).toLocaleString():"?")+"\n\n"+
          "• "+(d.registros?.length||0)+" registros\n"+
          "• "+(d.ordenes?.length||0)+" órdenes\n"+
          "• "+(d.resinaLogs?.length||0)+" lotes resina\n"+
          "• "+(d.productoLogs?.length||0)+" producto terminado\n"+
          "• "+(d.movimientos?.length||0)+" movimientos\n"+
          "• "+(d.lotes?.length||0)+" lotes\n"+
          "• "+(d.clientes?.length||0)+" clientes\n"+
          "• "+(d.proveedores?.length||0)+" proveedores\n"+
          "• "+(d.facturas?.length||0)+" facturas\n"+
          "• "+(d.cuentasPagar?.length||0)+" cuentas por pagar\n"+
          "• "+(d.gastos?.length||0)+" gastos\n"+
          "• "+(d.pagos?.length||0)+" pagos\n\n"+
          "⚠️ Esto ESCRIBIRÁ al servidor (upsert por id). Los registros existentes serán actualizados.\n\n¿Continuar?";
        if(!window.confirm(summary))return;

        // Update local state first
        if(d.registros)setRegs(d.registros);
        if(d.ordenes)setOrdenes(d.ordenes);
        if(d.resinaLogs)setResinaLogs(d.resinaLogs);
        if(d.productoLogs)setProductoLogs(d.productoLogs);
        if(d.movimientos)setMovs(d.movimientos);
        if(d.lotes)setLotes(d.lotes);
        if(d.clientes)setClientes(d.clientes);
        if(d.proveedores)setProveedores(d.proveedores);
        if(d.facturas)setFacturas(d.facturas);
        if(d.cuentasPagar)setCuentasPagar(d.cuentasPagar);
        if(d.gastos)setGastos(d.gastos);
        if(d.pagos)setPagos(d.pagos);
        if(d.materiales)setMat(d.materiales);

        // Push to server
        const tasks=[
          ["registros",d.registros,dbSave],
          ["órdenes",d.ordenes,dbSaveOrder],
          ["lotes resina",d.resinaLogs,dbSaveResina],
          ["producto terminado",d.productoLogs,dbSaveProducto],
          ["movimientos",d.movimientos,dbSaveMovimiento],
          ["lotes",d.lotes,dbSaveLote],
          ["clientes",d.clientes,dbSaveCliente],
          ["proveedores",d.proveedores,dbSaveProveedor],
          ["facturas",d.facturas,dbSaveFactura],
          ["cuentas por pagar",d.cuentasPagar,dbSaveCuentaPagar],
          ["gastos",d.gastos,dbSaveGasto],
          ["pagos",d.pagos,dbSavePago],
        ];
        let total=0,done=0,errors=0;
        tasks.forEach(t=>{if(Array.isArray(t[1]))total+=t[1].length;});
        setRestoring({label:"Iniciando…",done:0,total});
        for(const[label,rows,fn]of tasks){
          if(!Array.isArray(rows)||!rows.length)continue;
          for(const row of rows){
            try{await fn(row);}catch(err){errors++;console.error("restore "+label,err);}
            done++;
            if(done%5===0||done===total)setRestoring({label,done,total});
          }
        }
        setRestoring(null);
        alert("✓ Restauración completada.\n"+done+"/"+total+" registros procesados."+(errors?"\n⚠️ "+errors+" errores (ver consola).":""));
        refreshAllData();refreshContab();
      };
      reader.readAsText(file);
    };
    input.click();
  };

  // Backup: Monday 6am-9am, Sartori account only
  useEffect(()=>{
    if(!sup||!isSartori(sup))return;
    const now=new Date();
    const isMonday=now.getDay()===1;
    const hour=now.getHours();
    if(!isMonday||hour<6||hour>=9)return;
    const lastBackup=localStorage.getItem("plastinord_last_backup");
    const thisMonday=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
    if(lastBackup&&Number(lastBackup)>=thisMonday)return;
    const t=setTimeout(()=>{
      if(window.confirm("Es lunes — hora de respaldo semanal.\n\n¿Descargar backup de todos los datos?")){
        exportBackupRef.current();
        localStorage.setItem("plastinord_last_backup",String(Date.now()));
      }
    },3000);
    return ()=>clearTimeout(t);
  },[sup]);

  if(!sup){
    if(!showLogin)return <Landing onLoginClick={()=>setShowLogin(true)}/>;
    return <Login onLogin={setSup} onBack={()=>setShowLogin(false)}/>;
  }

  const alts=mat.filter(m=>m.stockActual<=m.stockMinimo).length;
  const ordenesActivas=ordenes.filter(o=>o.etapa!=="listo").length;

  const ptEnAlmacen=productoLogs.reduce((s,l)=>{
    if(l.tipo==="entrada")return s+l.cantidad;
    if(l.tipo==="salida")return s-l.cantidad;
    return s;
  },0);
  const isOp=sup.rol==="operador";

  // Per-module navigation arrays
  const NAV_PRODUCCION=[
    {id:"inicio",icon:"📊",label:"Inicio"},
    {id:"registro",icon:"➕",label:"Registrar"},
    {id:"almacen",icon:"📦",label:"Almacén",badge:ordenesActivas||0},
    {id:"materiaprima",icon:"🧪",label:"M. Prima",badge:alts||0},
    {id:"maquinas",icon:"🔧",label:"Máquinas"},
  ];
  const NAV_CONTABILIDAD=[
    {id:"inicio",icon:"📊",label:"Inicio"},
    {id:"facturacion",icon:"🧾",label:"Facturación"},
    {id:"gastos",icon:"💳",label:"Gastos"},
    {id:"cajachica",icon:"💼",label:"Caja Chica"},
  ];
  const NAV_EQUIPOS=[
    {id:"rendimiento",icon:"📈",label:"Rendimiento"},
    {id:"empleados",icon:"👤",label:"Empleados"},
    {id:"nomina",icon:"💵",label:"Nómina"},
    {id:"contribuciones",icon:"🏛",label:"Contrib."},
  ];
  const activeNAV=modulo==="produccion"?NAV_PRODUCCION:modulo==="contabilidad"?NAV_CONTABILIDAD:modulo==="equipos"?NAV_EQUIPOS:[];
  const moduloLabel=modulo==="produccion"?"PRODUCCIÓN":modulo==="contabilidad"?"CONTABILIDAD":modulo==="equipos"?"EQUIPOS":"";
  const moduloBg=B.bg;

  return(<div {...pullHandlers} style={{minHeight:"100dvh",background:modulo?moduloBg:B.bg,paddingBottom:modulo?84:0}}>
    {/* Header */}
    <div style={{background:"#EAEFF3",padding:"env(safe-area-inset-top,0px) 16px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 6px rgba(0,0,0,.08)",borderBottom:"1px solid "+B.border}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {modulo&&!isOp&&<button onClick={backToModules} style={{background:B.teal+"18",border:"none",borderRadius:8,padding:"7px 10px",color:B.teal,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center"}}>←</button>}
          <Logo s={30}/>
          <div><div style={{color:B.textDark,fontSize:15,fontWeight:800,lineHeight:1.1}}>plastinord hub</div><div style={{color:B.teal,fontSize:9,fontWeight:700,letterSpacing:1.5}}>{modulo?moduloLabel:(isOp?"OPERADOR":"MÓDULOS")}</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {!online&&<span style={{background:"#DC2626",color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:800}}>Sin conexión</span>}
          {isSartori(sup)&&modulo&&<button onClick={()=>{exportBackup();localStorage.setItem("plastinord_last_backup",String(Date.now()));}} style={{background:B.teal+"18",border:"none",borderRadius:8,padding:"7px 8px",color:B.teal,fontSize:11,cursor:"pointer"}} title="Descargar backup">Backup</button>}
          {isSartori(sup)&&modulo&&<button onClick={importBackup} style={{background:B.purple+"18",border:"none",borderRadius:8,padding:"7px 8px",color:B.purple,fontSize:11,cursor:"pointer"}} title="Restaurar backup">Restaurar</button>}
          <div style={{textAlign:"right"}}><div style={{color:B.textDark,fontSize:13,fontWeight:700,lineHeight:1.1}}>{sup.nombre.split(" ")[0]}</div><div style={{color:B.teal,fontSize:10,fontWeight:600}}>{sup.cargo}</div></div>
          <button onClick={()=>{if(window.confirm("¿Seguro que desea cerrar sesión?")){setSup(null);backToModules();}}} style={{background:B.teal+"18",border:"none",borderRadius:8,padding:"7px 10px",color:B.teal,fontSize:12,fontWeight:700,cursor:"pointer"}}>Salir</button>
        </div>
      </div>
    </div>

    {/* Restore progress overlay */}
    {restoring&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:380,textAlign:"center"}}>
        <div style={{fontSize:17,fontWeight:800,color:B.navy,marginBottom:8}}>Restaurando backup</div>
        <div style={{fontSize:13,color:B.textMid,marginBottom:16}}>{restoring.label}</div>
        <div style={{background:B.border,borderRadius:8,height:10,overflow:"hidden",marginBottom:10}}>
          <div style={{background:"linear-gradient(90deg,"+B.teal+","+B.tealDark+")",height:"100%",width:(restoring.total?Math.round(restoring.done/restoring.total*100):0)+"%",transition:"width .2s"}}></div>
        </div>
        <div style={{fontSize:12,color:B.textLight}}>{restoring.done} / {restoring.total}</div>
      </div>
    </div>}

    {/* Pull to refresh indicator */}
    {pulling&&<div style={{display:"flex",justifyContent:"center",padding:pullY>50?"12px 0":"8px 0",transition:"padding .2s"}}>
      <div style={{background:B.teal,color:"#fff",borderRadius:20,padding:"6px 16px",fontSize:12,fontWeight:700,opacity:Math.min(1,pullY/50)}}>
        {pullY>50?"↻ Soltá para actualizar":"↓ Tirá para actualizar"}
      </div>
    </div>}

    {/* Content */}
    <div style={{padding:"16px 16px 0"}}>
      {dbLoading&&modulo&&<div style={{textAlign:"center",padding:40,color:B.textLight}}><div style={{fontSize:32,marginBottom:8}}>⏳</div><div style={{fontSize:14}}>Cargando datos...</div></div>}

      {/* Module Selector — operators auto-enter Producción via useEffect */}
      {!modulo&&!isOp&&<ModuleSelector sup={sup} onSelect={enterModulo}/>}

      {/* Module: Producción */}
      {!dbLoading&&modulo==="produccion"&&vistaModulo==="inicio"&&isOp&&<PanelProduccion regs={regs} setRegs={setRegs} ordenes={ordenes} sup={sup} setVista={setVistaModulo}/>}
      {!dbLoading&&modulo==="produccion"&&vistaModulo==="inicio"&&!isOp&&<Dashboard regs={regs} mat={mat} ordenes={ordenes} resinaLogs={resinaLogs} setVista={setVistaModulo} productoLogs={productoLogs}/>}
      {!dbLoading&&modulo==="produccion"&&vistaModulo==="registro"&&<ProduccionSimple sup={sup} regs={regs} setRegs={setRegs} resinaLogs={resinaLogs} setResinaLogs={setResinaLogs} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} ordenes={ordenes} setOrdenes={setOrdenes} productoLogs={productoLogs} setProductoLogs={setProductoLogs} lotes={lotes} setLotes={setLotes}/>}
      {!dbLoading&&modulo==="produccion"&&vistaModulo==="almacen"&&<AlmacenUnificado logs={productoLogs} setLogs={setProductoLogs} ordenes={ordenes} setOrdenes={setOrdenes} productoLogs={productoLogs} setProductoLogs={setProductoLogs} sup={sup} mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} regs={regs} clientes={clientes} setClientes={setClientes} facturas={facturas} setFacturas={setFacturas} pagos={pagos} setPagos={setPagos}/>}
      {!dbLoading&&modulo==="produccion"&&vistaModulo==="materiaprima"&&<Inventario mat={mat} setMat={setMat} movs={movs} setMovs={setMovs} sup={sup}/>}
      {!dbLoading&&modulo==="produccion"&&vistaModulo==="maquinas"&&<MaquinariasPanel regs={regs} setRegs={setRegs} sup={sup} gastos={gastos} setGastos={setGastos}/>}

      {/* Module: Contabilidad */}
      {!dbLoading&&modulo==="contabilidad"&&vistaModulo==="inicio"&&<ResumenFinanciero facturas={facturas} gastos={gastos} cuentasPagar={cuentasPagar} pagos={pagos} resinaLogs={resinaLogs} movs={movs}/>}
      {!dbLoading&&modulo==="contabilidad"&&vistaModulo==="facturacion"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
        <Facturacion facturas={facturas} setFacturas={setFacturas} productoLogs={productoLogs} setProductoLogs={setProductoLogs} ordenes={ordenes} sup={sup} pagos={pagos} setPagos={setPagos} clientes={clientes} setClientes={setClientes}/>
        <CuentasCobrar facturas={facturas} setFacturas={setFacturas} pagos={pagos} setPagos={setPagos} sup={sup}/>
      </div>}
      {!dbLoading&&modulo==="contabilidad"&&vistaModulo==="gastos"&&<CuentasPagarModule cuentasPagar={cuentasPagar} setCuentasPagar={setCuentasPagar} pagos={pagos} setPagos={setPagos} sup={sup} proveedores={proveedores} setProveedores={setProveedores}/>}
      {!dbLoading&&modulo==="contabilidad"&&vistaModulo==="cajachica"&&<CajaChica sup={sup} gastos={gastos} setGastos={setGastos}/>}

      {/* Module: Equipos */}
      {!dbLoading&&modulo==="equipos"&&vistaModulo==="rendimiento"&&<Rendimiento regs={regs} resinaLogs={resinaLogs}/>}
      {!dbLoading&&modulo==="equipos"&&vistaModulo==="empleados"&&<EmpleadosPanel sup={sup}/>}
      {!dbLoading&&modulo==="equipos"&&vistaModulo==="nomina"&&<Nomina sup={sup} gastos={gastos} setGastos={setGastos}/>}
      {!dbLoading&&modulo==="equipos"&&vistaModulo==="contribuciones"&&<Contribuciones sup={sup} gastos={gastos} setGastos={setGastos}/>}
    </div>

    {/* Bottom nav — only when inside a module */}
    {modulo&&<div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:"1px solid "+B.border,paddingBottom:"env(safe-area-inset-bottom,0px)",boxShadow:"0 -2px 16px rgba(0,0,0,.08)"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat("+activeNAV.length+",1fr)"}}>
        {activeNAV.map(n=>(<button key={n.id} onClick={()=>setVistaModulo(n.id)} style={{background:"none",border:"none",padding:"8px 2px 5px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",position:"relative"}}>
          <span style={{fontSize:18,lineHeight:1}}>{n.icon}</span>
          <span style={{fontSize:9,fontWeight:700,color:vistaModulo===n.id?B.teal:B.textLight}}>{n.label}</span>
          {vistaModulo===n.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,borderRadius:2,background:B.teal}}/>}
          {n.badge>0&&<div style={{position:"absolute",top:4,right:"calc(50% - 16px)",background:B.red,color:"#fff",borderRadius:10,width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{n.badge}</div>}
        </button>))}
      </div>
    </div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App/></ToastProvider>);
  </script>
  <script>
    if('serviceWorker' in navigator){
      const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})));
    }
  </script>
</body>
</html>
